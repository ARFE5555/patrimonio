/* ─────────────────────────────  Tab: Ajustes  ───────────────────────────── */
function AjustesTab({ settings, setSettings, accounts, txns, prices, cur, divisas, projectsMeta, onSync, onRestore, session, role, signOut, canEditAll }) {
  const theme = settings.theme || "dark";
  const autoRate = vesRateOf(settings, divisas);
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  async function doSync() {
    setSyncing(true);
    setSyncMsg("Sincronizando con Google Sheets…");
    try {
      const r = await onSync(settings.sheetUrl);
      if (r && r.ok) setSyncMsg(`Listo: ${r.count} operación(es) leídas del Sheet.`);
      else setSyncMsg((r && r.error) || "No se pudo sincronizar.");
    } catch (e) {
      setSyncMsg((e && e.message) || "No se pudo leer el Sheet. Revisá el link y tu conexión.");
    } finally {
      setSyncing(false);
    }
  }
  const pad = (n) => String(n).padStart(2, "0");
  const monthStart = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`;
  const monthEnd = (y, m) => {
    const d = new Date(y, m + 1, 0);
    return `${y}-${pad(m + 1)}-${pad(d.getDate())}`;
  };

  const [from, setFrom] = useState(monthStart());
  const [to, setTo] = useState(todayISO());
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [dl, setDl] = useState(null);
  const [restorePrev, setRestorePrev] = useState(null);

  async function onRestoreFile(e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBusy(true); setMsg("Leyendo respaldo…"); setRestorePrev(null);
    try {
      const XLSX = await ensureXLSX();
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets["Respaldo"];
      if (!ws) throw new Error("Este archivo no tiene hoja 'Respaldo'. Usá un Excel generado por la app (versión actual).");
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
      const keys = ["accounts", "txns", "divisas", "projectsMeta", "settings"];
      const parts = {};
      rows.forEach((r) => {
        const k = String(r[0] || "");
        if (keys.indexOf(k) < 0) return;
        const idx = parseInt(r[1], 10) || 0;
        (parts[k] = parts[k] || [])[idx] = String(r[2] || "");
      });
      const data = {};
      keys.forEach((k) => { if (parts[k]) data[k] = JSON.parse(parts[k].join("")); });
      if (!data.accounts && !data.txns && !data.divisas) throw new Error("El respaldo está vacío o dañado.");
      setRestorePrev({
        data,
        counts: [
          [(data.accounts || []).length, "cuentas"],
          [(data.txns || []).length, "movimientos"],
          [(data.divisas || []).length, "operaciones de divisas"],
          [(data.projectsMeta || []).length, "proyectos"],
        ],
      });
      setMsg("");
    } catch (ex) { setMsg((ex && ex.message) || "No se pudo leer el respaldo."); }
    finally { setBusy(false); }
  }

  function thisMonth() {
    setFrom(monthStart());
    setTo(todayISO());
  }
  function lastMonth() {
    const n = new Date();
    const y = n.getMonth() === 0 ? n.getFullYear() - 1 : n.getFullYear();
    const m = (n.getMonth() + 11) % 12;
    setFrom(`${y}-${pad(m + 1)}-01`);
    setTo(monthEnd(y, m));
  }

  function ensureXLSX() {
    if (window.XLSX) return Promise.resolve(window.XLSX);
    return new Promise((res, rej) => {
      const urls = [
        "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
        "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js",
      ];
      let i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar el generador de Excel")); return; }
        const s = document.createElement("script");
        s.src = urls[i++];
        s.onload = () => (window.XLSX ? res(window.XLSX) : next());
        s.onerror = next;
        document.head.appendChild(s);
      })();
    });
  }

  async function exportExcel() {
    if (from > to) { setMsg("La fecha 'Desde' no puede ser mayor que 'Hasta'."); return; }
    setBusy(true);
    setMsg("Generando el Excel…");
    try {
      const XLSX = await ensureXLSX();
      const CUR = cur.toUpperCase();
      const inRange = (t) => t.date >= from && t.date <= to;
      const delta = (t) => (t.kind === "income" ? t.amount : -t.amount);
      const round2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;

      const fiat = accounts.filter((a) => a.type === "bank" || a.type === "cash");
      const nameOf = (id) => (accounts.find((a) => a.id === id) || {}).name || "—";

      // Resumen por cuenta (saldo inicial/final reconstruido desde los movimientos)
      // Cada cuenta va en su moneda; los TOTALES se convierten a la moneda base.
      const rate = vesRateOf(settings, divisas);
      let tIni = 0, tFin = 0, tIng = 0, tEgr = 0, sinConv = 0;
      const resumen = fiat.map((a) => {
        const aCur = a.currency || cur;
        const bal = a.balance || 0;
        const after = txns.filter((t) => t.accountId === a.id && t.date > to).reduce((s, t) => s + delta(t), 0);
        const fromOn = txns.filter((t) => t.accountId === a.id && t.date >= from).reduce((s, t) => s + delta(t), 0);
        const fin = bal - after;
        const ini = bal - fromOn;
        const ing = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "income").reduce((s, t) => s + (t.amount || 0) - (t.commission || 0), 0);
        const egr = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "expense").reduce((s, t) => s + (t.amount || 0) + (t.commission || 0), 0);
        const cIni = convertAmt(ini, aCur, cur, rate), cFin = convertAmt(fin, aCur, cur, rate);
        const cIng = convertAmt(ing, aCur, cur, rate), cEgr = convertAmt(egr, aCur, cur, rate);
        if (cIni == null || cFin == null) sinConv++;
        else { tIni += cIni; tFin += cFin; tIng += cIng || 0; tEgr += cEgr || 0; }
        return [a.name, TYPE_LABEL[a.type], aCur.toUpperCase(), round2(ini), round2(fin), round2(ing), round2(egr), round2(fin - ini)];
      });

      // Rentabilidad de divisas (asignación automática FIFO)
      const _divs = divisas || [];
      const _allV = _divs.filter((d) => d.kind === "venta");
      const _allC = _divs.filter((d) => d.kind === "compra");
      const _allo = allocateFIFO(_allV, _allC);
      const _ventasR = _allV.filter((v) => v.date >= from && v.date <= to);
      let dUsdVend = 0, dUsdRe = 0, dBsRec = 0, dBsUs = 0, dGan = 0, dCap = 0;
      _ventasR.forEach((v) => {
        const s = _allo.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0 };
        const usdEq = v.tasa > 0 ? s.vesUsados / v.tasa : 0;
        dUsdVend += v.usd || 0;
        dUsdRe += s.usdRecomprado;
        dBsRec += (v.usd || 0) * (v.tasa || 0);
        dBsUs += s.vesUsados;
        dGan += s.usdRecomprado - usdEq - comUsdOf(v);
        dCap += usdEq;
      });
      const dRent = dCap > 0 ? (dGan / dCap) * 100 : 0;

      const resumenAoa = [
        ["Reporte de patrimonio"],
        ["Período", `${from}  a  ${to}`],
        ["Moneda", CUR],
        [],
        ["Cuenta", "Tipo", "Moneda", "Saldo inicial", "Saldo final", "Ingresos", "Egresos", "Neto"],
        ...resumen,
        [`TOTAL (convertido a ${CUR})`, "", CUR, round2(tIni), round2(tFin), round2(tIng), round2(tEgr), round2(tFin - tIni)],
        ...(sinConv ? [[`${sinConv} cuenta(s) sin conversión disponible: excluidas del total`]] : []),
        [],
        ["Divisas (compra/venta USD)"],
        ["USD vendidos", round2(dUsdVend)],
        ["USD recomprado", round2(dUsdRe)],
        ["Bs recibidos (ventas)", round2(dBsRec)],
        ["Bs usados en compras (con comisión)", round2(dBsUs)],
        ["Ganancia por diferencial (USD)", round2(dGan)],
        ["Rentabilidad (%)", round2(dRent)],
      ];
      const wsR = XLSX.utils.aoa_to_sheet(resumenAoa);
      wsR["!cols"] = [{ wch: 30 }, { wch: 12 }, { wch: 9 }, { wch: 16 }, { wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];

      // Movimientos del período
      const movs = txns.filter(inRange).slice().sort((a, b) => (a.date < b.date ? -1 : 1));
      const movAoa = [
        ["Fecha", "Tipo", "Motivo", "Cuenta / método", "Moneda", "Monto", "Comisión", "Proyecto", "Tasa VES/USD (del día)"],
        ...movs.map((t) => {
          const mc = (t.currency || cur).toUpperCase();
          const comTxt = t.commission ? (t.comMode === "usd" ? `${round2(t.comUsd || 0)} USD` : round2(t.commission)) : "";
          const rd = rateForDate(settings, divisas, t.date);
          return [
            t.date,
            t.kind === "income" ? "Ingreso" : "Egreso",
            t.motivo || "",
            nameOf(t.accountId),
            mc,
            round2(t.kind === "income" ? t.amount : -t.amount),
            comTxt,
            t.project || "",
            rd ? round2(rd) : "",
          ];
        }),
      ];
      const wsM = XLSX.utils.aoa_to_sheet(movAoa);
      wsM["!cols"] = [{ wch: 12 }, { wch: 10 }, { wch: 26 }, { wch: 22 }, { wch: 8 }, { wch: 14 }, { wch: 12 }, { wch: 18 }, { wch: 20 }];

      // Cripto (instantánea al momento de exportar)
      const cripto = accounts.filter((a) => a.type === "crypto");
      const criptoAoa = [
        ["Moneda", "Símbolo", "Cantidad", `Precio (${CUR})`, `Valor (${CUR})`],
        ...cripto.map((a) => {
          const p = (prices[a.coinId] || {}).price;
          const price = p != null ? p : a.manualPrice;
          return [a.name, a.symbol, a.amount || 0, price != null ? round2(price) : "", price != null ? round2((a.amount || 0) * price) : ""];
        }),
      ];
      const wsC = XLSX.utils.aoa_to_sheet(criptoAoa);
      wsC["!cols"] = [{ wch: 18 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];

      // Divisas por bloques (asignación automática FIFO, con fraccionamiento)
      const divs2 = divisas || [];
      const vesTot = (d) => (d.usd || 0) * (d.tasa || 0);
      const byDate = (a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0));
      const allV2 = divs2.filter((d) => d.kind === "venta");
      const allC2 = divs2.filter((d) => d.kind === "compra");
      const allo2 = allocateFIFO(allV2, allC2);
      const ventasRango = allV2.filter((v) => v.date >= from && v.date <= to).slice().sort(byDate);
      const header = ["Tipo", "Fecha", "Cliente", "USD", "Tasa (VES)", "VES", "Comisión (VES)", "Total VES", "Ganancia (USD)", "Rentab. %", "Referencia"];
      const aoa = [[`Divisas por venta · ${from} a ${to}  (USD y Bs)`], []];
      let gTotal = 0;
      ventasRango.forEach((v) => {
        const gen = vesTot(v);
        const s = allo2.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0, allocs: [] };
        const comV = comOp(v), comU = comUsdOf(v);
        aoa.push(header);
        aoa.push(["VENTA", v.date, v.persona || "", round2(v.usd || 0), v.tasa || 0, round2(gen), round2(comV), round2(gen - comV), "", "", v.referencia || ""]);
        s.allocs.forEach((a) => {
          const c = a.compra;
          const frac = (c.usd || 0) > 0 ? a.usd / (c.usd || 1) : 0;
          const cCom = comOp(c) * frac;
          const cVes = a.usd * (c.tasa || 0);
          aoa.push(["Compra", c.date, c.persona || "", round2(a.usd), c.tasa || 0, round2(cVes), round2(cCom), round2(a.ves), "", "", c.referencia || ""]);
        });
        if (s.allocs.length === 0) aoa.push(["(sin compras asignadas)", "", "", "", "", "", "", "", "", "", ""]);
        const usdRe = s.usdRecomprado, vesUs = s.vesUsados;
        const usdEq = v.tasa > 0 ? vesUs / v.tasa : 0;
        const gan = usdRe - usdEq - comU;
        const rent = usdEq > 0 ? (gan / usdEq) * 100 : 0;
        gTotal += gan;
        aoa.push(["TOTAL RENTABILIDAD", "", "", round2(usdRe), "", round2(vesUs), "", "", round2(gan), round2(rent), ""]);
        aoa.push([]);
      });
      // Porciones sin asignar (compras sin venta con VES disponibles), del período
      const sinAsig = allo2.unalloc.filter((a) => a.compra.date >= from && a.compra.date <= to);
      if (sinAsig.length) {
        aoa.push(["SIN ASIGNAR"], header);
        sinAsig.forEach((a) => {
          const c = a.compra;
          const frac = (c.usd || 0) > 0 ? a.usd / (c.usd || 1) : 0;
          aoa.push(["Compra", c.date, c.persona || "", round2(a.usd), c.tasa || 0, round2(a.usd * (c.tasa || 0)), round2(comOp(c) * frac), round2(a.ves), "", "", c.referencia || ""]);
        });
        aoa.push([]);
      }
      aoa.push(["GANANCIA TOTAL (USD)", "", "", "", "", "", "", "", round2(gTotal), "", ""]);
      const wsDiv = XLSX.utils.aoa_to_sheet(aoa);
      wsDiv["!cols"] = [{ wch: 20 }, { wch: 12 }, { wch: 18 }, { wch: 12 }, { wch: 12 }, { wch: 16 }, { wch: 15 }, { wch: 16 }, { wch: 15 }, { wch: 10 }, { wch: 16 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, wsR, "Resumen");
      XLSX.utils.book_append_sheet(wb, wsM, "Movimientos");
      XLSX.utils.book_append_sheet(wb, wsC, "Cripto");
      XLSX.utils.book_append_sheet(wb, wsDiv, "Divisas");

      // Hoja Tasas: historial diario de la tasa VES/USD
      const histRate = (settings.rateHistory || []).slice().sort((a, b) => (a.date < b.date ? -1 : 1));
      const tasasAoa = [["Fecha", "Tasa VES/USD"], ...histRate.map((r) => [r.date, round2(r.rate)])];
      const wsT = XLSX.utils.aoa_to_sheet(tasasAoa);
      wsT["!cols"] = [{ wch: 14 }, { wch: 16 }];
      XLSX.utils.book_append_sheet(wb, wsT, "Tasas");

      // Hoja "Respaldo": datos crudos completos (todas las fechas), restaurables desde Ajustes.
      // El JSON se parte en trozos porque Excel limita cada celda a ~32.000 caracteres.
      const CHUNK = 30000;
      const bAoa = [["PATRIMONIO_BACKUP", "v1", "No editar esta hoja: permite restaurar todos los datos."]];
      Object.entries({
        accounts: accounts || [],
        txns: txns || [],
        divisas: divisas || [],
        projectsMeta: projectsMeta || [],
        settings: settings || {},
      }).forEach(([k, v]) => {
        const s = JSON.stringify(v);
        for (let i = 0; i * CHUNK < s.length; i++) bAoa.push([k, i, s.slice(i * CHUNK, (i + 1) * CHUNK)]);
      });
      const wsB = XLSX.utils.aoa_to_sheet(bAoa);
      wsB["!cols"] = [{ wch: 16 }, { wch: 6 }, { wch: 90 }];
      XLSX.utils.book_append_sheet(wb, wsB, "Respaldo");
      if (dl && dl.url) URL.revokeObjectURL(dl.url);
      setDl(wbToBlobUrl(XLSX, wb, `patrimonio_${from}_a_${to}.xlsx`));
      setMsg("Archivo generado. Tocá el botón verde para abrirlo o guardarlo.");
    } catch (e) {
      setMsg((e && e.message) || "No se pudo generar el Excel. Probá con conexión a internet.");
    } finally {
      setBusy(false);
    }
  }

  const seg = (active, color) => ({
    flex: 1, border: "none", borderRadius: 9, padding: "11px", fontSize: 15,
    fontWeight: 600, fontFamily: FONT, cursor: "pointer",
    background: active ? color : "transparent",
    color: active ? "#0A0F1E" : T.mut,
  });
  const preset = {
    background: T.card, border: `1px solid ${T.line}`, borderRadius: 10,
    padding: "9px 12px", color: T.text, fontSize: 13, fontFamily: FONT, cursor: "pointer",
  };

  return (
    <div style={{ paddingTop: 8 }}>
      {session && (
        <div style={{ marginBottom: 28 }}>
          <UsersPanel session={session} role={role} signOut={signOut} />
        </div>
      )}
      {/* Apariencia */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Apariencia</div>
      <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 8, border: `1px solid ${T.lineSoft}` }}>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "dark" }))} style={seg(theme === "dark", T.gold)}>
          Oscuro
        </button>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "light" }))} style={seg(theme === "light", T.gold)}>
          Claro
        </button>
      </div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2 }}>
        Tema en azules con acentos dorados. Se guarda automáticamente.
      </div>

      {/* Vista */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Vista</div>
      <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 8, border: `1px solid ${T.lineSoft}` }}>
        {[["auto", "Automática"], ["mobile", "Móvil"], ["desktop", "Escritorio"]].map(([v, label]) => (
          <button key={v} onClick={() => setSettings((s) => ({ ...s, layout: v }))} style={seg((settings.layout || "auto") === v, T.gold)}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2, lineHeight: 1.5 }}>
        "Automática" usa escritorio en pantallas anchas y móvil en el teléfono. En escritorio, el menú pasa a la barra lateral.
      </div>

      {/* Tasa VES */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Tasa VES por USD</div>
      <Field label="Tasa manual (dejala vacía para usar la última operación de divisas)">
        <input
          style={{ ...inputStyle, fontFamily: MONO }}
          value={settings.vesRate != null ? String(settings.vesRate) : ""}
          onChange={(e) => {
            const v = e.target.value;
            setSettings((s) => ({ ...s, vesRate: v === "" ? undefined : numVE(v) }));
          }}
          inputMode="decimal"
          placeholder={autoRate ? `Automática: ${autoRate}` : "Ej. 38,50"}
        />
      </Field>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2, lineHeight: 1.5 }}>
        {autoRate
          ? `Se usa para convertir cuentas en VES a ${cur.toUpperCase()} en el balance y el Excel. Tasa activa: ${autoRate}.`
          : `Cargá una tasa (o registrá una operación de divisas) para poder convertir cuentas en VES a ${cur.toUpperCase()}.`}
      </div>

      {/* Exportar */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Exportar a Excel</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, marginLeft: 2 }}>
        Genera un archivo .xlsx con: Resumen (saldo inicial y final por cuenta),
        Movimientos del período, Cripto y Divisas (cada venta con sus compras y su rentabilidad).
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Desde</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={from} onChange={(e) => setFrom(e.target.value)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Hasta</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={to} onChange={(e) => setTo(e.target.value)} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <button onClick={thisMonth} style={preset}>Este mes</button>
        <button onClick={lastMonth} style={preset}>Mes pasado</button>
      </div>

      <PrimaryBtn color={T.gold} disabled={busy} onClick={exportExcel}>
        {busy ? "Generando…" : "Generar Excel"}
      </PrimaryBtn>
      {dl && (
        <a href={dl.url} download={dl.name} style={{ display: "block", textAlign: "center", background: T.green, color: "#0A0F1E", borderRadius: 12, padding: "13px", fontWeight: 600, textDecoration: "none", marginTop: 10 }}>
          Abrir / guardar el Excel
        </a>
      )}

      {canEditAll && (
        <>
          <div style={{ ...sectionTitle, margin: "26px 0 8px" }}>Restaurar respaldo</div>
          <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12, lineHeight: 1.5 }}>
            Subí un Excel generado por la app (con su hoja "Respaldo") para recuperar todos los datos.
          </div>
          <label style={{ display: "block", textAlign: "center", background: "transparent", color: T.blue, border: `1px solid ${T.blue}`, borderRadius: 12, padding: "12px", fontSize: 14.5, fontWeight: 600, cursor: "pointer" }}>
            {busy ? "Procesando…" : "Subir Excel de respaldo"}
            <input type="file" accept=".xlsx" style={{ display: "none" }} onChange={onRestoreFile} />
          </label>
          {restorePrev && (
            <div style={{ background: T.redSoft, border: `1px solid ${T.red}`, borderRadius: 14, padding: "14px 15px", marginTop: 12 }}>
              <div style={{ fontSize: 13.5, fontWeight: 700, color: T.red, marginBottom: 6 }}>
                Esto reemplaza TODOS los datos actuales
              </div>
              <div style={{ fontSize: 12.5, color: T.mut, lineHeight: 1.6, marginBottom: 12 }}>
                El respaldo contiene: {restorePrev.counts.map(([n, l]) => `${n} ${l}`).join(" · ")}.
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button
                  onClick={() => { onRestore(restorePrev.data); setRestorePrev(null); setMsg("Datos restaurados desde el respaldo."); }}
                  style={{ flex: 1, background: T.red, color: "#fff", border: "none", borderRadius: 11, padding: "12px", fontSize: 14, fontWeight: 650, fontFamily: FONT, cursor: "pointer" }}
                >
                  Restaurar ahora
                </button>
                <button onClick={() => setRestorePrev(null)} style={{ flex: 1, background: "transparent", color: T.mut, border: `1px solid ${T.line}`, borderRadius: 11, padding: "12px", fontSize: 14, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}>
                  Cancelar
                </button>
              </div>
            </div>
          )}
        </>
      )}
      {msg && (
        <div style={{ fontSize: 13, color: T.mut, marginTop: 12, marginLeft: 2, lineHeight: 1.5 }}>{msg}</div>
      )}

      {/* Sincronización con Google Sheets */}
      <div style={{ ...sectionTitle, marginTop: 30, marginBottom: 10 }}>Sincronizar divisas (Google Sheets)</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, marginLeft: 2, lineHeight: 1.5 }}>
        Pegá el link CSV publicado de tu hoja. La app lee las operaciones que carga tu bot y las suma
        a Divisas (sin duplicar, usando la Referencia). También sincroniza sola al abrir.
      </div>
      <Field label="Link CSV del Google Sheet">
        <input
          style={{ ...inputStyle, fontSize: 13 }}
          value={settings.sheetUrl || ""}
          onChange={(e) => setSettings((s) => ({ ...s, sheetUrl: e.target.value }))}
          placeholder="https://docs.google.com/…/pub?...&output=csv"
          autoCapitalize="none"
          autoCorrect="off"
        />
      </Field>
      <PrimaryBtn color={T.blue} disabled={syncing || !(settings.sheetUrl || "").trim()} onClick={doSync}>
        {syncing ? "Sincronizando…" : "Sincronizar ahora"}
      </PrimaryBtn>
      {syncMsg && (
        <div style={{ fontSize: 13, color: T.mut, marginTop: 12, marginLeft: 2, lineHeight: 1.5 }}>{syncMsg}</div>
      )}
    </div>
  );
}

/* ─────────────────────────────  Tab: Divisas (USD / VES)  ───────────────────────────── */
/* ─────────────────────────────  Cuentas por cobrar (por cliente)  ───────────────────────────── */
function CxCTab({ divisas, canWrite = true, onAddAbono, onDeleteAbono, onPatch }) {
  const [openKey, setOpenKey] = useState(null);
  const [monto, setMonto] = useState("");
  const [fecha, setFecha] = useState(todayISO());
  const [nota, setNota] = useState("");
  const [busyId, setBusyId] = useState(null);
  const [err, setErr] = useState("");
  const [viewer, setViewer] = useState(null);

  const keyOf = (p) => String(p || "").trim().toLowerCase();
  const clientes = useMemo(() => {
    const m = {};
    (divisas || []).forEach((d) => {
      const k = keyOf(d.persona);
      if (!k) return;
      if (!m[k]) m[k] = { nombre: String(d.persona).trim(), compras: [], ventas: [], abonos: [] };
      if (d.kind === "compra") m[k].compras.push(d);
      else if (d.kind === "venta") m[k].ventas.push(d);
      else if (d.kind === "abono") m[k].abonos.push(d);
    });
    return Object.entries(m)
      .map(([key, c]) => {
        const totalUsd = c.compras.reduce((s, x) => s + (x.usd || 0), 0);
        const abonado = c.abonos.reduce((s, x) => s + (x.usd || 0), 0);
        return { key, ...c, totalUsd, abonado, pendiente: totalUsd - abonado };
      })
      .filter((c) => c.compras.length || c.abonos.length)
      .sort((a, b) => b.pendiente - a.pendiente);
  }, [divisas]);

  const totalPendiente = clientes.reduce((s, c) => s + Math.max(0, c.pendiente), 0);
  const byDateDesc = (a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.createdAt || 0) - (a.createdAt || 0));

  async function onReceiptFile(op, e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBusyId(op.id); setErr("");
    try { const stored = await fileToStored(f); await idbPut(op.id, stored); onPatch(op.id, { hasReceipt: true }); }
    catch (ex) { setErr((ex && ex.message) || "No se pudo guardar el comprobante."); }
    finally { setBusyId(null); }
  }
  async function openReceipt(op) {
    setErr("");
    try { const stored = await idbGet(op.id); if (stored) setViewer({ stored }); else setErr("No se encontró el comprobante en este dispositivo."); }
    catch (ex) { setErr("No se pudo abrir el comprobante."); }
  }

  function registrarAbono(c) {
    const n = numVE(monto);
    if (!(n > 0)) return;
    onAddAbono({ persona: c.nombre, usd: n, date: fecha, note: nota.trim() || undefined });
    setMonto(""); setNota(""); setFecha(todayISO());
  }

  const miniBtn = { borderRadius: 10, padding: "9px 12px", fontSize: 12.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer", textAlign: "center" };

  return (
    <div style={{ paddingTop: 8 }}>
      <div style={{ background: `linear-gradient(160deg, ${T.card2}, ${T.card})`, border: `1px solid ${T.line}`, borderRadius: 18, padding: "18px", marginBottom: 18 }}>
        <div style={{ fontSize: 13, color: T.mut, fontWeight: 500 }}>Total por cobrar</div>
        <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 30, fontWeight: 600, letterSpacing: -0.5, color: T.gold, margin: "4px 0 2px" }}>
          {fmtUsd(totalPendiente)}
        </div>
        <div style={{ fontSize: 12, color: T.mut2 }}>{clientes.filter((c) => c.pendiente > 0.01).length} cliente(s) con saldo abierto</div>
      </div>

      {clientes.length === 0 ? (
        <div style={emptyRow}>Las compras de divisas con cliente aparecen acá agrupadas.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {clientes.map((c) => {
            const open = openKey === c.key;
            const saldada = c.pendiente <= 0.01;
            return (
              <div key={c.key} style={{ ...rowCard, flexDirection: "column", alignItems: "stretch", padding: 0, overflow: "hidden" }}>
                <div onClick={() => setOpenKey(open ? null : c.key)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, padding: "13px 15px", cursor: "pointer" }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 3 }}>
                      <span style={{ fontSize: 15, fontWeight: 700, color: T.text }}>{c.nombre}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 6, color: saldada ? T.green : T.gold, background: saldada ? T.greenSoft : "rgba(227,178,77,0.14)", border: `1px solid ${saldada ? T.green : T.gold}` }}>
                        {saldada ? "SALDADA" : "ABIERTA"}
                      </span>
                    </div>
                    <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO }}>
                      {c.compras.length} compra(s) · total {fmtUsd(c.totalUsd)} · abonado {fmtUsd(c.abonado)}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 700, marginTop: 3, color: saldada ? T.green : T.gold }}>
                      Pendiente: {fmtUsd(Math.max(0, c.pendiente))}{c.pendiente < -0.01 ? ` (a favor ${fmtUsd(-c.pendiente)})` : ""}
                    </div>
                  </div>
                  <span style={{ color: T.mut2, fontSize: 12 }}>{open ? "▲" : "▼"}</span>
                </div>

                {open && (
                  <div style={{ padding: "4px 15px 16px", borderTop: `1px solid ${T.lineSoft}` }}>
                    <div style={{ ...sectionTitle, margin: "14px 0 8px" }}>Operaciones ({c.compras.length + c.ventas.length})</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {[...c.compras, ...c.ventas].sort(byDateDesc).map((d) => (
                        <div key={d.id} style={{ display: "flex", justifyContent: "space-between", background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 10, padding: "8px 11px" }}>
                          <span style={{ fontSize: 12, color: d.kind === "compra" ? T.text : T.mut }}>
                            {d.kind === "compra" ? "Compra" : "Venta"} · {fmtDate(d.date)}{d.referencia ? ` · ref ${d.referencia}` : ""}
                          </span>
                          <span style={{ fontSize: 12.5, fontFamily: MONO, fontWeight: 600, color: T.text }}>{fmtUsd(d.usd)}</span>
                        </div>
                      ))}
                    </div>
                    {c.ventas.length > 0 && (
                      <div style={{ fontSize: 11.5, color: T.mut2, marginTop: 6 }}>
                        Las ventas se muestran como referencia; el pendiente se calcula sobre las compras.
                      </div>
                    )}

                    <div style={{ ...sectionTitle, margin: "16px 0 8px" }}>Abonos ({c.abonos.length})</div>
                    {c.abonos.length === 0 ? (
                      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 6 }}>Sin abonos registrados.</div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {c.abonos.slice().sort(byDateDesc).map((a) => (
                          <div key={a.id} style={{ background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 10, padding: "9px 11px" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                              <div style={{ minWidth: 0 }}>
                                <div style={{ fontSize: 13, fontWeight: 600, color: T.green, fontFamily: MONO }}>+{fmtUsd(a.usd)}</div>
                                <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO }}>{fmtDate(a.date)}{a.note ? ` · ${a.note}` : ""}</div>
                              </div>
                              {canWrite && (
                                <button onClick={() => onDeleteAbono(a.id)} style={{ ...btnGhost, color: T.mut2, fontSize: 17, lineHeight: 1 }} aria-label="Eliminar abono">×</button>
                              )}
                            </div>
                            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                              {a.hasReceipt ? (
                                <button onClick={() => openReceipt(a)} style={{ ...miniBtn, flex: 1, background: T.blue, color: "#0A0F1E", border: "none" }}>Ver comprobante</button>
                              ) : canWrite ? (
                                <label style={{ ...miniBtn, flex: 1, display: "block", background: "transparent", color: T.gold, border: `1px solid ${T.gold}` }}>
                                  {busyId === a.id ? "Guardando…" : "Cargar comprobante"}
                                  <input type="file" accept="image/*,application/pdf" style={{ display: "none" }} onChange={(e) => onReceiptFile(a, e)} />
                                </label>
                              ) : null}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    {err && <div style={{ fontSize: 12.5, color: T.red, marginTop: 8 }}>{err}</div>}

                    {canWrite && (
                      <div style={{ marginTop: 14, background: T.card2, border: `1px solid ${T.lineSoft}`, borderRadius: 12, padding: "12px 13px" }}>
                        <div style={{ ...sectionTitle, marginBottom: 8 }}>Registrar abono</div>
                        <div style={{ display: "flex", gap: 8 }}>
                          <div style={{ flex: 1 }}>
                            <label style={labelStyle}>Monto USD</label>
                            <input style={{ ...inputStyle, fontFamily: MONO }} value={monto} onChange={(e) => setMonto(e.target.value)} inputMode="decimal" placeholder="0.00" />
                          </div>
                          <div style={{ flex: 1 }}>
                            <label style={labelStyle}>Fecha</label>
                            <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={fecha} onChange={(e) => setFecha(e.target.value)} />
                          </div>
                        </div>
                        <label style={labelStyle}>Nota (opcional)</label>
                        <input style={inputStyle} value={nota} onChange={(e) => setNota(e.target.value)} placeholder="Ej. transferencia parcial" />
                        <button
                          onClick={() => registrarAbono(c)}
                          disabled={!(numVE(monto) > 0)}
                          style={{ width: "100%", marginTop: 10, background: numVE(monto) > 0 ? T.green : T.card, color: numVE(monto) > 0 ? "#0A0F1E" : T.mut2, border: "none", borderRadius: 11, padding: "12px", fontSize: 14.5, fontWeight: 650, fontFamily: FONT, cursor: numVE(monto) > 0 ? "pointer" : "default" }}
                        >
                          Registrar abono
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      <Sheet open={!!viewer} onClose={() => setViewer(null)} title="Comprobante de pago">
        {viewer && (viewer.stored && viewer.stored.type === "image" ? (
          <img src={viewer.stored.dataUrl} alt="comprobante" style={{ width: "100%", borderRadius: 12, display: "block" }} />
        ) : (
          viewer && (
            <div>
              <div style={{ color: T.mut, fontSize: 13, marginBottom: 12 }}>{(viewer.stored && viewer.stored.name) || "Archivo adjunto"}</div>
              <a href={viewer.stored.dataUrl} download={(viewer.stored && viewer.stored.name) || "comprobante"} style={{ display: "block", textAlign: "center", background: T.gold, color: "#0A0F1E", borderRadius: 12, padding: "13px", fontWeight: 600, textDecoration: "none" }}>
                Abrir / descargar
              </a>
            </div>
          )
        ))}
      </Sheet>
    </div>
  );
}

function DivisasTab({ divisas, onAdd, onEdit, onDelete, onPatch, canWrite = true }) {
  const [openId, setOpenId] = useState(null);
  const [busyId, setBusyId] = useState(null);
  const [receiptErr, setReceiptErr] = useState("");
  const [viewer, setViewer] = useState(null);
  const ventas = divisas.filter((d) => d.kind === "venta");
  const compras = divisas.filter((d) => d.kind === "compra");
  const vesDe = (d) => (d.usd || 0) * (d.tasa || 0);
  const comisionDe = (d) => comOp(d);

  const usdVendidos = ventas.reduce((s, d) => s + (d.usd || 0), 0);
  const usdComprados = compras.reduce((s, d) => s + (d.usd || 0), 0);
  const usdFaltan = usdVendidos - usdComprados;

  const bsRecibidos = ventas.reduce((s, d) => s + vesDe(d), 0);
  const bsPagados = compras.reduce((s, d) => s + vesDe(d) + comisionDe(d), 0);
  const bsDisponibles = bsRecibidos - bsPagados;

  // Rentabilidad por venta con asignación automática FIFO (con fraccionamiento)
  const alloc = allocateFIFO(ventas, compras);
  const statsDeVenta = (v) => {
    const s = alloc.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0, allocs: [] };
    const vesGenerados = vesDe(v);
    const comVesV = comOp(v);
    const comUsdV = comUsdOf(v);
    const vesNeto = vesGenerados - comVesV;
    const vesRestantes = vesNeto - s.vesUsados;
    const usdEquiv = v.tasa > 0 ? s.vesUsados / v.tasa : 0;
    const gananciaUsd = s.usdRecomprado - usdEquiv - comUsdV;
    const rentab = usdEquiv > 0 ? (gananciaUsd / usdEquiv) * 100 : 0;
    return { allocs: s.allocs, usdRecomprado: s.usdRecomprado, vesUsados: s.vesUsados, vesGenerados, vesNeto, vesRestantes, comVesV, comUsdV, gananciaUsd, rentab };
  };
  const gananciaTotal = ventas.reduce((s, v) => s + statsDeVenta(v).gananciaUsd, 0);

  const ordenadas = divisas.slice().sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.createdAt || 0) - (a.createdAt || 0)));

  const chip = (label, val, color) => (
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11.5, color: T.mut, marginBottom: 3 }}>{label}</div>
      <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 13.5, fontWeight: 600, color: color || T.text }}>
        {val}
      </div>
    </div>
  );

  const seg = (active, color) => ({
    flex: 1, border: "none", borderRadius: 9, padding: "10px", fontSize: 14,
    fontWeight: 600, fontFamily: FONT, cursor: "pointer",
    background: active ? color : "transparent", color: active ? "#0A0F1E" : T.mut,
  });
  const miniBtn = { flex: 1, borderRadius: 11, padding: "11px", fontSize: 13.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer", textAlign: "center", boxSizing: "border-box" };
  const sortDesc = (a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.createdAt || 0) - (a.createdAt || 0));
  const sortAsc = (a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0));
  const ventasOrden = ventas.slice().sort(sortDesc);
  const sueltas = compras.filter((c) => !c.ventaId).slice().sort(sortDesc);

  async function onReceiptFile(op, e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBusyId(op.id); setReceiptErr("");
    try { const stored = await fileToStored(f); await idbPut(op.id, stored); onPatch(op.id, { hasReceipt: true }); }
    catch (ex) { setReceiptErr((ex && ex.message) || "No se pudo guardar el comprobante."); }
    finally { setBusyId(null); }
  }
  async function openReceipt(op) {
    setReceiptErr("");
    try { const stored = await idbGet(op.id); if (stored) setViewer({ op, stored }); else setReceiptErr("No se encontró el comprobante."); }
    catch { setReceiptErr("No se pudo abrir el comprobante."); }
  }
  async function removeReceipt(op) { await idbDel(op.id); onPatch(op.id, { hasReceipt: false }); }

  const [pagoMonto, setPagoMonto] = useState("");
  const [pagoFecha, setPagoFecha] = useState(todayISO());
  function addPagoVenta(v) {
    const n = numVE(pagoMonto);
    if (!(n > 0)) return;
    const ab = { id: uid(), usd: n, date: pagoFecha };
    onPatch(v.id, { abonos: [...(v.abonos || []), ab] });
    setPagoMonto(""); setPagoFecha(todayISO());
  }
  function delPagoVenta(v, a) {
    idbDel(a.id);
    onPatch(v.id, { abonos: (v.abonos || []).filter((x) => x.id !== a.id) });
  }
  async function onPagoReceiptFile(v, a, e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBusyId(a.id); setReceiptErr("");
    try {
      const stored = await fileToStored(f);
      await idbPut(a.id, stored);
      onPatch(v.id, { abonos: (v.abonos || []).map((x) => (x.id === a.id ? { ...x, hasReceipt: true } : x)) });
    } catch (ex) { setReceiptErr((ex && ex.message) || "No se pudo guardar el comprobante."); }
    finally { setBusyId(null); }
  }
  async function openPagoReceipt(a) {
    setReceiptErr("");
    try { const stored = await idbGet(a.id); if (stored) setViewer({ stored }); else setReceiptErr("No se encontró el comprobante en este dispositivo."); }
    catch (ex) { setReceiptErr("No se pudo abrir el comprobante."); }
  }

  const allocRow = (a, i) => {
    const c = a.compra;
    const parcial = a.usd < (c.usd || 0) - 1e-6;
    return (
      <button key={c.id + "-" + i} onClick={() => onEdit(c)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: T.text }}>
            {fmtUsd(a.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(c.tasa || 0).toLocaleString("es-VE")}</span>
            {parcial && <span style={{ color: T.gold, fontWeight: 400 }}> · parcial de {fmtUsd(c.usd)}</span>}
            {a.manual && <span style={{ color: T.blue, fontWeight: 400 }}> · manual</span>}
          </div>
          <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
            {fmtDate(c.date)} · {fmtBs(a.ves)}{comUsdOf(c) > 0 ? ` · com. ${fmtUsd(comUsdOf(c) * (a.usd / (c.usd || 1)))}` : ""}{c.persona ? ` · ${c.persona}` : ""}{c.referencia ? ` · ref ${c.referencia}` : ""}
          </div>
        </div>
        <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); }} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1, paddingLeft: 8 }} aria-label="Eliminar">×</button>
      </button>
    );
  };

  const compraRow = (c) => (
    <button key={c.id} onClick={() => onEdit(c)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: T.text }}>
          {fmtUsd(c.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(c.tasa || 0).toLocaleString("es-VE")}</span>
        </div>
        <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
          {fmtDate(c.date)} · {fmtBs(vesDe(c))} · com. {fmtBs(comisionDe(c))}{c.persona ? ` · ${c.persona}` : ""}{c.referencia ? ` · ref ${c.referencia}` : ""}
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); }} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1, paddingLeft: 8 }} aria-label="Eliminar">×</button>
    </button>
  );

  return (
    <div style={{ paddingTop: 4 }}>
      {/* Recuadro: faltante por comprar */}
      <div
        style={{
          background: `linear-gradient(160deg, ${T.card2}, ${T.card})`,
          border: `1px solid ${T.line}`,
          borderRadius: 20,
          padding: "20px",
          marginBottom: 18,
        }}
      >
        <div style={{ fontSize: 13, color: T.mut, fontWeight: 500 }}>Por comprar (posición)</div>
        <div style={{ display: "flex", gap: 14, marginTop: 10, marginBottom: 16 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: T.mut, marginBottom: 4 }}>USD faltan por comprar</div>
            <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 26, fontWeight: 600, letterSpacing: -0.5, color: usdFaltan > 0 ? T.gold : T.green }}>
              {fmtUsd(usdFaltan)}
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: T.mut, marginBottom: 4 }}>Bs disponibles</div>
            <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 26, fontWeight: 600, letterSpacing: -0.5, color: bsDisponibles >= 0 ? T.text : T.red }}>
              {fmtBs(bsDisponibles)}
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, paddingTop: 14, borderTop: `1px solid ${T.lineSoft}` }}>
          {chip("USD vendidos", fmtUsd(usdVendidos), T.green)}
          {chip("USD comprados", fmtUsd(usdComprados), T.blue)}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
          {chip("Bs recibidos", fmtBs(bsRecibidos), T.green)}
          {chip("Bs pagados", fmtBs(bsPagados), T.red)}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.lineSoft}` }}>
          {chip(
            "Ganancia total (diferencial)",
            `${gananciaTotal >= 0 ? "+" : ""}${fmtUsd(gananciaTotal)}`,
            gananciaTotal >= 0 ? T.green : T.red
          )}
        </div>
      </div>

      {/* Botones de alta */}
      <div style={{ display: canWrite ? "flex" : "none", gap: 10, marginBottom: 20 }}>
        <button
          onClick={() => onAdd("venta")}
          style={{ flex: 1, background: T.greenSoft, color: T.green, border: `1px solid ${T.green}`, borderRadius: 13, padding: "13px", fontSize: 14.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}
        >
          + Venta USD
        </button>
        <button
          onClick={() => onAdd("compra")}
          style={{ flex: 1, background: "rgba(91,141,239,0.14)", color: T.blue, border: `1px solid ${T.blue}`, borderRadius: 13, padding: "13px", fontSize: 14.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}
        >
          + Compra USD
        </button>
      </div>

      {/* Ventas (desplegables) */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Ventas</div>
      {ventasOrden.length === 0 ? (
        <div style={emptyRow}>Registrá tu primera venta de divisas</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {ventasOrden.map((v) => {
            const st = statsDeVenta(v);
            const open = openId === v.id;
            const pagos = v.abonos || [];
            const abonadoPago = pagos.reduce((s, a) => s + (a.usd || 0), 0);
            const pendientePago = (v.usd || 0) - abonadoPago;
            const pagado = abonadoPago >= (v.usd || 0) - 0.01 || !!v.pagado;
            const pagoParcial = !pagado && abonadoPago > 0.009;
            const completada = st.vesRestantes <= 0.01;
            const usdPorComprar = v.tasa > 0 ? st.vesRestantes / v.tasa : 0;
            return (
              <div key={v.id} style={{ ...rowCard, flexDirection: "column", alignItems: "stretch", padding: 0, overflow: "hidden" }}>
                <div onClick={() => setOpenId(open ? null : v.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, padding: "13px 15px", cursor: "pointer" }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: T.green, background: T.greenSoft, padding: "2px 8px", borderRadius: 6 }}>VENTA</span>
                      <span style={{ fontSize: 12, color: T.mut }}>{fmtDate(v.date)}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 6, color: completada ? T.blue : T.gold, background: completada ? "rgba(91,141,239,0.14)" : "rgba(227,178,77,0.14)", border: `1px solid ${completada ? T.blue : T.gold}` }}>
                        {completada ? "COMPLETADA" : "PENDIENTE"}
                      </span>
                      <span style={{ fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 6, color: pagado ? T.green : pagoParcial ? T.gold : T.mut2, background: pagado ? T.greenSoft : pagoParcial ? "rgba(227,178,77,0.14)" : T.bg2, border: `1px solid ${pagado ? T.green : pagoParcial ? T.gold : T.line}` }}>
                        {pagado ? "PAGADO" : pagoParcial ? "PARCIAL" : "NO PAGADO"}
                      </span>
                      {v.hasReceipt && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 6, color: T.blue, background: "rgba(91,141,239,0.14)" }}>ADJUNTO</span>}
                    </div>
                    <div style={{ fontSize: 14.5, fontWeight: 600, color: T.text }}>
                      {fmtUsd(v.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(v.tasa || 0).toLocaleString("es-VE")}</span>
                    </div>
                    <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
                      {fmtBs(vesDe(v))}{v.persona ? ` · ${v.persona}` : ""}
                    </div>
                    <div style={{ fontSize: 12, marginTop: 4, color: st.gananciaUsd >= 0 ? T.green : T.red, fontWeight: 600 }}>
                      {st.allocs.length} compra(s) · {st.gananciaUsd >= 0 ? "+" : ""}{fmtUsd(st.gananciaUsd)} ({st.rentab.toFixed(2)}%)
                    </div>
                    {!completada && (
                      <div style={{ fontSize: 11.5, color: T.gold, marginTop: 2 }}>
                        Falta comprar ≈ {fmtUsd(usdPorComprar)} · {fmtBs(st.vesRestantes)} disponibles
                      </div>
                    )}
                    {pagoParcial && (

                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>

                            </div>
                            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                              {a.hasReceipt ? (
                                <button onClick={() => openPagoReceipt(a)} style={{ ...miniBtn, flex: 1, background: T.blue, color: "#0A0F1E" }}>Ver comprobante</button>
                              ) : canWrite ? (
                                <label style={{ ...miniBtn, flex: 1, display: "block", background: "transparent", color: T.gold, border: `1px solid ${T.gold}` }}>
                                  {busyId === a.id ? "Guardando…" : "Cargar comprobante"}
                                  <input type="file" accept="image/*,application/pdf" style={{ display: "none" }} onChange={(e) => onPagoReceiptFile(v, a, e)} />
                                </label>
                              ) : null}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    <div style={{ fontSize: 12, color: pendientePago > 0.01 ? T.gold : T.green, marginTop: 8, fontFamily: MONO }}>
                      {pendientePago > 0.01 ? `Pendiente por pagar: ${fmtUsd(pendientePago)}` : "Pago completo."}
                    </div>
                    {canWrite && (
                      <div style={{ marginTop: 10, background: T.card2, border: `1px solid ${T.lineSoft}`, borderRadius: 12, padding: "11px 12px" }}>
                        <div style={{ display: "flex", gap: 8 }}>
                          <div style={{ flex: 1 }}>
                            <label style={labelStyle}>Monto USD</label>
                            <input style={{ ...inputStyle, fontFamily: MONO }} value={pagoMonto} onChange={(e) => setPagoMonto(e.target.value)} inputMode="decimal" placeholder="0.00" />
                          </div>
                          <div style={{ flex: 1 }}>
                            <label style={labelStyle}>Fecha</label>
                            <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={pagoFecha} onChange={(e) => setPagoFecha(e.target.value)} />
                          </div>
                        </div>
                        <button
                          onClick={() => addPagoVenta(v)}
                          disabled={!(numVE(pagoMonto) > 0)}
                          style={{ width: "100%", marginTop: 8, background: numVE(pagoMonto) > 0 ? T.green : T.card, color: numVE(pagoMonto) > 0 ? "#0A0F1E" : T.mut2, border: "none", borderRadius: 11, padding: "11px", fontSize: 14, fontWeight: 650, fontFamily: FONT, cursor: numVE(pagoMonto) > 0 ? "pointer" : "default" }}
                        >
                          Registrar pago
                        </button>
                      </div>
                    )}
                    {v.hasReceipt && (
                      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                        <button onClick={() => openReceipt(v)} style={{ ...miniBtn, flex: 1, background: "transparent", color: T.blue, border: `1px solid ${T.blue}` }}>Comprobante anterior</button>
                        <button onClick={() => removeReceipt(v)} style={{ ...miniBtn, background: "transparent", color: T.red, border: `1px solid ${T.red}` }}>Quitar</button>
                      </div>
                    )}
                    {receiptErr && <div style={{ fontSize: 12.5, color: T.red, marginTop: 8 }}>{receiptErr}</div>}

                    <div style={{ ...sectionTitle, margin: "16px 0 8px" }}>Compras asignadas (FIFO) ({st.allocs.length})</div>
                    {st.allocs.length === 0 ? (
                      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 6 }}>Aún sin compras asignadas a esta venta.</div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {st.allocs.map((a, i) => allocRow(a, i))}
                      </div>
                    )}

                    <div style={{ marginTop: 12, padding: "10px 12px", background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 10, fontSize: 12, color: T.mut }}>
                      VES generados {fmtBs(st.vesGenerados)} · usados {fmtBs(st.vesUsados)} · restante {fmtBs(st.vesRestantes)}
                      {st.comVesV > 0 ? ` · comisión ${fmtBs(st.comVesV)}` : ""}
                      {st.comUsdV > 0 ? ` · comisión ${fmtUsd(st.comUsdV)}` : ""}
                    </div>

                    <div style={{ display: "flex", gap: 8, marginTop: 14 }}>

                      <button onClick={() => onDelete(v.id)} style={{ ...miniBtn, background: "transparent", color: T.red, border: `1px solid ${T.red}` }}>Eliminar</button>

          })}

      {alloc.unalloc.length > 0 && (

          <div style={{ ...sectionTitle, margin: "22px 0 10px" }}>Sin asignar (sin venta con VES disponibles)</div>

                Abrir / descargar
