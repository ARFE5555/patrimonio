// Comparación estable (ignora el orden de las claves y los undefined)
function stableStr(v) {
  if (v === null || typeof v !== "object") return JSON.stringify(v);
  if (Array.isArray(v)) return "[" + v.map((x) => (x === undefined ? "null" : stableStr(x))).join(",") + "]";
  return "{" + Object.keys(v).filter((k) => v[k] !== undefined).sort()
    .map((k) => JSON.stringify(k) + ":" + stableStr(v[k])).join(",") + "}";
}

function notifySyncError(msg) {

let _sb = null;

      s.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
      s.onload = res;
      s.onerror = () => rej(new Error("No se pudo cargar Supabase. Revisá tu conexión."));
      document.head.appendChild(s);
    });

  _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Colección sincronizada: local (localStorage) o nube (una fila por entidad, con realtime).
   Mantiene la misma API que useState, así el resto de la app no cambia. */
function useCollection(localKey, table, session, canWrite) {
  const [items, setItems] = useState([]);
  const [ready, setReady] = useState(false);
  const prev = useRef([]);
  const cloud = CLOUD && !!session;

  /* Carga inicial.
     CRÍTICO: en la nube NUNCA se marca "listo" tras un fallo. Arrancar con una
     lista vacía por un error de red/token llevaría a escrituras que duplican o
     pisan lo que está en el servidor. Se reintenta hasta lograr una lectura buena. */
  useEffect(() => {
    let alive = true;
    (async () => {
      setReady(false);
      if (!cloud) {
        const rows = await loadKey(localKey, []);
        if (!alive) return;
        prev.current = rows;
        setItems(rows);
        setReady(true);
        return;
      }
      for (let attempt = 0; alive; attempt++) {
        try {
          const sb = await getSB();
          const { data: s } = await sb.auth.getSession();
          if (!s || !s.session) throw new Error("Sesión no disponible todavía");
          const PAGE = 1000;
          let rows = [];
          for (let off = 0; ; off += PAGE) {
            const { data, error } = await sb.from(table).select("id,data").range(off, off + PAGE - 1);
            if (error) throw error;
            rows = rows.concat((data || []).map((r) => ({ id: r.id, ...(r.data || {}) })));
            if (!data || data.length < PAGE) break;
          }
          if (!alive) return;
          prev.current = rows;
          setItems(rows);
          setReady(true);
          return;
        } catch (e) {
          console.error("load " + table, e);
          await new Promise((r) => setTimeout(r, Math.min(5000, 700 * (attempt + 1))));
        }
      }
    })();
    return () => { alive = false; };
  }, [cloud, session && session.user && session.user.id]);

  // Realtime: refleja los cambios de otros usuarios (ignora ecos idénticos)
  useEffect(() => {
    if (!cloud) return;
    let ch = null, alive = true;
    (async () => {
      const sb = await getSB();
      if (!alive) return;
      ch = sb.channel("rt_" + table)
        .on("postgres_changes", { event: "*", schema: "public", table }, (p) => {
          setItems((cur) => {
            if (p.eventType === "DELETE") return cur.filter((x) => x.id !== (p.old || {}).id);
            const row = { id: (p.new || {}).id, ...((p.new || {}).data || {}) };
            const i = cur.findIndex((x) => x.id === row.id);
            if (i >= 0 && stableStr(cur[i]) === stableStr(row)) return cur; // eco de nuestra propia escritura
            if (i < 0) return [row, ...cur];
            const c = cur.slice(); c[i] = row; return c;
          });
        })
        .subscribe();
    })();
    return () => { alive = false; if (ch) ch.unsubscribe(); };
  }, [cloud, table]);

  // Persistencia por diferencia: solo lo que realmente cambió
  useEffect(() => {
    if (!ready) return;
    const before = prev.current;
    prev.current = items;
    if (before === items) return; // misma referencia: es la carga inicial
    if (!cloud) { saveKey(localKey, items); return; }
    if (!canWrite) return;
    (async () => {
      try {
        const sb = await getSB();
        const byId = {};
        before.forEach((x) => { byId[x.id] = x; });
        const noId = items.filter((x) => x.id == null).length;
        if (noId) console.warn(table + ": " + noId + " elemento(s) sin id no se sincronizan");
        const ups = items
          .filter((x) => x.id != null)
          .filter((x) => { const p = byId[x.id]; return !p || stableStr(p) !== stableStr(x); })
          .map((x) => { const { id, ...data } = x; return { id, data, updated_at: new Date().toISOString() }; });
        // Dedupe defensivo: si dos elementos comparten id, sube solo el último
        const seenUp = new Set();
        for (let i = ups.length - 1; i >= 0; i--) {
          if (seenUp.has(ups[i].id)) ups.splice(i, 1);
          else seenUp.add(ups[i].id);
        }
        const ids = new Set(items.map((x) => x.id));
        const dels = Array.from(new Set(before.filter((x) => x.id != null && !ids.has(x.id)).map((x) => x.id)));
        const BATCH = 100;
        for (let i = 0; i < ups.length; i += BATCH) {
          const { error } = await sb.from(table).upsert(ups.slice(i, i + BATCH));
          if (error) throw error;
        }
        for (let i = 0; i < dels.length; i += BATCH) {
          const { error } = await sb.from(table).delete().in("id", dels.slice(i, i + BATCH));
          if (error) throw error;
        }
      } catch (e) {
        console.error("save " + table, e);
        notifySyncError("No se pudo guardar en la nube (" + table + "): " + ((e && e.message) || "error") + ". Tus últimos cambios podrían NO estar guardados. Verificá tu rol y tu conexión, y reintentá el cambio.");
      }
    })();
  }, [items, ready, cloud, canWrite]);

  return [items, setItems, ready];
}

/* Ajustes: una sola fila compartida (id = 'global') */
function useSettings(session, canWrite, defaults) {
  const [settings, setSettings] = useState(defaults);
  const [ready, setReady] = useState(false);
  const prev = useRef(defaults);
  const cloud = CLOUD && !!session;

  useEffect(() => {
    let alive = true;
    (async () => {
      setReady(false);
      if (!cloud) {
        const val = await loadKey("fin:settings", defaults);
        if (!alive) return;
        prev.current = val;
        setSettings(val);
        setReady(true);
        return;
      }
      for (let attempt = 0; alive; attempt++) {
        try {
          const sb = await getSB();
          const { data: s } = await sb.auth.getSession();
          if (!s || !s.session) throw new Error("Sesión no disponible todavía");
          const { data, error } = await sb.from("settings").select("data").eq("id", "global").maybeSingle();
          if (error) throw error;
          if (!alive) return;
          const val = data && data.data ? { ...defaults, ...data.data } : defaults;
          prev.current = val;
          setSettings(val);
          setReady(true);
          return;
        } catch (e) {
          console.error("load settings", e);
          await new Promise((r) => setTimeout(r, Math.min(5000, 700 * (attempt + 1))));
        }
      }
    })();
    return () => { alive = false; };
  }, [cloud, session && session.user && session.user.id]);

  useEffect(() => {
    if (!cloud) return;
    let ch = null, alive = true;
    (async () => {
      const sb = await getSB();
      if (!alive) return;
      ch = sb.channel("rt_settings")
        .on("postgres_changes", { event: "*", schema: "public", table: "settings" }, (p) => {
          if ((p.new || {}).id !== "global") return;
          setSettings((cur) => {
            const next = { ...cur, ...((p.new || {}).data || {}) };
            return stableStr(next) === stableStr(cur) ? cur : next;
          });
        })
        .subscribe();
    })();
    return () => { alive = false; if (ch) ch.unsubscribe(); };
  }, [cloud]);

  useEffect(() => {
    if (!ready) return;
    const before = prev.current;
    prev.current = settings;
    if (before === settings) return;
    if (!cloud) { saveKey("fin:settings", settings); return; }
    if (!canWrite) return;
    if (stableStr(before) === stableStr(settings)) return;
    (async () => {
      try {
        const sb = await getSB();
        await sb.from("settings").upsert([{ id: "global", data: settings, updated_at: new Date().toISOString() }]);
      } catch (e) {
        console.error("save settings", e);
        notifySyncError("No se pudieron guardar los ajustes en la nube: " + ((e && e.message) || "error"));
      }
    })();
  }, [settings, ready, cloud, canWrite]);

  return [settings, setSettings, ready];
}

async function loadKey(k, fb) {
  const raw = await store.get(k);
  if (!raw) return fb;
  try {
    return JSON.parse(raw);
  } catch {
    return fb;
  }
}

function money(n, cur, opts = {}) {
  const c = (cur || "usd").toUpperCase();
  try {
    return new Intl.NumberFormat("es-ES", {
      style: "currency",
      currency: c,
      minimumFractionDigits: opts.min ?? 2,
      maximumFractionDigits: opts.max ?? 2,
    }).format(Number.isFinite(n) ? n : 0);
  } catch {
    return `${(Number.isFinite(n) ? n : 0).toFixed(2)} ${c}`;
  }
}
function coinPrice(n, cur) {
  const abs = Math.abs(n || 0);
  const max = abs >= 100 ? 2 : abs >= 1 ? 2 : 6;
  return money(n, cur, { min: 2, max });
}
const pct = (n) => `${n >= 0 ? "+" : ""}${(n || 0).toFixed(2)}%`;
const fmtUsd = (n) =>
  "$ " + (Number.isFinite(n) ? n : 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBs = (n) =>
  "Bs " + (Number.isFinite(n) ? n : 0).toLocaleString("es-VE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const COMISION = { mismo: 0, otros: 0.003 };
const COMISION_LABEL = { mismo: "Mismo banco (0%)", otros: "Otros bancos (0,3%)" };

// Comisión de una operación: usa el monto importado (comisionBs) si existe, si no la deriva del tipo
function comOp(d) {
  // comisión que consume VES (banco %, monto en VES, o importada)
  if (typeof d.comisionBs === "number" && !isNaN(d.comisionBs)) return d.comisionBs;
  const mode = d.comMode || "pct";
  if (mode === "ves") return d.comisionVesInput || 0;
  if (mode === "usd") return 0; // la comisión en USD NO consume bolívares
  return (d.usd || 0) * (d.tasa || 0) * (COMISION[d.comisionTipo] || 0);
}
function comUsdOf(d) {
  // comisión cobrada en USD (ej. fee P2P de Binance): reduce el USDT neto
  return d.comMode === "usd" ? (d.comisionUsdInput || 0) : 0;
}

// Capacidad de VES de una venta (generados menos comisión en VES)
const capOf = (v) => Math.max(0, (v.usd || 0) * (v.tasa || 0) - comOp(v));

// Asignación de compras a ventas:
//  - respeta las asignaciones manuales (compra.manualAllocs, en orden)
//  - el resto se asigna automáticamente por orden de llegada (FIFO), fraccionando
// El automático no restringe por fecha: una compra puede alimentar una venta anterior o posterior.
function allocateFIFO(ventas, compras) {
  // Orden de llegada: el orden en que se cargaron (fila del Excel para lo sincronizado).
  // No se ordena por fecha: una compra puede alimentar una venta anterior o posterior.
  const seq = (x) => (x.row != null ? x.row : (x.createdAt || 0));
  const arriv = (a, b) => seq(a) - seq(b);
  const buckets = ventas.slice().sort(arriv).map((v) => ({ v, cap: capOf(v), used: 0 }));
  const byId = {};
  buckets.forEach((b) => { byId[b.v.id] = b; });
  const ventaStats = {};
  buckets.forEach((b) => { ventaStats[b.v.id] = { usdRecomprado: 0, usdBruto: 0, vesUsados: 0, allocs: [] }; });
  const unalloc = [];
  const EPS = 1e-6;

  const state = compras.slice().sort(arriv).map((c) => {
    const gross = c.usd || 0;
    const net = gross - comUsdOf(c); // USDT neto tras comisión en USD
    const W = gross * (c.tasa || 0) + comOp(c); // VES que consume (con comisión en VES)
    return { c, gross, net, W, remaining: W };
  });

  const put = (b, st, take, manual) => {
    const f = take / st.W;
    b.used += take;
    const s = ventaStats[b.v.id];
    s.usdRecomprado += st.net * f;
    s.usdBruto += st.gross * f;
    s.vesUsados += take;
    s.allocs.push({ compraId: st.c.id, compra: st.c, usd: st.gross * f, net: st.net * f, ves: take, manual: !!manual });
    st.remaining -= take;
  };

  // Paso A: asignaciones manuales (lista ordenada de ventas; llena cada una y pasa a la siguiente)
  for (const st of state) {
    if (st.W <= EPS) continue;
    const manual = st.c.manualAllocs && st.c.manualAllocs.length
      ? st.c.manualAllocs
      : (st.c.ventaId ? [st.c.ventaId] : []);
    for (const vid of manual) {
      if (st.remaining <= EPS) break;
      const b = byId[vid];
      if (!b) continue; // asignación manual: puede ir a cualquier venta, incluso posterior a la compra
      const take = Math.min(b.cap - b.used, st.remaining);
      if (take > EPS) put(b, st, take, true);
    }
  }

  // Paso B: FIFO automático para lo que quede (por orden de llegada, sin restricción de fecha)
  for (const st of state) {
    if (st.W <= EPS || st.remaining <= EPS) continue;
    for (const b of buckets) {
      if (st.remaining <= EPS) break;
      if (b.used >= b.cap - EPS) continue;
      const take = Math.min(b.cap - b.used, st.remaining);
      if (take > EPS) put(b, st, take, false);
    }
    if (st.remaining > EPS) {
      const f = st.remaining / st.W;
      unalloc.push({ compraId: st.c.id, compra: st.c, usd: st.gross * f, net: st.net * f, ves: st.remaining });
    }
  }

  Object.keys(ventaStats).forEach((k) => {
    ventaStats[k].allocs.sort((a, b) => arriv(a.compra, b.compra));
  });
  return { ventaStats, unalloc };
}

/* ── Multimoneda: conversión USD ↔ VES ── */
function latestRateFromHistory(settings, onOrBefore) {
  const hist = (settings && settings.rateHistory) || [];
  const elig = onOrBefore ? hist.filter((r) => r.date <= onOrBefore) : hist;
  if (!elig.length) return null;
  const latest = elig.slice().sort((a, b) => (a.date < b.date ? 1 : -1))[0];
  return latest && latest.rate > 0 ? latest.rate : null;
}
function vesRateOf(settings, divisas) {
  const h = latestRateFromHistory(settings, null);
  if (h) return h;
  const manual = settings && Number(settings.vesRate);
  if (manual && manual > 0) return manual;
  const ops = (divisas || []).filter((d) => d.tasa > 0).slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  return ops.length ? ops[0].tasa : null;
}
function rateForDate(settings, divisas, date) {
  const h = latestRateFromHistory(settings, date);
  if (h) return h;
  const ops = (divisas || []).filter((d) => d.tasa > 0 && d.date <= date).slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  if (ops.length) return ops[0].tasa;
  return vesRateOf(settings, divisas);
}
function convertAmt(amount, from, to, rate) {
  if (!from || from === to) return amount;
  if (from === "usd" && to === "ves") return rate ? amount * rate : null;
  if (from === "ves" && to === "usd") return rate ? amount / rate : null;
  return null; // par no soportado
}

/* ── Lectura de Google Sheets (CSV publicado) ── */
function parseCSV(text) {
  const rows = [];
  let field = "", row = [], inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else if (c === "\r") { /* ignora */ }

function numVE(s) {

}
function parseDivisasCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const header = rows[0].map((h) => (h || "").toLowerCase().trim());
  const find = (...keys) => header.findIndex((h) => keys.some((k) => h === k || h.includes(k)));
  const iF = find("fecha"), iP = find("persona"), iT = find("tasa"),
    iR = find("referencia", "ref"), iTipo = find("tipo");
  const iU = header.findIndex((h) => (h === "usd" || h.includes("usd")) && !h.includes("comi") && !h.includes("fee"));
  const iComUsd = header.findIndex((h) => (h.includes("comi") || h.includes("fee")) && h.includes("usd"));
  const iCom = header.findIndex((h, idx) => h.includes("comi") && idx !== iComUsd);
  const out = [];
  const seenRef = {};
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every((c) => !String(c || "").trim())) continue;
    const usd = numVE(row[iU]);
    const tasa = numVE(row[iT]);
    if (isNaN(usd) || isNaN(tasa)) continue;
    const ves = usd * tasa;
    const tipoRaw = iTipo >= 0 ? String(row[iTipo] || "").toLowerCase() : "";
    const kind = tipoRaw.includes("venta") ? "venta" : "compra";
    const persona = iP >= 0 ? String(row[iP] || "").trim() : "";
    const referencia = iR >= 0 ? String(row[iR] || "").trim() : "";
    const date = fechaISO(row[iF]);
    let refKey = referencia || `${kind}|${date}|${usd}|${tasa}|${persona}`;
    // Referencias repetidas (o operaciones idénticas sin referencia): cada
    // ocurrencia recibe un sufijo estable para que sean operaciones distintas.
    const occ = (seenRef[refKey] = (seenRef[refKey] || 0) + 1);
    if (occ > 1) refKey = refKey + "#" + occ;
    const op = { kind, date, persona, usd, tasa, referencia, refKey, source: "sheet", row: out.length };
    const comUsd = iComUsd >= 0 ? numVE(row[iComUsd]) : NaN;
    if (!isNaN(comUsd) && comUsd > 0) {
      op.comMode = "usd";
      op.comisionUsdInput = comUsd;
    } else if (iCom >= 0) {
      const raw = String(row[iCom] || "");
      if (raw.indexOf("%") >= 0) { const p = numVE(raw); op.comisionBs = isNaN(p) ? 0 : ves * (p / 100); }
      else { const v = numVE(raw); op.comisionBs = isNaN(v) ? 0 : v; }

      op.comisionBs = 0;

  }

}
function mergeSheetOps(prev, rows) {
  const prevSheet = prev.filter((d) => d.source === "sheet");
  const manual = prev.filter((d) => d.source !== "sheet");
  const prevByRef = {};
  prevSheet.forEach((d) => { if (d.refKey) prevByRef[d.refKey] = d; });
  // El orden de llegada es el orden de las filas del Sheet. Las operaciones ya
  // conocidas CONSERVAN su posición original (no se reindexan), y las que ya no
  // aparecen en el Sheet NO se borran: la nube es la fuente de verdad histórica.
  let nextRow = prevSheet.reduce((m, d) => Math.max(m, (d.row != null ? d.row : 0) + 1), 0);
  const seen = new Set();
  const merged = rows.map((r) => {
    seen.add(r.refKey);
    const ex = prevByRef[r.refKey];
    if (ex) {
      const pos = ex.row != null ? ex.row : (ex.createdAt || 0);
      // Si la comisión fue definida en la app (p. ej. fee de Binance en USD) y el
      // Sheet no trae una comisión USD propia, se preserva la de la app.
      const keepCom = ex.comMode && r.comMode !== "usd";
      return {
        ...r, id: ex.id, createdAt: pos, row: pos,
        manualAllocs: ex.manualAllocs, pagado: ex.pagado, hasReceipt: ex.hasReceipt, abonos: ex.abonos,
        ...(keepCom
          ? { comMode: ex.comMode, comisionTipo: ex.comisionTipo, comisionUsdInput: ex.comisionUsdInput, comisionVesInput: ex.comisionVesInput, comisionBs: undefined }
          : {}),
      };
    }
    const pos = nextRow++;
    return { ...r, id: uid(), createdAt: pos, row: pos };
  });
  const kept = prevSheet.filter((d) => !seen.has(d.refKey));
  return [...merged, ...kept, ...manual];
}

/* ── Comprobantes: guardados en IndexedDB (soporta archivos grandes) ── */
function idbOpen() {
  return new Promise((res, rej) => {
    if (!window.indexedDB) { rej(new Error("Este navegador no soporta guardar comprobantes.")); return; }
    const r = window.indexedDB.open("patrimonio", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("receipts");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPut(id, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const t = db.transaction("receipts", "readwrite");
    t.objectStore("receipts").put(val, id);
    t.oncomplete = () => res();
    t.onerror = () => rej(t.error);
  });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const t = db.transaction("receipts", "readonly");
    const rq = t.objectStore("receipts").get(id);
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => rej(rq.error);
  });
}
async function idbDel(id) {
  try {
    const db = await idbOpen();
    return new Promise((res) => {
      const t = db.transaction("receipts", "readwrite");
      t.objectStore("receipts").delete(id);
      t.oncomplete = () => res();
      t.onerror = () => res();
    });
  } catch { /* ignora */ }
}
// Comprime imágenes; los PDF u otros se leen tal cual (con límite de tamaño)
function fileToStored(file) {
  return new Promise((res, rej) => {
    if (file.type && file.type.indexOf("image/") === 0) {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const maxDim = 1400;
        let { width, height } = img;
        if (width > height && width > maxDim) { height = (height * maxDim) / width; width = maxDim; }
        else if (height > maxDim) { width = (width * maxDim) / height; height = maxDim; }
        const c = document.createElement("canvas");
        c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        URL.revokeObjectURL(url);
        res({ dataUrl: c.toDataURL("image/jpeg", 0.7), type: "image" });
      };
      img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("No se pudo leer la imagen.")); };
      img.src = url;
    } else {
      if (file.size > 6 * 1024 * 1024) { rej(new Error("El archivo es muy grande (máx. 6 MB).")); return; }
      const fr = new FileReader();
      fr.onload = () => res({ dataUrl: fr.result, type: "file", name: file.name });
      fr.onerror = () => rej(new Error("No se pudo leer el archivo."));
      fr.readAsDataURL(file);
    }
  });
}
function relTime(ts) {
  if (!ts) return "—";
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 5) return "recién";
  if (s < 60) return `hace ${s}s`;
  const m = Math.round(s / 60);
  return `hace ${m}m`;
}
function todayISO() {
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 10);
}
function fmtDate(iso) {
  try {
    return new Date(iso + "T00:00:00").toLocaleDateString("es-ES", {
      day: "2-digit",
      month: "short",
    });
  } catch {
    return iso;
  }
}

        updates[id] = data; updated++;
      } else {
        addD(data.accountId, txnDelta(data));
        newTxns.push({ ...data, id: uid(), createdAt: Date.now() }); added++;
      }
    }
    setTxns((prev) => [...newTxns, ...prev.map((t) => (updates[t.id] ? { ...t, ...updates[t.id] } : t))]);
    setAccounts((prev) => prev.map((a) => (balDelta[a.id] ? { ...a, balance: (a.balance || 0) + balDelta[a.id] } : a)));
    return { updated, added, skipped };
  }

  /* Acciones divisas */
  function saveDivisa(data) {
    setDivisas((prev) => {
      if (data.id) return prev.map((d) => (d.id === data.id ? { ...d, ...data } : d));
      return [{ ...data, id: uid(), createdAt: Date.now() }, ...prev];
    });
    setDivisaSheet(null);
  }
  function addAbono(data) {
    setDivisas((prev) => [{ ...data, kind: "abono", id: uid(), createdAt: Date.now() }, ...prev]);
  }
  function deleteDivisa(id) {
    setDivisas((prev) => prev.filter((d) => d.id !== id));
    idbDel(id);
    setDivisaSheet(null);
  }
  function patchDivisa(id, patch) {
    setDivisas((prev) => prev.map((d) => (d.id === id ? { ...d, ...patch } : d)));
  }
  function setVesRate(date, rate) {
    if (!(rate > 0) || !date) return;
    setSettings((s) => {
      const hist = (s.rateHistory || []).filter((r) => r.date !== date);
      return { ...s, rateHistory: [...hist, { date, rate }].sort((a, b) => (a.date < b.date ? -1 : 1)) };
    });
  }
  function restoreBackup(d) {
    // Repara ids faltantes o duplicados (de datos con el bug viejo) sin perder filas
    const fixIds = (arr) => {
      const seen = new Set();
      return (arr || []).map((x) => {
        let id = x.id;
        if (id == null || seen.has(id)) id = uid();
        seen.add(id);
        return { ...x, id };
      });
    };
    if (d.accounts) setAccounts(fixIds(d.accounts));
    if (d.txns) setTxns(fixIds(d.txns));
    if (d.divisas) setDivisas(fixIds(d.divisas));
    if (d.projectsMeta) setProjectsMeta(d.projectsMeta.map((m) => ({ ...m, id: m.id || m.name })));
    if (d.settings) setSettings((s) => ({ ...s, ...d.settings }));
  }
  function saveProject(oldName, data) {
    const name = (data.name || "").trim();
    if (!name) return;
    if (oldName && oldName !== name) {
      setTxns((prev) => prev.map((t) => (t.project === oldName ? { ...t, project: name } : t)));
    }
    setProjectsMeta((prev) => {
      const filt = prev.filter((m) => m.name !== oldName && m.name !== name);
      return [...filt, { id: name, name, color: data.color, emoji: data.emoji, opening: data.opening || {} }];
    });
    setProjectSheet(null);
  }
  function deleteProject(name) {
    setTxns((prev) => prev.map((t) => (t.project === name ? { ...t, project: undefined } : t)));
    setProjectsMeta((prev) => prev.filter((m) => m.name !== name));
    setProjectSheet(null);
  }
  async function syncSheet(url) {
    const u = (url || settings.sheetUrl || "").trim();
    if (!u) return { ok: false, error: "Pegá primero el link CSV de tu Google Sheet." };
    const res = await fetch(u);
    if (!res.ok) throw new Error("No se pudo leer el Sheet (código " + res.status + ").");
    const text = await res.text();
    const rows = parseDivisasCSV(text);
    // Protección: si el CSV llega vacío pero ya teníamos operaciones del Sheet,
    // lo más probable es un fallo de descarga/parseo — no borrar nada.
    setDivisas((prev) => {
      if (!rows.length && prev.some((d) => d.source === "sheet")) return prev;
      return mergeSheetOps(prev, rows);
    });
    return { ok: true, count: rows.length };
  }

  if (!loaded)
    return (
      <div style={{ ...shell, alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: T.mut, fontFamily: FONT }}>Cargando…</div>
      </div>
    );

  if (CLOUD && session && !loaded) {

  }

  return (

        <select

/* ─────────────────────────────  Autenticación / Roles  ───────────────────────────── */
function App() {
  const [session, setSession] = useState(null);
  const [role, setRole] = useState(null);
  const [checking, setChecking] = useState(CLOUD);
  const [authErr, setAuthErr] = useState("");

  useEffect(() => {
    if (!CLOUD) return;
    let alive = true, sub = null;
    (async () => {
      try {
        const sb = await getSB();
        const { data } = await sb.auth.getSession();
        if (!alive) return;
        setSession(data.session || null);
        setChecking(false);
        sub = sb.auth.onAuthStateChange((_e, s) => { setSession(s || null); }).data.subscription;
      } catch (e) {
        if (alive) { setAuthErr(e.message || "No se pudo conectar."); setChecking(false); }
      }
    })();
    return () => { alive = false; if (sub) sub.unsubscribe(); };
  }, []);

  // Rol del usuario (viene del servidor; la app solo lo refleja)
  useEffect(() => {
    if (!CLOUD || !session) { setRole(null); return; }
    let alive = true;
    (async () => {
      const sb = await getSB();
      const { data } = await sb.from("profiles").select("role").eq("id", session.user.id).maybeSingle();
      if (alive) setRole((data && data.role) || "viewer");
    })();
    return () => { alive = false; };
  }, [session && session.user && session.user.id]);

  async function signOut() {
    const sb = await getSB();
    await sb.auth.signOut();
    setSession(null);
  }

  if (!CLOUD) return <AppMain session={null} role={null} signOut={null} />;
  if (checking) return <Splash msg="Conectando…" />;
  if (authErr) return <Splash msg={authErr} />;
  if (!session) return <LoginScreen onDone={setSession} />;
  if (!role) return <Splash msg="Cargando permisos…" />;
  return <AppMain session={session} role={role} signOut={signOut} />;
}

function Splash({ msg }) {
  return (
    <div style={{ ...shell, alignItems: "center", justifyContent: "center" }}>
      <style>{css}</style>
      <div style={{ color: T.mut, fontFamily: FONT, padding: 24, textAlign: "center" }}>{msg}</div>
    </div>
  );
}

function LoginScreen({ onDone }) {
  const [mode, setMode] = useState("in"); // in | up
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  async function submit() {
    setBusy(true); setMsg("");
    try {
      const sb = await getSB();
      if (mode === "up") {
        const { data, error } = await sb.auth.signUp({ email: email.trim(), password: pass });
        if (error) throw error;
        if (data.session) onDone(data.session);
        else setMsg("Cuenta creada. Revisá tu email para confirmarla y después iniciá sesión.");
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pass });
        if (error) throw error;
        onDone(data.session);
      }
    } catch (e) {
      setMsg(e.message || "No se pudo completar la operación.");
    } finally { setBusy(false); }
  }

  return (
    <div style={{ ...shell, justifyContent: "center", padding: "0 24px" }}>
      <style>{css}</style>
      <div style={{ marginBottom: 28, textAlign: "center" }}>
        <div style={{ width: 60, height: 60, borderRadius: 16, background: T.goldSoft, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 14 }}>
          <IconChart color={T.gold} />
        </div>
        <div style={{ fontSize: 24, fontWeight: 700, color: T.text, letterSpacing: -0.4 }}>Patrimonio</div>
        <div style={{ fontSize: 13.5, color: T.mut, marginTop: 4 }}>
          {mode === "in" ? "Iniciá sesión para continuar" : "Creá tu cuenta"}
        </div>
      </div>
      <Field label="Email">
        <input style={inputStyle} value={email} onChange={(e) => setEmail(e.target.value)} type="email" autoCapitalize="none" autoCorrect="off" placeholder="tu@email.com" />
      </Field>
      <Field label="Contraseña">
        <input style={inputStyle} value={pass} onChange={(e) => setPass(e.target.value)} type="password" placeholder="••••••••" />
      </Field>
      <PrimaryBtn color={T.gold} disabled={busy || !email.trim() || pass.length < 6} onClick={submit}>
        {busy ? "…" : mode === "in" ? "Entrar" : "Crear cuenta"}
      </PrimaryBtn>
      <button onClick={() => { setMode(mode === "in" ? "up" : "in"); setMsg(""); }} style={{ ...btnGhost, width: "100%", marginTop: 14, color: T.mut }}>
        {mode === "in" ? "No tengo cuenta — registrarme" : "Ya tengo cuenta — iniciar sesión"}
      </button>
      {msg && <div style={{ fontSize: 13, color: T.mut, marginTop: 14, textAlign: "center", lineHeight: 1.5 }}>{msg}</div>}
      <div style={{ fontSize: 11.5, color: T.mut2, marginTop: 26, textAlign: "center", lineHeight: 1.6 }}>
        Las cuentas nuevas entran como <b>Consulta</b>. Un editor puede cambiar tu rol desde Ajustes.
      </div>
    </div>
  );
}

/* Gestión de usuarios (solo editor) */
function UsersPanel({ session, role, signOut }) {
  const [users, setUsers] = useState([]);
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  async function load() {
    if (role !== "editor") return;
    const sb = await getSB();
    const { data, error } = await sb.from("profiles").select("id,email,role").order("email");
    if (!error) setUsers(data || []);
  }
  useEffect(() => { load(); }, [role]);

  async function changeRole(id, newRole) {
    setBusy(true); setMsg("");
    try {
      const sb = await getSB();
      const { error } = await sb.from("profiles").update({ role: newRole }).eq("id", id);
      if (error) throw error;
      setUsers((u) => u.map((x) => (x.id === id ? { ...x, role: newRole } : x)));
      setMsg("Rol actualizado.");
    } catch (e) { setMsg(e.message || "No se pudo cambiar el rol."); }
    finally { setBusy(false); }
  }

  return (
    <div>
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Mi cuenta</div>
      <div style={{ ...rowCard, marginBottom: 10 }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: T.text, overflow: "hidden", textOverflow: "ellipsis" }}>
            {session.user.email}
          </div>
          <div style={{ fontSize: 12, color: T.mut }}>{ROLE_LABEL[role] || role}</div>
        </div>
        <button onClick={signOut} style={{ ...btnGhost, color: T.red }}>Salir</button>
      </div>

      {role === "editor" && (
        <>
          <div style={{ ...sectionTitle, margin: "24px 0 10px" }}>Usuarios</div>
          <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12, lineHeight: 1.5 }}>
            Consulta: solo ve. Carga de datos: agrega movimientos y divisas. Editor: acceso total.
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {users.map((u) => (
              <div key={u.id} style={{ ...rowCard, flexDirection: "column", alignItems: "stretch", gap: 8 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: T.text, overflow: "hidden", textOverflow: "ellipsis" }}>
                  {u.email}{u.id === session.user.id ? " (vos)" : ""}
                </div>
                <select
                  style={{ ...inputStyle, appearance: "none", fontSize: 13.5, padding: "9px 11px" }}
                  value={u.role}
                  disabled={busy || u.id === session.user.id}
                  onChange={(e) => changeRole(u.id, e.target.value)}
                >
                  <option value="viewer">{ROLE_LABEL.viewer}</option>
                  <option value="loader">{ROLE_LABEL.loader}</option>
                  <option value="editor">{ROLE_LABEL.editor}</option>
                </select>
              </div>
            ))}
          </div>
          {msg && <div style={{ fontSize: 12.5, color: T.mut, marginTop: 10 }}>{msg}</div>}
        </>
      )}
    </div>
  );
}

                  display: "flex",
                  alignItems: "center",
                  gap: 6,
                  marginBottom: 3,
                }}
              >
                <span
                  style={{
                    width: 8,
                    height: 8,
                    borderRadius: 3,
                    background: p.color,
                  }}
                />
                <span style={{ fontSize: 12, color: T.mut }}>{p.label}</span>
              </div>
              <div
                style={{
                  fontFamily: MONO,
                  fontVariantNumeric: "tabular-nums",
                  fontSize: 14,
                  color: T.text,
                  fontWeight: 500,
                }}
              >
                {money(p.val, cur, { max: 0 })}
              </div>
            </div>
          ))}
        </div>
      </div>

      {totals.sinConvertir > 0 && (
        <div style={{ ...emptyRow, marginTop: 12, textAlign: "left", borderStyle: "solid", borderColor: T.gold, color: T.mut }}>
          {totals.sinConvertir} cuenta(s) no se pudieron convertir a {cur.toUpperCase()} y quedan fuera del total.
          Para cuentas en VES, cargá la tasa en Ajustes o registrá una operación de divisas.
        </div>
      )}

      {/* Ticker en vivo */}
      <div style={{ marginTop: 22, marginBottom: 8, ...sectionTitle }}>
        Mercado en vivo
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {TICKER.map((t) => {
          const p = prices[t.id];
          const up = (p?.change ?? 0) >= 0;
          return (
            <div key={t.id} style={rowCard}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <CoinBadge sym={t.sym} />
                <div>
                  <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>
                    {t.sym}
                  </div>
                  <div style={{ fontSize: 12, color: T.mut }}>{t.id}</div>
                </div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div
                  style={{
                    fontFamily: MONO,
                    fontVariantNumeric: "tabular-nums",
                    fontSize: 15,
                    color: T.text,
                    fontWeight: 500,
                  }}
                >
                  {p ? coinPrice(p.price, cur) : "—"}
                </div>
                {p && (
                  <div
                    style={{
                      fontSize: 12,
                      fontWeight: 600,
                      color: up ? T.green : T.red,
                    }}
                  >
                    {pct(p.change)}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────────────────────────  Tab: Cuentas  ───────────────────────────── */
function AccountsTab({ accounts, prices, cur, settings, vesRate, onSetRate, onAdd, onEdit, canEdit = true }) {
  const groups = ["bank", "cash", "crypto"];
  const [rateInput, setRateInput] = useState("");
  const [rateDate, setRateDate] = useState(todayISO());
  const vesTotal = accounts
    .filter((a) => a.type !== "crypto" && (a.currency || cur) === "ves")
    .reduce((s, a) => s + (a.balance || 0), 0);
  const vesInUsd = vesRate ? vesTotal / vesRate : null;
  const hist = (settings && settings.rateHistory) || [];
  return (
    <div style={{ paddingTop: 8 }}>
      {/* Tasa de cambio (manual, para cuentas VES) */}
      <div style={{ background: `linear-gradient(160deg, ${T.card2}, ${T.card})`, border: `1px solid ${T.line}`, borderRadius: 18, padding: "18px", marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div style={{ fontSize: 13, color: T.mut, fontWeight: 500 }}>Tasa de cambio (VES/USD)</div>
          {hist.length > 0 && <div style={{ fontSize: 11.5, color: T.mut2 }}>{hist.length} registro(s)</div>}
        </div>
        <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 30, fontWeight: 600, letterSpacing: -0.5, color: T.text, margin: "4px 0 12px" }}>
          {vesRate ? vesRate.toLocaleString("es-VE", { maximumFractionDigits: 2 }) : "—"}
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
          <div style={{ flex: 1.3 }}>
            <label style={labelStyle}>Nueva tasa</label>
            <input style={{ ...inputStyle, fontFamily: MONO }} value={rateInput} onChange={(e) => setRateInput(e.target.value)} inputMode="decimal" placeholder="Ej. 38,50" />
          </div>
          <div style={{ flex: 1 }}>
            <label style={labelStyle}>Fecha</label>
            <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={rateDate} onChange={(e) => setRateDate(e.target.value)} />
          </div>
        </div>
        <button
          onClick={() => { const r = numVE(rateInput); if (r > 0) { onSetRate(rateDate, r); setRateInput(""); } }}
          disabled={!canEdit || !(numVE(rateInput) > 0)}
          style={{ width: "100%", marginTop: 10, background: numVE(rateInput) > 0 ? T.gold : T.card2, color: numVE(rateInput) > 0 ? "#0A0F1E" : T.mut2, border: "none", borderRadius: 12, padding: "12px", fontSize: 15, fontWeight: 650, fontFamily: FONT, cursor: numVE(rateInput) > 0 ? "pointer" : "default" }}
        >
          Guardar tasa del día
        </button>
        {vesTotal > 0 && (
          <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.lineSoft}`, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <span style={{ fontSize: 12.5, color: T.mut }}>Proyección VES → USD</span>
            <span style={{ fontFamily: MONO, fontSize: 14, color: T.text, fontWeight: 600 }}>
              {fmtBs(vesTotal)} ≈ {vesInUsd != null ? fmtUsd(vesInUsd) : "—"}
            </span>
          </div>
        )}
      </div>

      {groups.map((g) => {
        const list = accounts.filter((a) => a.type === g);
        return (
          <div key={g} style={{ marginBottom: 22 }}>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
                marginBottom: 10,
              }}
            >
              <span style={sectionTitle}>{TYPE_LABEL[g]}</span>
              {canEdit && (
                <button onClick={() => onAdd(g)} style={{ ...btnGhost, color: ACCENT[g] }}>
                  + Agregar
                </button>
              )}
            </div>
            {list.length === 0 ? (
              <div style={emptyRow}>Sin cuentas de {TYPE_LABEL[g].toLowerCase()}</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {list.map((a) => {
                  const value =
                    a.type === "crypto"
                      ? (a.amount || 0) *
                        (prices[a.coinId]?.price ?? a.manualPrice ?? 0)
                      : a.balance || 0;
                  return (
                    <button
                      key={a.id}
                      onClick={() => onEdit(a)}
                      style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        {a.type === "crypto" ? (
                          <CoinBadge sym={a.symbol} />
                        ) : (
                          <span
                            style={{
                              width: 36,
                              height: 36,
                              borderRadius: 10,
                              background: T.card2,
                              display: "flex",
                              alignItems: "center",
                              justifyContent: "center",
                            }}
                          >
                            {a.type === "bank" ? (
                              <IconWallet color={ACCENT.bank} />
                            ) : (
                              <IconCash color={ACCENT.cash} />
                            )}
                          </span>
                        )}
                        <div>
                          <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>
                            {a.name || a.symbol}
                          </div>
                          {a.type === "crypto" && (
                            <div style={{ fontSize: 12, color: T.mut }}>
                              {a.amount} {a.symbol}
                            </div>
                          )}
                          {a.type !== "crypto" && (
                            <div style={{ fontSize: 12, color: T.mut }}>
                              {(a.currency || cur).toUpperCase()}
                            </div>
                          )}
                        </div>
                      </div>
                      <div
                        style={{
                          fontFamily: MONO,
                          fontVariantNumeric: "tabular-nums",
                          fontSize: 15,
                          color: T.text,
                          fontWeight: 500,
                        }}
                      >
                        {money(value, a.type === "crypto" ? cur : a.currency || cur)}

                    </button>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ─────────────────────────────  Tab: Movimientos  ───────────────────────────── */
function TxnsTab({ txns, accounts, cur, onAdd, onEdit, onDelete, onBulkImport, canWrite = true }) {
  const acct = (id) => accounts.find((a) => a.id === id);
  const acctName = (id) => (acct(id) || {}).name || "—";
  const acctCur = (t) => t.currency || (acct(t.accountId) || {}).currency || cur;

  const [fAcct, setFAcct] = useState("all");
  const [fKind, setFKind] = useState("all");
  const [fProject, setFProject] = useState("all");
  const [fFrom, setFFrom] = useState("");
  const [fTo, setFTo] = useState("");
  const [showF, setShowF] = useState(false);

  const usable = accounts.filter((a) => a.type === "bank" || a.type === "cash");
  const projects = useMemo(() => Array.from(new Set(txns.map((t) => t.project).filter(Boolean))).sort(), [txns]);
  const activos = (fAcct !== "all" ? 1 : 0) + (fKind !== "all" ? 1 : 0) + (fProject !== "all" ? 1 : 0) + (fFrom ? 1 : 0) + (fTo ? 1 : 0);

  const filtrados = useMemo(
    () =>
      txns.filter(
        (t) =>
          (fAcct === "all" || t.accountId === fAcct) &&
          (fKind === "all" || t.kind === fKind) &&
          (fProject === "all" || (fProject === "__none" ? !t.project : t.project === fProject)) &&
          (!fFrom || t.date >= fFrom) &&
          (!fTo || t.date <= fTo)
      ),
    [txns, fAcct, fKind, fProject, fFrom, fTo]
  );

  // Totales del filtro, agrupados por moneda
  const totalesPorMoneda = useMemo(() => {
    const m = {};
    filtrados.forEach((t) => {
      const c = acctCur(t);
      const com = t.commission || 0;
      if (!m[c]) m[c] = { inc: 0, exp: 0 };
      if (t.kind === "income") m[c].inc += (t.amount || 0) - com;
      else m[c].exp += (t.amount || 0) + com;
    });
    return Object.entries(m);
  }, [filtrados, accounts, cur]);

  const grouped = useMemo(() => {
    const m = {};
    filtrados.forEach((t) => {
      (m[t.date] = m[t.date] || []).push(t);
    });
    return Object.entries(m).sort((a, b) => (a[0] < b[0] ? 1 : -1));
  }, [filtrados]);

  const selStyle = { ...inputStyle, appearance: "none", fontSize: 14, padding: "11px 12px" };

  const [bulkMsg, setBulkMsg] = useState("");
  const [bulkBusy, setBulkBusy] = useState(false);
  const [bulkDl, setBulkDl] = useState(null);
  const acctById = (id) => accounts.find((a) => a.id === id);

  async function exportarEditable() {
    setBulkBusy(true); setBulkMsg("");
    try {
      const XLSX = await ensureXLSXStyle();
      const header = ["id", "Fecha", "Tipo", "Motivo", "Cuenta", "Monto", "Comisión", "Proyecto"];
      const aoa = [
        header,
        ...filtrados.slice().sort((a, b) => (a.date < b.date ? 1 : -1)).map((t) => [
          t.id,
          t.date,
          t.kind === "income" ? "Ingreso" : "Egreso",
          t.motivo || "",
          (acctById(t.accountId) || {}).name || "",
          t.amount || 0,
          t.commission || 0,
          t.project || "",
        ]),
      ];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 14 }, { wch: 12 }, { wch: 9 }, { wch: 26 }, { wch: 20 }, { wch: 12 }, { wch: 10 }, { wch: 16 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Movimientos");
      if (bulkDl && bulkDl.url) URL.revokeObjectURL(bulkDl.url);
      setBulkDl(wbToBlobUrl(XLSX, wb, "movimientos_editar.xlsx"));
      setBulkMsg("Archivo generado. Editá filas (o agregá nuevas con id vacío) y volvé a subirlo.");
    } catch (e) { setBulkMsg((e && e.message) || "No se pudo generar el archivo."); }
    finally { setBulkBusy(false); }
  }

  async function importarEditable(e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBulkBusy(true); setBulkMsg("Leyendo archivo…");
    try {
      const XLSX = await ensureXLSXStyle();
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type: "array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
      const res = onBulkImport(rows);
      setBulkMsg(res.error ? res.error : `Listo: ${res.updated} modificado(s), ${res.added} nuevo(s)${res.skipped ? `, ${res.skipped} omitido(s)` : ""}.`);
    } catch (ex) { setBulkMsg((ex && ex.message) || "No se pudo leer el archivo."); }
    finally { setBulkBusy(false); }
  }

  return (
    <div style={{ paddingTop: 8 }}>
      {canWrite && (
        <button onClick={onAdd} style={{ ...rowCard, cursor: "pointer", justifyContent: "center", gap: 8, color: T.gold, fontWeight: 600, fontSize: 15, marginBottom: 12 }}>
          <IconPlus color={T.gold} /> Nuevo movimiento
        </button>
      )}

      {/* Edición masiva por Excel */}
      <div style={{ background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 14, padding: "12px 14px", marginBottom: 12, display: canWrite ? "block" : "none" }}>
        <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 10, lineHeight: 1.5 }}>
          Edición masiva: exportá los movimientos (según los filtros), editalos en Excel y volvé a subirlos. Filas con <b>id</b> se modifican; con id vacío se crean.
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={exportarEditable} disabled={bulkBusy} style={{ flex: 1, background: "transparent", color: T.text, border: `1px solid ${T.line}`, borderRadius: 11, padding: "11px", fontSize: 13.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}>
            {bulkBusy ? "…" : "Exportar para editar"}
          </button>
          <label style={{ flex: 1, background: "transparent", color: T.blue, border: `1px solid ${T.blue}`, borderRadius: 11, padding: "11px", fontSize: 13.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer", textAlign: "center" }}>
            Subir cambios
            <input type="file" accept=".xlsx,.xls,.csv" style={{ display: "none" }} onChange={importarEditable} />
          </label>
        </div>
        {bulkDl && (
          <a href={bulkDl.url} download={bulkDl.name} style={{ display: "block", textAlign: "center", background: T.green, color: "#0A0F1E", borderRadius: 11, padding: "11px", fontWeight: 600, textDecoration: "none", marginTop: 8, fontSize: 13.5 }}>
            Abrir / guardar el Excel
          </a>
        )}
        {bulkMsg && <div style={{ fontSize: 12.5, color: T.mut, marginTop: 8, lineHeight: 1.5 }}>{bulkMsg}</div>}
      </div>

      {/* Filtros */}
      <button
        onClick={() => setShowF(!showF)}
        style={{ ...rowCard, cursor: "pointer", marginBottom: 12, color: T.text, fontSize: 14, fontWeight: 600 }}
      >
        <span>Filtros{activos ? ` · ${activos} activo(s)` : ""}</span>
        <span style={{ color: T.mut2, fontSize: 12 }}>{showF ? "▲" : "▼"}</span>
      </button>

      {showF && (
        <div style={{ background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 14, padding: "14px 15px", marginBottom: 16 }}>
          <Field label="Cuenta">
            <select style={selStyle} value={fAcct} onChange={(e) => setFAcct(e.target.value)}>
              <option value="all">Todas las cuentas</option>
              {usable.map((a) => (
                <option key={a.id} value={a.id}>
                  {a.name} · {(a.currency || cur).toUpperCase()}
                </option>
              ))}
            </select>
          </Field>
          <Field label="Tipo">
            <select style={selStyle} value={fKind} onChange={(e) => setFKind(e.target.value)}>
              <option value="all">Ingresos y egresos</option>
              <option value="income">Solo ingresos</option>
              <option value="expense">Solo egresos</option>
            </select>
          </Field>
          <Field label="Proyecto">
            <select style={selStyle} value={fProject} onChange={(e) => setFProject(e.target.value)}>
              <option value="all">Todos los proyectos</option>
              <option value="__none">Sin proyecto</option>
              {projects.map((p) => (<option key={p} value={p}>{p}</option>))}
            </select>
          </Field>
          <div style={{ display: "flex", gap: 10 }}>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Desde</label>
              <input type="date" style={{ ...selStyle, fontFamily: MONO }} value={fFrom} onChange={(e) => setFFrom(e.target.value)} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={labelStyle}>Hasta</label>
              <input type="date" style={{ ...selStyle, fontFamily: MONO }} value={fTo} onChange={(e) => setFTo(e.target.value)} />
            </div>
          </div>
          {activos > 0 && (
            <button
              onClick={() => { setFAcct("all"); setFKind("all"); setFProject("all"); setFFrom(""); setFTo(""); }}
              style={{ ...btnGhost, color: T.red, marginTop: 12, padding: 4 }}
            >
              Limpiar filtros
            </button>
          )}
        </div>
      )}

      {/* Totales del filtro */}
      {filtrados.length > 0 && totalesPorMoneda.length > 0 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
          {totalesPorMoneda.map(([c, v]) => (
            <div key={c} style={{ ...rowCard, background: T.bg2 }}>
              <span style={{ fontSize: 12, color: T.mut, fontWeight: 600 }}>{c.toUpperCase()}</span>
              <span style={{ fontFamily: MONO, fontSize: 13, fontVariantNumeric: "tabular-nums" }}>
                <span style={{ color: T.green }}>+{money(v.inc, c)}</span>
                <span style={{ color: T.mut2 }}>{"  /  "}</span>
                <span style={{ color: T.red }}>−{money(v.exp, c)}</span>
              </span>
            </div>
          ))}
        </div>
      )}

      {txns.length === 0 ? (
        <div style={emptyRow}>Todavía no cargaste ingresos ni egresos</div>
      ) : filtrados.length === 0 ? (
        <div style={emptyRow}>Ningún movimiento coincide con los filtros</div>
      ) : (
        grouped.map(([date, items]) => (
          <div key={date} style={{ marginBottom: 18 }}>
            <div style={{ ...sectionTitle, marginBottom: 8 }}>{fmtDate(date)}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {items.map((t) => {
                const inc = t.kind === "income";
                const c = acctCur(t);
                return (
                  <div key={t.id} onClick={() => canWrite && onEdit(t)} style={{ ...rowCard, cursor: canWrite ? "pointer" : "default" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                      <span
                        style={{
                          width: 34, height: 34, borderRadius: 10,
                          background: inc ? T.greenSoft : T.redSoft,
                          display: "flex", alignItems: "center", justifyContent: "center",
                          flexShrink: 0, color: inc ? T.green : T.red, fontSize: 18, fontWeight: 700,
                        }}
                      >
                        {inc ? "↓" : "↑"}
                      </span>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontSize: 14.5, fontWeight: 600, color: T.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                          {t.motivo || (inc ? "Ingreso" : "Egreso")}
                        </div>
                        <div style={{ fontSize: 12, color: T.mut }}>
                          {acctName(t.accountId)} · {c.toUpperCase()}
                          {t.project ? ` · ${t.project}` : ""}
                          {t.commission ? ` · com. ${t.comMode === "usd" ? fmtUsd(t.comUsd || 0) : money(t.commission, c)}` : ""}
                        </div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 14.5, fontWeight: 600, color: inc ? T.green : T.red }}>
                        {inc ? "+" : "−"}
                        {money(t.amount, c)}
                      </span>
                      {canWrite && (
                        <button onClick={(e) => { e.stopPropagation(); onDelete(t); }} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1 }} aria-label="Eliminar">
                          ×
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

/* ─────────────────────────────  Tab: Cripto  ───────────────────────────── */
function CryptoTab({ accounts, prices, cur, onAdd, onEdit, canEdit = true }) {
  const list = accounts.filter((a) => a.type === "crypto");
  return (
    <div style={{ paddingTop: 8 }}>
      {canEdit && (
        <button onClick={onAdd} style={{ ...rowCard, cursor: "pointer", justifyContent: "center", gap: 8, color: T.gold, fontWeight: 600, fontSize: 15, marginBottom: 20 }}>
          <IconPlus color={T.gold} /> Agregar cripto
        </button>
      )}
      {list.length === 0 ? (
        <div style={emptyRow}>Agregá tus tenencias (BTC, SOL, ETH o cualquier otra)</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {list.map((a) => {
            const p = prices[a.coinId];
            const livePrice = p?.price;
            const usedPrice = livePrice ?? a.manualPrice;
            const val = (a.amount || 0) * (usedPrice || 0);
            const up = (p?.change ?? 0) >= 0;
            return (
              <button key={a.id} onClick={() => onEdit(a)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <CoinBadge sym={a.symbol} />
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{a.name}</div>
                    <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO }}>
                      {a.amount} {a.symbol} ·{" "}
                      {usedPrice != null ? coinPrice(usedPrice, cur) : "—"}
                      {livePrice == null && a.manualPrice != null ? " (manual)" : ""}
                    </div>
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 15, color: T.text, fontWeight: 500 }}>
                    {money(val, cur)}
                  </div>
                  {p && (
                    <div style={{ fontSize: 12, fontWeight: 600, color: up ? T.green : T.red }}>
                      {pct(p.change)}
                    </div>
                  )}
                </div>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────  Sheet: Cuenta banco/efectivo  ───────────────────────────── */

/* ─────────────────────────────  Sheet: Movimiento  ───────────────────────────── */
function TxnSheet({ state, accounts, cur, vesRate, projects, onClose, onSave, onDelete }) {
  const open = !!state;
  const editing = state && state.id;
  const usable = accounts.filter((a) => a.type === "bank" || a.type === "cash");
  const [kind, setKind] = useState("expense");
  const [amount, setAmount] = useState("");
  const [motivo, setMotivo] = useState("");
  const [accountId, setAccountId] = useState("");
  const [date, setDate] = useState(todayISO());
  const [comMode, setComMode] = useState("none");
  const [comManual, setComManual] = useState("");
  const [comUsd, setComUsd] = useState("");
  const [project, setProject] = useState("");
  const [newProject, setNewProject] = useState("");
  useEffect(() => {
    if (state && state.id) {
      setKind(state.kind || "expense");
      setAmount(String(state.amount ?? ""));
      setMotivo(state.motivo || "");
      setAccountId(state.accountId || "");
      setDate(state.date || todayISO());
      setComMode(state.comMode || "none");
      setComManual(state.comMode === "manual" && state.commission != null ? String(state.commission) : "");
      setComUsd(state.comMode === "usd" && state.comUsd != null ? String(state.comUsd) : "");
      setProject(state.project || "");
      setNewProject("");
    } else if (state) {
      setKind("expense"); setAmount(""); setMotivo(""); setAccountId(usable[0]?.id || ""); setDate(todayISO());
      setComMode("none"); setComManual(""); setComUsd(""); setProject(""); setNewProject("");
    }
  }, [state]);

  const acct = usable.find((a) => a.id === accountId);
  const acctCur = (acct && acct.currency) || cur;
  const nAmount = numVE(amount);
  const comAcct =
    comMode === "pct" ? (isNaN(nAmount) ? 0 : nAmount) * 0.003
    : comMode === "manual" ? (numVE(comManual) || 0)
    : comMode === "usd" ? (convertAmt(numVE(comUsd) || 0, "usd", acctCur, vesRate) ?? 0)
    : 0;
  const comUsdVal = comMode === "usd" ? (numVE(comUsd) || 0) : 0;
  const proj = project === "__new" ? newProject.trim() : project;
  const egresoTotal = (isNaN(nAmount) ? 0 : nAmount) + comAcct;
  const saldo = acct ? acct.balance || 0 : 0;
  const insuf = kind === "expense" && !isNaN(nAmount) && nAmount > 0 && egresoTotal > saldo + 1e-6;
  const valid = amount && !isNaN(nAmount) && nAmount > 0 && accountId && motivo.trim() && !(project === "__new" && !newProject.trim());

  return (
    <Sheet open={open} onClose={onClose} title={editing ? "Editar movimiento" : "Nuevo movimiento"}>
      {usable.length === 0 ? (
        <div style={{ ...emptyRow, marginBottom: 4 }}>
          Primero creá una cuenta de banco o efectivo en la pestaña Cuentas.
        </div>
      ) : (
        <>
          <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 16 }}>
            {[["expense", "Egreso", T.red], ["income", "Ingreso", T.green]].map(([k, label, color]) => (
              <button key={k} onClick={() => setKind(k)} style={seg(kind === k, color)}>{label}</button>
            ))}
          </div>
          <Field label={`Monto (${acctCur.toUpperCase()})`}>
            <input style={{ ...inputStyle, fontFamily: MONO, fontSize: 22 }} value={amount} onChange={(e) => setAmount(e.target.value)} inputMode="decimal" placeholder="0.00" />
          </Field>
          <Field label="Motivo">
            <input style={inputStyle} value={motivo} onChange={(e) => setMotivo(e.target.value)} placeholder="Ej. Sueldo, Supermercado, Alquiler…" />
          </Field>
          <Field label="Cuenta / método de pago">
            <select style={{ ...inputStyle, appearance: "none" }} value={accountId} onChange={(e) => setAccountId(e.target.value)}>
              {usable.map((a) => (
                <option key={a.id} value={a.id}>{a.name} · {TYPE_LABEL[a.type]} · {(a.currency || cur).toUpperCase()}</option>
              ))}
            </select>
          </Field>

          <Field label="Comisión">
            <select style={{ ...inputStyle, appearance: "none" }} value={comMode} onChange={(e) => setComMode(e.target.value)}>
              <option value="none">Sin comisión (0%)</option>
              <option value="pct">0,3% (VES)</option>
              <option value="usd">Monto en USD</option>

          </Field>

              <input style={{ ...inputStyle, fontFamily: MONO }} value={comUsd} onChange={(e) => setComUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />

          )}

            <Field label={`Comisión (${acctCur.toUpperCase()})`}>
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comManual} onChange={(e) => setComManual(e.target.value)} inputMode="decimal" placeholder="0,00" />
            </Field>
          )}

            <div style={{ fontSize: 12.5, color: T.mut, margin: "-4px 2px 14px", lineHeight: 1.5 }}>
              Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{comMode === "usd" ? fmtUsd(comUsdVal) : money(comAcct, acctCur)}</span>
              {"  ·  "}Impacto en la cuenta: <span style={{ color: T.text, fontFamily: MONO }}>{money((kind === "income" ? nAmount - comAcct : -(nAmount + comAcct)) || 0, acctCur)}</span>

            <select style={{ ...inputStyle, appearance: "none" }} value={project} onChange={(e) => setProject(e.target.value)}>

              <input style={inputStyle} value={newProject} onChange={(e) => setNewProject(e.target.value)} placeholder="Ej. Local Centro" />

            <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={date} onChange={(e) => setDate(e.target.value)} />

            </div>

          <PrimaryBtn color={kind === "income" ? T.green : T.red} disabled={!valid} onClick={() => onSave({ id: editing ? state.id : undefined, kind, amount: nAmount, motivo: motivo.trim(), accountId, date, currency: acctCur, commission: comAcct, comMode, comUsd: comUsdVal || undefined, project: proj || undefined })}>
            {kind === "income" ? (editing ? "Guardar cambios" : "Registrar ingreso") : editing ? "Guardar cambios" : insuf ? "Registrar de todos modos" : "Registrar egreso"}
          </PrimaryBtn>
          {editing && (
            <button onClick={() => onDelete(state)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
              Eliminar movimiento
            </button>
          )}
        </>
      )}
    </Sheet>
  );
}

/* ─────────────────────────────  Sheet: Cripto (buscar cualquier moneda)  ───────────────────────────── */
function CryptoSheet({ state, cur, onClose, onSave, onDelete, prices }) {
  const editing = state && state.id;
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [picked, setPicked] = useState(null); // {coinId,symbol,name}
  const [amount, setAmount] = useState("");
  const [manual, setManual] = useState("");
  const [searching, setSearching] = useState(false);
  const [err, setErr] = useState("");
  const [manualEntry, setManualEntry] = useState(false);
  const [mSym, setMSym] = useState("");
  const [mName, setMName] = useState("");

  useEffect(() => {
    if (state && state.id) {
      setPicked({ coinId: state.coinId, symbol: state.symbol, name: state.name });
      setAmount(String(state.amount ?? ""));
      setManual(state.manualPrice != null ? String(state.manualPrice) : "");
    } else if (state) {
      setPicked(null);
      setAmount("");
      setManual("");
      setQuery("");
      setResults([]);
      setErr("");
      setManualEntry(false);
      setMSym("");
      setMName("");
    }
  }, [state]);

  // búsqueda con debounce
  useEffect(() => {
    if (!query.trim() || picked) {
      setResults([]);
      return;
    }
    setSearching(true);
    setErr("");
    const t = setTimeout(async () => {
      try {
        const r = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(query.trim())}`);
        const d = await r.json();
        setResults((d.coins || []).slice(0, 8));
      } catch {
        setErr("No hay acceso a internet en la vista previa. Cargala a mano abajo 👇");
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(t);
  }, [query, picked]);

  if (!state) return null;
  const valid = picked && amount !== "" && !isNaN(parseFloat(amount));
  const livePrice = picked && prices[picked.coinId]?.price;

  return (
    <Sheet open={!!state} onClose={onClose} title={editing ? `Editar ${state.symbol}` : "Agregar cripto"}>
      {!picked ? (
        <>
          <Field label="Buscar moneda">
            <input style={inputStyle} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Bitcoin, SOL, Ethereum, Cardano…" autoFocus />
          </Field>
          {searching && <div style={{ color: T.mut, fontSize: 13, padding: "4px 2px" }}>Buscando…</div>}
          {err && <div style={{ color: T.red, fontSize: 13, padding: "4px 2px" }}>{err}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
            {results.map((c) => (
              <button
                key={c.id}
                onClick={() => setPicked({ coinId: c.id, symbol: (c.symbol || "").toUpperCase(), name: c.name })}
                style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  {c.thumb ? (
                    <img src={c.thumb} alt="" style={{ width: 30, height: 30, borderRadius: 8 }} />
                  ) : (
                    <CoinBadge sym={(c.symbol || "").toUpperCase()} />
                  )}
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: T.mut }}>{(c.symbol || "").toUpperCase()}</div>
                  </div>
                </div>
                <span style={{ color: T.gold, fontSize: 20 }}>+</span>
              </button>
            ))}
          </div>

          {/* Carga manual (funciona sin internet) */}
          <div style={{ borderTop: `1px solid ${T.lineSoft}`, marginTop: 16, paddingTop: 14 }}>
            {!manualEntry ? (
              <button
                onClick={() => setManualEntry(true)}
                style={{ ...btnGhost, color: T.gold, padding: 4 }}
              >
                + Cargar una moneda a mano
              </button>
            ) : (
              <>
                <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12 }}>
                  Ingresá la moneda manualmente. Si es una de las principales (BTC,
                  ETH, SOL…), tomará el precio en vivo cuando haya conexión.
                </div>
                <Field label="Símbolo">
                  <input
                    style={{ ...inputStyle, textTransform: "uppercase" }}
                    value={mSym}
                    onChange={(e) => setMSym(e.target.value.toUpperCase())}
                    placeholder="BTC"
                  />
                </Field>
                <Field label="Nombre">
                  <input
                    style={inputStyle}
                    value={mName}
                    onChange={(e) => setMName(e.target.value)}
                    placeholder="Bitcoin"
                  />
                </Field>
                <PrimaryBtn
                  color={T.gold}
                  disabled={!mSym.trim()}
                  onClick={() => {
                    const sym = mSym.trim().toUpperCase();
                    setPicked({
                      coinId: SYMBOL_ID[sym] || sym.toLowerCase(),
                      symbol: sym,
                      name: mName.trim() || sym,
                    });
                  }}
                >
                  Continuar
                </PrimaryBtn>
              </>
            )}
          </div>
        </>
      ) : (
        <>
          <div style={{ ...rowCard, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <CoinBadge sym={picked.symbol} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{picked.name}</div>
                <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO }}>
                  {livePrice ? coinPrice(livePrice, cur) : "precio al actualizar"}
                </div>
              </div>
            </div>
            {!editing && (
              <button onClick={() => setPicked(null)} style={btnGhost}>
                Cambiar
              </button>
            )}
          </div>
          <Field label={`Cantidad de ${picked.symbol}`}>
            <input style={{ ...inputStyle, fontFamily: MONO, fontSize: 22 }} value={amount} onChange={(e) => setAmount(e.target.value)} inputMode="decimal" placeholder="0.00" autoFocus />
          </Field>
          <Field label={`Precio manual en ${cur.toUpperCase()} (opcional)`}>
            <input style={{ ...inputStyle, fontFamily: MONO }} value={manual} onChange={(e) => setManual(e.target.value)} inputMode="decimal" placeholder="Se usa solo si no hay precio en vivo" />
          </Field>
          {(() => {
            const shown = livePrice ?? (manual !== "" && !isNaN(parseFloat(manual)) ? parseFloat(manual) : null);
            if (shown == null || !amount || isNaN(parseFloat(amount))) return null;
            return (
              <div style={{ fontSize: 13, color: T.mut, marginBottom: 14, marginLeft: 2 }}>
                Valor:{" "}
                <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>
                  {money(parseFloat(amount) * shown, cur)}
                </span>
                {livePrice == null ? " (precio manual)" : ""}
              </div>
            );
          })()}
          <PrimaryBtn
            color={T.gold}
            disabled={!valid}
            onClick={() =>
              onSave({
                id: state.id,
                type: "crypto",
                coinId: picked.coinId,
                symbol: picked.symbol,
                name: picked.name,
                amount: parseFloat(amount),
                manualPrice:
                  manual !== "" && !isNaN(parseFloat(manual))
                    ? parseFloat(manual)
                    : undefined,
              })
            }
          >
            {editing ? "Guardar cambios" : "Agregar a mi cartera"}
          </PrimaryBtn>
          {editing && (
            <button onClick={() => onDelete(state.id)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
              Eliminar
            </button>
          )}
        </>
      )}
    </Sheet>
  );
}
