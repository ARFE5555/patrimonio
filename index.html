/* ─────────────────────────────  Helpers  ───────────────────────────── */
const uid = () =>

function money(n, cur, opts = {}) {
  const c = (cur || "usd").toUpperCase();
  try {
    return new Intl.NumberFormat("es-ES", {
      style: "currency",
      currency: c,
      minimumFractionDigits: opts.min ?? 2,
      maximumFractionDigits: opts.max ?? 2,
    }).format(Number.isFinite(n) ? n : 0);
  } catch {
    return `${(Number.isFinite(n) ? n : 0).toFixed(2)} ${c}`;
  }
}
function coinPrice(n, cur) {
  const abs = Math.abs(n || 0);
  const max = abs >= 100 ? 2 : abs >= 1 ? 2 : 6;
  return money(n, cur, { min: 2, max });
}
const pct = (n) => `${n >= 0 ? "+" : ""}${(n || 0).toFixed(2)}%`;
const fmtUsd = (n) =>
  "$ " + (Number.isFinite(n) ? n : 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBs = (n) =>
  "Bs " + (Number.isFinite(n) ? n : 0).toLocaleString("es-VE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const COMISION = { mismo: 0, otros: 0.003 };
const COMISION_LABEL = { mismo: "Mismo banco (0%)", otros: "Otros bancos (0,3%)" };

// Comisión de una operación: usa el monto importado (comisionBs) si existe, si no la deriva del tipo
function comOp(d) {
  // comisión que consume VES (banco %, monto en VES, o importada)
  if (typeof d.comisionBs === "number" && !isNaN(d.comisionBs)) return d.comisionBs;
  const mode = d.comMode || "pct";
  if (mode === "ves") return d.comisionVesInput || 0;
  if (mode === "usd") return 0; // la comisión en USD NO consume bolívares
  return (d.usd || 0) * (d.tasa || 0) * (COMISION[d.comisionTipo] || 0);
}
function comUsdOf(d) {
  // comisión cobrada en USD (ej. fee P2P de Binance): reduce el USDT neto
  return d.comMode === "usd" ? (d.comisionUsdInput || 0) : 0;
}

// Asignación automática FIFO: cada compra consume los VES de las ventas abiertas
// por orden de llegada; si agota una, se fracciona hacia la siguiente.
function allocateFIFO(ventas, compras) {
  const arriv = (a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0));
  const buckets = ventas.slice().sort(arriv).map((v) => ({ v, cap: Math.max(0, (v.usd || 0) * (v.tasa || 0) - comOp(v)), used: 0 }));
  const cs = compras.slice().sort(arriv);
  const ventaStats = {};
  buckets.forEach((b) => { ventaStats[b.v.id] = { usdRecomprado: 0, usdBruto: 0, vesUsados: 0, allocs: [] }; });
  const unalloc = [];
  const EPS = 1e-6;
  let bi = 0;
  for (const c of cs) {
    const gross = c.usd || 0;
    const net = gross - comUsdOf(c); // USDT que queda tras la comisión en USD
    const W = gross * (c.tasa || 0) + comOp(c); // VES totales que consume (con comisión en VES)
    if (W <= EPS) continue;
    let remaining = W;
    while (remaining > EPS) {
      while (bi < buckets.length && buckets[bi].used >= buckets[bi].cap - EPS) bi++;
      if (bi >= buckets.length) {
        const f = remaining / W;
        unalloc.push({ compraId: c.id, compra: c, usd: gross * f, net: net * f, ves: remaining });
        remaining = 0;
        break;
      }
      const b = buckets[bi];
      if (b.v.date > c.date) {
        // La venta es posterior a la compra: no puede recibirla (ni ninguna venta más nueva).
        const f = remaining / W;
        unalloc.push({ compraId: c.id, compra: c, usd: gross * f, net: net * f, ves: remaining });
        remaining = 0;
        break;
      }
      const take = Math.min(b.cap - b.used, remaining);
      const f = take / W;
      b.used += take;
      const st = ventaStats[b.v.id];
      st.usdRecomprado += net * f;
      st.usdBruto += gross * f;
      st.vesUsados += take;
      st.allocs.push({ compraId: c.id, compra: c, usd: gross * f, net: net * f, ves: take });
      remaining -= take;
    }
  }
  return { ventaStats, unalloc };
}

/* ── Lectura de Google Sheets (CSV publicado) ── */
function parseCSV(text) {
  const rows = [];
  let field = "", row = [], inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else if (c === "\r") { /* ignora */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}
function numVE(s) {
  if (s == null) return NaN;
  let t = String(s).replace(/[^\d.,-]/g, "").trim();
  if (t === "") return NaN;
  if (t.indexOf(".") >= 0 && t.indexOf(",") >= 0) t = t.replace(/\./g, "").replace(",", ".");
  else if (t.indexOf(",") >= 0) t = t.replace(",", ".");
  return parseFloat(t);
}
function fechaISO(s) {
  s = String(s || "").trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
  if (m) {
    let d = m[1].padStart(2, "0"), mo = m[2].padStart(2, "0"), y = m[3];
    if (y.length === 2) y = "20" + y;
    return `${y}-${mo}-${d}`;
  }
  const dt = new Date(s);
  if (!isNaN(dt.getTime())) return dt.toISOString().slice(0, 10);
  return s;
}
function parseDivisasCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const header = rows[0].map((h) => (h || "").toLowerCase().trim());
  const find = (...keys) => header.findIndex((h) => keys.some((k) => h === k || h.includes(k)));
  const iF = find("fecha"), iP = find("persona"), iT = find("tasa"),
    iR = find("referencia", "ref"), iTipo = find("tipo");
  const iU = header.findIndex((h) => (h === "usd" || h.includes("usd")) && !h.includes("comi") && !h.includes("fee"));
  const iComUsd = header.findIndex((h) => (h.includes("comi") || h.includes("fee")) && h.includes("usd"));
  const iCom = header.findIndex((h, idx) => h.includes("comi") && idx !== iComUsd);
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every((c) => !String(c || "").trim())) continue;
    const usd = numVE(row[iU]);
    const tasa = numVE(row[iT]);
    if (isNaN(usd) || isNaN(tasa)) continue;
    const ves = usd * tasa;
    const tipoRaw = iTipo >= 0 ? String(row[iTipo] || "").toLowerCase() : "";
    const kind = tipoRaw.includes("venta") ? "venta" : "compra";
    const persona = iP >= 0 ? String(row[iP] || "").trim() : "";
    const referencia = iR >= 0 ? String(row[iR] || "").trim() : "";
    const date = fechaISO(row[iF]);
    const refKey = referencia || `${kind}|${date}|${usd}|${tasa}|${persona}`;
    const op = { kind, date, persona, usd, tasa, referencia, refKey, source: "sheet" };
    const comUsd = iComUsd >= 0 ? numVE(row[iComUsd]) : NaN;
    if (!isNaN(comUsd) && comUsd > 0) {
      op.comMode = "usd";
      op.comisionUsdInput = comUsd;
    } else if (iCom >= 0) {
      const raw = String(row[iCom] || "");
      if (raw.indexOf("%") >= 0) { const p = numVE(raw); op.comisionBs = isNaN(p) ? 0 : ves * (p / 100); }
      else { const v = numVE(raw); op.comisionBs = isNaN(v) ? 0 : v; }
    } else {
      op.comisionBs = 0;
    }
    out.push(op);
  }
  return out;
}
function mergeSheetOps(prev, rows) {
  const prevByRef = {};
  prev.forEach((d) => { if (d.source === "sheet" && d.refKey) prevByRef[d.refKey] = d; });
  const manual = prev.filter((d) => d.source !== "sheet");
  const sheetOps = rows.map((r) => {
    const ex = prevByRef[r.refKey];
    return {
      ...r,
      id: (ex && ex.id) || uid(),
      createdAt: (ex && ex.createdAt) || Date.now(),
      ventaId: ex ? ex.ventaId : undefined,
      pagado: ex ? ex.pagado : undefined,
      hasReceipt: ex ? ex.hasReceipt : undefined,
    };
  });
  return [...sheetOps, ...manual];
}

/* ── Comprobantes: guardados en IndexedDB (soporta archivos grandes) ── */
function idbOpen() {
  return new Promise((res, rej) => {
    if (!window.indexedDB) { rej(new Error("Este navegador no soporta guardar comprobantes.")); return; }
    const r = window.indexedDB.open("patrimonio", 1);
    r.onupgradeneeded = () => r.result.createObjectStore("receipts");
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbPut(id, val) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const t = db.transaction("receipts", "readwrite");
    t.objectStore("receipts").put(val, id);
    t.oncomplete = () => res();
    t.onerror = () => rej(t.error);
  });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const t = db.transaction("receipts", "readonly");
    const rq = t.objectStore("receipts").get(id);
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => rej(rq.error);
  });
}
async function idbDel(id) {
  try {
    const db = await idbOpen();
    return new Promise((res) => {
      const t = db.transaction("receipts", "readwrite");
      t.objectStore("receipts").delete(id);
      t.oncomplete = () => res();
      t.onerror = () => res();
    });
  } catch { /* ignora */ }
}
// Comprime imágenes; los PDF u otros se leen tal cual (con límite de tamaño)
function fileToStored(file) {
  return new Promise((res, rej) => {
    if (file.type && file.type.indexOf("image/") === 0) {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const maxDim = 1400;
        let { width, height } = img;
        if (width > height && width > maxDim) { height = (height * maxDim) / width; width = maxDim; }
        else if (height > maxDim) { width = (width * maxDim) / height; height = maxDim; }
        const c = document.createElement("canvas");
        c.width = width; c.height = height;
        c.getContext("2d").drawImage(img, 0, 0, width, height);
        URL.revokeObjectURL(url);
        res({ dataUrl: c.toDataURL("image/jpeg", 0.7), type: "image" });
      };
      img.onerror = () => { URL.revokeObjectURL(url); rej(new Error("No se pudo leer la imagen.")); };
      img.src = url;
    } else {
      if (file.size > 6 * 1024 * 1024) { rej(new Error("El archivo es muy grande (máx. 6 MB).")); return; }
      const fr = new FileReader();
      fr.onload = () => res({ dataUrl: fr.result, type: "file", name: file.name });
      fr.onerror = () => rej(new Error("No se pudo leer el archivo."));
      fr.readAsDataURL(file);
    }
  });
}
function relTime(ts) {
  if (!ts) return "—";
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 5) return "recién";
  if (s < 60) return `hace ${s}s`;
  const m = Math.round(s / 60);
  return `hace ${m}m`;
}
function todayISO() {
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 10);
}
function fmtDate(iso) {
  try {
    return new Date(iso + "T00:00:00").toLocaleDateString("es-ES", {
      day: "2-digit",
      month: "short",
    });
  } catch {
    return iso;
  }
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("balance");
  const [accounts, setAccounts] = useState([]);
  const [txns, setTxns] = useState([]);
  const [settings, setSettings] = useState({ currency: "usd", theme: "dark", layout: "auto" });

  const [prices, setPrices] = useState({});
  const [priceStatus, setPriceStatus] = useState("loading"); // loading | live | error
  const [lastUpdate, setLastUpdate] = useState(null);
  const [source, setSource] = useState(null); // "CoinGecko" | "CoinPaprika"

  // sheets
  const [acctSheet, setAcctSheet] = useState(null); // {mode,'bank'|'cash'} | account
  const [txnSheet, setTxnSheet] = useState(false);
  const [cryptoSheet, setCryptoSheet] = useState(false);
  const [divisas, setDivisas] = useState([]);
  const [divisaSheet, setDivisaSheet] = useState(null); // null | {kind,mode} | operacion

  /* Carga inicial */
  useEffect(() => {
    (async () => {
      setAccounts(await loadKey("fin:accounts", []));
      setTxns(await loadKey("fin:txns", []));
      setSettings(await loadKey("fin:settings", { currency: "usd", theme: "dark", layout: "auto" }));
      setDivisas(await loadKey("fin:divisas", []));
      setLoaded(true);
    })();
  }, []);
  /* Guardado */
  useEffect(() => {
    if (loaded) saveKey("fin:accounts", accounts);
  }, [accounts, loaded]);
  useEffect(() => {
    if (loaded) saveKey("fin:txns", txns);
  }, [txns, loaded]);
  useEffect(() => {
    if (loaded) saveKey("fin:settings", settings);
  }, [settings, loaded]);
  useEffect(() => {
    if (typeof document !== "undefined")
      document.documentElement.setAttribute("data-theme", settings.theme || "dark");
  }, [settings.theme]);
  useEffect(() => {
    if (loaded) saveKey("fin:divisas", divisas);
  }, [divisas, loaded]);
  useEffect(() => {
    if (loaded && settings.sheetUrl) syncSheet(settings.sheetUrl).catch(() => {});
  }, [loaded]);

  /* Precios en vivo (24/7) */
  const trackedIds = useMemo(() => {
    const s = new Set(TICKER.map((t) => t.id));
    accounts.forEach((a) => a.type === "crypto" && a.coinId && s.add(a.coinId));
    return Array.from(s);
  }, [accounts]);

  useEffect(() => {
    if (!loaded) return;
    let alive = true;

    // Fuente 1: CoinGecko (soporta cualquier moneda y cualquier cripto)
    async function fromCoinGecko() {
      const url = `https://api.coingecko.com/api/v3/simple/price?ids=${trackedIds.join(
        ","
      )}&vs_currencies=${settings.currency}&include_24hr_change=true`;
      const r = await fetch(url);
      if (!r.ok) throw new Error("cg " + r.status);
      const d = await r.json();
      const next = {};
      trackedIds.forEach((id) => {
        if (d[id])
          next[id] = {
            price: d[id][settings.currency],
            change: d[id][settings.currency + "_24h_change"],
          };
      });
      if (!Object.keys(next).length) throw new Error("cg vacío");
      return next;
    }

    // Fuente 2: CoinPaprika (respaldo; solo USD en el plan gratuito)
    async function fromPaprika() {
      const next = {};
      await Promise.all(
        trackedIds.map(async (id) => {
          const pid = PAPRIKA[id];
          if (!pid) return;
          try {
            const r = await fetch(
              `https://api.coinpaprika.com/v1/tickers/${pid}?quotes=USD`
            );
            if (!r.ok) return;
            const d = await r.json();
            const q = d.quotes && d.quotes.USD;
            if (q) next[id] = { price: q.price, change: q.percent_change_24h };
          } catch {
            /* ignora la moneda que falle */
          }
        })
      );
      if (!Object.keys(next).length) throw new Error("paprika vacío");
      return next;
    }

    async function poll() {
      // Intento 1: CoinGecko
      try {
        const next = await fromCoinGecko();
        if (!alive) return;
        setPrices(next);
        setSource("CoinGecko");
        setPriceStatus("live");
        setLastUpdate(Date.now());
        return;
      } catch {
        /* pasa al respaldo */
      }
      // Intento 2: CoinPaprika (solo si la moneda base es USD, para no mostrar valores incorrectos)
      if (settings.currency === "usd") {
        try {
          const next = await fromPaprika();
          if (!alive) return;
          setPrices(next);
          setSource("CoinPaprika");
          setPriceStatus("live");
          setLastUpdate(Date.now());
          return;
        } catch {
          /* ambas fallaron */
        }
      }
      if (alive) setPriceStatus("error");
    }

    poll();
    const iv = setInterval(poll, 60000);
    return () => {
      alive = false;
      clearInterval(iv);
    };
  }, [loaded, trackedIds.join(","), settings.currency]);

  /* Totales */
  const totals = useMemo(() => {
    let bank = 0,
      cash = 0,
      crypto = 0;
    accounts.forEach((a) => {
      if (a.type === "bank") bank += a.balance || 0;
      else if (a.type === "cash") cash += a.balance || 0;
      else if (a.type === "crypto") {
        const p = prices[a.coinId]?.price ?? a.manualPrice;
        if (p != null) crypto += (a.amount || 0) * (p || 0);
      }
    });
    return { bank, cash, crypto, net: bank + cash + crypto };
  }, [accounts, prices]);

  const cur = settings.currency;

  const [winW, setWinW] = useState(typeof window !== "undefined" ? window.innerWidth : 1024);
  useEffect(() => {
    const onR = () => setWinW(window.innerWidth);
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, []);
  const layoutMode = settings.layout || "auto";
  const desktop = layoutMode === "desktop" || (layoutMode === "auto" && winW >= 900);
  const NAV = [
    ["balance", "Balance", "Balance", IconChart],
    ["accounts", "Cuentas", "Cuentas", IconWallet],
    ["txns", "Movimientos", "Movim.", IconSwap],
    ["crypto", "Cripto", "Cripto", IconCoin],
    ["divisas", "Divisas", "Divisas", IconExchange],
    ["concil", "Conciliar", "Concil.", IconCheck],
    ["ajustes", "Ajustes", "Ajustes", IconGear],
  ];

  /* Acciones cuentas */
  function saveAccount(data) {
    setAccounts((prev) => {
      if (data.id) return prev.map((a) => (a.id === data.id ? { ...a, ...data } : a));
      return [...prev, { ...data, id: uid() }];
    });
    setAcctSheet(null);
    setCryptoSheet(false);
  }
  function deleteAccount(id) {
    setAccounts((prev) => prev.filter((a) => a.id !== id));
    setTxns((prev) => prev.filter((t) => t.accountId !== id));
    setAcctSheet(null);
  }

  /* Acciones movimientos */
  function addTxn(data) {
    const delta = data.kind === "income" ? data.amount : -data.amount;
    setAccounts((prev) =>
      prev.map((a) =>
        a.id === data.accountId ? { ...a, balance: (a.balance || 0) + delta } : a
      )
    );
    setTxns((prev) => [{ ...data, id: uid(), createdAt: Date.now() }, ...prev]);
    setTxnSheet(false);
  }
  function deleteTxn(t) {
    const delta = t.kind === "income" ? -t.amount : t.amount;
    setAccounts((prev) =>
      prev.map((a) =>
        a.id === t.accountId ? { ...a, balance: (a.balance || 0) + delta } : a
      )
    );
    setTxns((prev) => prev.filter((x) => x.id !== t.id));
  }

  /* Acciones divisas */
  function saveDivisa(data) {
    setDivisas((prev) => {
      if (data.id) return prev.map((d) => (d.id === data.id ? { ...d, ...data } : d));
      return [{ ...data, id: uid(), createdAt: Date.now() }, ...prev];
    });
    setDivisaSheet(null);
  }
  function deleteDivisa(id) {
    setDivisas((prev) => prev.filter((d) => d.id !== id));
    idbDel(id);
    setDivisaSheet(null);
  }
  function patchDivisa(id, patch) {
    setDivisas((prev) => prev.map((d) => (d.id === id ? { ...d, ...patch } : d)));
  }
  async function syncSheet(url) {
    const u = (url || settings.sheetUrl || "").trim();
    if (!u) return { ok: false, error: "Pegá primero el link CSV de tu Google Sheet." };
    const res = await fetch(u);
    if (!res.ok) throw new Error("No se pudo leer el Sheet (código " + res.status + ").");
    const text = await res.text();
    const rows = parseDivisasCSV(text);
    setDivisas((prev) => mergeSheetOps(prev, rows));
    return { ok: true, count: rows.length };
  }

  if (!loaded)
    return (
      <div style={{ ...shell, alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: T.mut, fontFamily: FONT }}>Cargando…</div>
      </div>
    );

  return (
    <div style={desktop ? shellDesktop : shell}>
      <style>{css}</style>

      {desktop && (
        <aside style={sidebar}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "4px 8px 16px" }}>
            <span style={{ width: 34, height: 34, borderRadius: 9, background: T.goldSoft, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <IconChart color={T.gold} />
            </span>
            <span style={{ fontSize: 18, fontWeight: 700, color: T.text }}>Patrimonio</span>
          </div>
          {NAV.map(([id, label, short, Icon]) => (
            <button
              key={id}
              onClick={() => setTab(id)}
              style={{
                display: "flex", alignItems: "center", gap: 12,
                background: tab === id ? T.goldSoft : "transparent",
                border: "none", borderRadius: 11, padding: "12px 14px",
                cursor: "pointer", width: "100%", textAlign: "left",
                color: tab === id ? T.gold : T.mut, fontSize: 15, fontWeight: 600, fontFamily: FONT,
              }}
            >
              <Icon color={tab === id ? T.gold : T.mut} />
              {label}
            </button>
          ))}
        </aside>
      )}

      <div style={desktop ? contentCol : contentColMobile}>
      {/* Header */}
      <header
        style={{
          padding: "18px 20px 12px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
        }}
      >
        <div>
          {!desktop && (
            <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: -0.3, color: T.text }}>
              Patrimonio
            </div>
          )}
          <StatusDot status={priceStatus} lastUpdate={lastUpdate} source={source} />
        </div>
        <select
          value={cur}
          onChange={(e) => setSettings((s) => ({ ...s, currency: e.target.value }))}
          style={{
            background: T.card,
            color: T.text,
            border: `1px solid ${T.line}`,
            borderRadius: 10,
            padding: "8px 10px",
            fontSize: 13,
            fontFamily: FONT,
            appearance: "none",
          }}
        >
          {CURRENCIES.map((c) => (
            <option key={c.code} value={c.code}>
              {c.label}
            </option>
          ))}
        </select>
      </header>

      <main style={desktop ? mainDesktop : mainMobile}>
        <div style={desktop ? { maxWidth: 860, margin: "0 auto" } : undefined}>
        {tab === "balance" && (
          <BalanceTab totals={totals} cur={cur} prices={prices} />
        )}
        {tab === "accounts" && (
          <AccountsTab
            accounts={accounts}
            prices={prices}
            cur={cur}
            onAdd={(type) =>
              type === "crypto"
                ? setCryptoSheet(true)
                : setAcctSheet({ type, mode: "new" })
            }
            onEdit={(a) => (a.type === "crypto" ? setCryptoSheet(a) : setAcctSheet(a))}
          />
        )}
        {tab === "txns" && (
          <TxnsTab
            txns={txns}
            accounts={accounts}
            cur={cur}
            onAdd={() => setTxnSheet(true)}
            onDelete={deleteTxn}
          />
        )}
        {tab === "crypto" && (
          <CryptoTab
            accounts={accounts}
            prices={prices}
            cur={cur}
            onAdd={() => setCryptoSheet(true)}
            onEdit={(a) => setCryptoSheet(a)}
          />
        )}
        {tab === "divisas" && (
          <DivisasTab
            divisas={divisas}
            onAdd={(kind) => setDivisaSheet({ kind, mode: "new" })}
            onEdit={(d) => setDivisaSheet(d)}
            onDelete={deleteDivisa}
            onPatch={patchDivisa}
          />
        )}
        {tab === "concil" && <ConciliacionTab divisas={divisas} />}
        {tab === "ajustes" && (
          <AjustesTab
            settings={settings}
            setSettings={setSettings}
            accounts={accounts}
            txns={txns}
            prices={prices}
            cur={cur}
            divisas={divisas}
            onSync={syncSheet}
          />
        )}
        </div>
      </main>
      </div>

      {/* Tab bar (solo móvil) */}
      {!desktop && (
      <nav style={tabbar}>
        {[
          ["balance", "Balance", IconChart],
          ["accounts", "Cuentas", IconWallet],
          ["txns", "Movim.", IconSwap],
          ["crypto", "Cripto", IconCoin],
          ["divisas", "Divisas", IconExchange],
          ["concil", "Concil.", IconCheck],
          ["ajustes", "Ajustes", IconGear],
        ].map(([id, label, Icon]) => (
          <button
            key={id}
            onClick={() => setTab(id)}
            style={{
              background: "none",
              border: "none",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 3,
              cursor: "pointer",
              flex: 1,
              padding: "6px 0",
              color: tab === id ? T.gold : T.mut2,
            }}
          >
            <Icon color={tab === id ? T.gold : T.mut2} />
            <span style={{ fontSize: 9.5, fontFamily: FONT, fontWeight: 500 }}>
              {label}
            </span>
          </button>
        ))}
      </nav>
      )}

      {/* Sheets */}
      <AccountSheet
        state={acctSheet}
        cur={cur}
        onClose={() => setAcctSheet(null)}
        onSave={saveAccount}
        onDelete={deleteAccount}
      />
      <TxnSheet
        open={txnSheet}
        accounts={accounts}
        cur={cur}
        onClose={() => setTxnSheet(false)}
        onSave={addTxn}
      />
      <CryptoSheet
        state={cryptoSheet}
        cur={cur}
        onClose={() => setCryptoSheet(false)}
        onSave={saveAccount}
        onDelete={deleteAccount}
        prices={prices}
      />
      <DivisaSheet
        state={divisaSheet}
        divisas={divisas}
        onClose={() => setDivisaSheet(null)}
        onSave={saveDivisa}
        onDelete={deleteDivisa}
      />
    </div>
  );
}

                          display: "flex",

                          justifyContent: "center",
                          flexShrink: 0,
                          color: inc ? T.green : T.red,
                          fontSize: 18,
                          fontWeight: 700,
                        }}
                      >
                        {inc ? "↓" : "↑"}

                      <div style={{ minWidth: 0 }}>
                        <div

                        <div style={{ fontSize: 12, color: T.mut }}>{acctName(t.accountId)}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>

                        ×
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

      <button onClick={onAdd} style={{ ...rowCard, cursor: "pointer", justifyContent: "center", gap: 8, color: T.gold, fontWeight: 600, fontSize: 15, marginBottom: 20 }}>
        <IconPlus color={T.gold} /> Agregar cripto
      </button>
      {list.length === 0 ? (
        <div style={emptyRow}>Agregá tus tenencias (BTC, SOL, ETH o cualquier otra)</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {list.map((a) => {
            const p = prices[a.coinId];
            const livePrice = p?.price;
            const usedPrice = livePrice ?? a.manualPrice;
            const val = (a.amount || 0) * (usedPrice || 0);
            const up = (p?.change ?? 0) >= 0;
            return (
              <button key={a.id} onClick={() => onEdit(a)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>

                <span style={{ color: T.gold, fontSize: 20 }}>+</span>

          <div style={{ borderTop: `1px solid ${T.lineSoft}`, marginTop: 16, paddingTop: 14 }}>
            {!manualEntry ? (
              <button

              <>

/* ─────────────────────────────  Tab: Ajustes  ───────────────────────────── */
function AjustesTab({ settings, setSettings, accounts, txns, prices, cur, divisas, onSync }) {
  const theme = settings.theme || "dark";
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");
  async function doSync() {
    setSyncing(true);
    setSyncMsg("Sincronizando con Google Sheets…");
    try {
      const r = await onSync(settings.sheetUrl);
      if (r && r.ok) setSyncMsg(`Listo: ${r.count} operación(es) leídas del Sheet.`);
      else setSyncMsg((r && r.error) || "No se pudo sincronizar.");
    } catch (e) {
      setSyncMsg((e && e.message) || "No se pudo leer el Sheet. Revisá el link y tu conexión.");
    } finally {
      setSyncing(false);
    }
  }
  const pad = (n) => String(n).padStart(2, "0");
  const monthStart = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`;
  const monthEnd = (y, m) => {
    const d = new Date(y, m + 1, 0);
    return `${y}-${pad(m + 1)}-${pad(d.getDate())}`;
  };

  const [from, setFrom] = useState(monthStart());
  const [to, setTo] = useState(todayISO());
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const [dl, setDl] = useState(null);

  function thisMonth() {
    setFrom(monthStart());
    setTo(todayISO());
  }
  function lastMonth() {
    const n = new Date();
    const y = n.getMonth() === 0 ? n.getFullYear() - 1 : n.getFullYear();
    const m = (n.getMonth() + 11) % 12;
    setFrom(`${y}-${pad(m + 1)}-01`);
    setTo(monthEnd(y, m));
  }

  function ensureXLSX() {
    if (window.XLSX) return Promise.resolve(window.XLSX);
    return new Promise((res, rej) => {
      const urls = [
        "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
        "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js",
      ];
      let i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar el generador de Excel")); return; }
        const s = document.createElement("script");
        s.src = urls[i++];
        s.onload = () => (window.XLSX ? res(window.XLSX) : next());
        s.onerror = next;
        document.head.appendChild(s);
      })();
    });
  }

  async function exportExcel() {
    if (from > to) { setMsg("La fecha 'Desde' no puede ser mayor que 'Hasta'."); return; }
    setBusy(true);
    setMsg("Generando el Excel…");
    try {
      const XLSX = await ensureXLSX();
      const CUR = cur.toUpperCase();
      const inRange = (t) => t.date >= from && t.date <= to;
      const delta = (t) => (t.kind === "income" ? t.amount : -t.amount);
      const round2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;

      const fiat = accounts.filter((a) => a.type === "bank" || a.type === "cash");
      const nameOf = (id) => (accounts.find((a) => a.id === id) || {}).name || "—";

      // Resumen por cuenta (saldo inicial/final reconstruido desde los movimientos)
      let tIni = 0, tFin = 0, tIng = 0, tEgr = 0;
      const resumen = fiat.map((a) => {
        const bal = a.balance || 0;
        const after = txns.filter((t) => t.accountId === a.id && t.date > to).reduce((s, t) => s + delta(t), 0);
        const fromOn = txns.filter((t) => t.accountId === a.id && t.date >= from).reduce((s, t) => s + delta(t), 0);
        const fin = bal - after;
        const ini = bal - fromOn;
        const ing = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "income").reduce((s, t) => s + t.amount, 0);
        const egr = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "expense").reduce((s, t) => s + t.amount, 0);
        tIni += ini; tFin += fin; tIng += ing; tEgr += egr;
        return [a.name, TYPE_LABEL[a.type], round2(ini), round2(fin), round2(ing), round2(egr), round2(fin - ini)];
      });

      // Rentabilidad de divisas (asignación automática FIFO)
      const _divs = divisas || [];
      const _allV = _divs.filter((d) => d.kind === "venta");
      const _allC = _divs.filter((d) => d.kind === "compra");
      const _allo = allocateFIFO(_allV, _allC);
      const _ventasR = _allV.filter((v) => v.date >= from && v.date <= to);
      let dUsdVend = 0, dUsdRe = 0, dBsRec = 0, dBsUs = 0, dGan = 0, dCap = 0;
      _ventasR.forEach((v) => {
        const s = _allo.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0 };
        const usdEq = v.tasa > 0 ? s.vesUsados / v.tasa : 0;
        dUsdVend += v.usd || 0;
        dUsdRe += s.usdRecomprado;
        dBsRec += (v.usd || 0) * (v.tasa || 0);
        dBsUs += s.vesUsados;
        dGan += s.usdRecomprado - usdEq - comUsdOf(v);
        dCap += usdEq;
      });
      const dRent = dCap > 0 ? (dGan / dCap) * 100 : 0;

      const resumenAoa = [
        ["Reporte de patrimonio"],
        ["Período", `${from}  a  ${to}`],
        ["Moneda", CUR],
        [],
        ["Cuenta", "Tipo", `Saldo inicial (${CUR})`, `Saldo final (${CUR})`, `Ingresos (${CUR})`, `Egresos (${CUR})`, `Neto (${CUR})`],
        ...resumen,
        ["TOTAL", "", round2(tIni), round2(tFin), round2(tIng), round2(tEgr), round2(tFin - tIni)],
        [],
        ["Divisas (compra/venta USD)"],
        ["USD vendidos", round2(dUsdVend)],
        ["USD recomprado", round2(dUsdRe)],
        ["Bs recibidos (ventas)", round2(dBsRec)],
        ["Bs usados en compras (con comisión)", round2(dBsUs)],
        ["Ganancia por diferencial (USD)", round2(dGan)],
        ["Rentabilidad (%)", round2(dRent)],
      ];
      const wsR = XLSX.utils.aoa_to_sheet(resumenAoa);
      wsR["!cols"] = [{ wch: 30 }, { wch: 12 }, { wch: 16 }, { wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];

      // Movimientos del período
      const movs = txns.filter(inRange).slice().sort((a, b) => (a.date < b.date ? -1 : 1));
      const movAoa = [
        ["Fecha", "Tipo", "Motivo", "Cuenta / método", `Monto (${CUR})`],
        ...movs.map((t) => [
          t.date,
          t.kind === "income" ? "Ingreso" : "Egreso",
          t.motivo || "",
          nameOf(t.accountId),
          round2(t.kind === "income" ? t.amount : -t.amount),
        ]),
      ];
      const wsM = XLSX.utils.aoa_to_sheet(movAoa);
      wsM["!cols"] = [{ wch: 12 }, { wch: 10 }, { wch: 28 }, { wch: 22 }, { wch: 14 }];

      // Cripto (instantánea al momento de exportar)
      const cripto = accounts.filter((a) => a.type === "crypto");
      const criptoAoa = [
        ["Moneda", "Símbolo", "Cantidad", `Precio (${CUR})`, `Valor (${CUR})`],
        ...cripto.map((a) => {
          const p = (prices[a.coinId] || {}).price;
          const price = p != null ? p : a.manualPrice;
          return [a.name, a.symbol, a.amount || 0, price != null ? round2(price) : "", price != null ? round2((a.amount || 0) * price) : ""];
        }),
      ];
      const wsC = XLSX.utils.aoa_to_sheet(criptoAoa);
      wsC["!cols"] = [{ wch: 18 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];

      // Divisas por bloques (asignación automática FIFO, con fraccionamiento)
      const divs2 = divisas || [];
      const vesTot = (d) => (d.usd || 0) * (d.tasa || 0);
      const byDate = (a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0));
      const allV2 = divs2.filter((d) => d.kind === "venta");
      const allC2 = divs2.filter((d) => d.kind === "compra");
      const allo2 = allocateFIFO(allV2, allC2);
      const ventasRango = allV2.filter((v) => v.date >= from && v.date <= to).slice().sort(byDate);
      const header = ["Tipo", "Fecha", "Cliente", "USD", "Tasa (VES)", "VES", "Comisión (VES)", "Total VES", "Ganancia (USD)", "Rentab. %", "Referencia"];
      const aoa = [[`Divisas por venta · ${from} a ${to}  (USD y Bs)`], []];
      let gTotal = 0;
      ventasRango.forEach((v) => {
        const gen = vesTot(v);
        const s = allo2.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0, allocs: [] };
        const comV = comOp(v), comU = comUsdOf(v);
        aoa.push(header);
        aoa.push(["VENTA", v.date, v.persona || "", round2(v.usd || 0), v.tasa || 0, round2(gen), round2(comV), round2(gen - comV), "", "", v.referencia || ""]);
        s.allocs.forEach((a) => {
          const c = a.compra;
          const frac = (c.usd || 0) > 0 ? a.usd / (c.usd || 1) : 0;
          const cCom = comOp(c) * frac;
          const cVes = a.usd * (c.tasa || 0);
          aoa.push(["Compra", c.date, c.persona || "", round2(a.usd), c.tasa || 0, round2(cVes), round2(cCom), round2(a.ves), "", "", c.referencia || ""]);
        });
        if (s.allocs.length === 0) aoa.push(["(sin compras asignadas)", "", "", "", "", "", "", "", "", "", ""]);
        const usdRe = s.usdRecomprado, vesUs = s.vesUsados;
        const usdEq = v.tasa > 0 ? vesUs / v.tasa : 0;
        const gan = usdRe - usdEq - comU;
        const rent = usdEq > 0 ? (gan / usdEq) * 100 : 0;
        gTotal += gan;
        aoa.push(["TOTAL RENTABILIDAD", "", "", round2(usdRe), "", round2(vesUs), "", "", round2(gan), round2(rent), ""]);
        aoa.push([]);
      });
      // Porciones sin asignar (compras sin venta con VES disponibles), del período
      const sinAsig = allo2.unalloc.filter((a) => a.compra.date >= from && a.compra.date <= to);
      if (sinAsig.length) {
        aoa.push(["SIN ASIGNAR"], header);
        sinAsig.forEach((a) => {
          const c = a.compra;
          const frac = (c.usd || 0) > 0 ? a.usd / (c.usd || 1) : 0;
          aoa.push(["Compra", c.date, c.persona || "", round2(a.usd), c.tasa || 0, round2(a.usd * (c.tasa || 0)), round2(comOp(c) * frac), round2(a.ves), "", "", c.referencia || ""]);
        });
        aoa.push([]);
      }
      aoa.push(["GANANCIA TOTAL (USD)", "", "", "", "", "", "", "", round2(gTotal), "", ""]);
      const wsDiv = XLSX.utils.aoa_to_sheet(aoa);
      wsDiv["!cols"] = [{ wch: 20 }, { wch: 12 }, { wch: 18 }, { wch: 12 }, { wch: 12 }, { wch: 16 }, { wch: 15 }, { wch: 16 }, { wch: 15 }, { wch: 10 }, { wch: 16 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, wsR, "Resumen");
      XLSX.utils.book_append_sheet(wb, wsM, "Movimientos");
      XLSX.utils.book_append_sheet(wb, wsC, "Cripto");
      XLSX.utils.book_append_sheet(wb, wsDiv, "Divisas");
      if (dl && dl.url) URL.revokeObjectURL(dl.url);
      setDl(wbToBlobUrl(XLSX, wb, `patrimonio_${from}_a_${to}.xlsx`));
      setMsg("Archivo generado. Tocá el botón verde para abrirlo o guardarlo.");
    } catch (e) {
      setMsg((e && e.message) || "No se pudo generar el Excel. Probá con conexión a internet.");
    } finally {
      setBusy(false);
    }
  }

  const seg = (active, color) => ({
    flex: 1, border: "none", borderRadius: 9, padding: "11px", fontSize: 15,
    fontWeight: 600, fontFamily: FONT, cursor: "pointer",
    background: active ? color : "transparent",
    color: active ? "#0A0F1E" : T.mut,
  });
  const preset = {
    background: T.card, border: `1px solid ${T.line}`, borderRadius: 10,
    padding: "9px 12px", color: T.text, fontSize: 13, fontFamily: FONT, cursor: "pointer",
  };

  return (
    <div style={{ paddingTop: 8 }}>
      {/* Apariencia */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Apariencia</div>
      <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 8, border: `1px solid ${T.lineSoft}` }}>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "dark" }))} style={seg(theme === "dark", T.gold)}>
          Oscuro
        </button>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "light" }))} style={seg(theme === "light", T.gold)}>
          Claro
        </button>
      </div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2 }}>
        Tema en azules con acentos dorados. Se guarda automáticamente.
      </div>

      {/* Vista */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Vista</div>
      <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 8, border: `1px solid ${T.lineSoft}` }}>
        {[["auto", "Automática"], ["mobile", "Móvil"], ["desktop", "Escritorio"]].map(([v, label]) => (
          <button key={v} onClick={() => setSettings((s) => ({ ...s, layout: v }))} style={seg((settings.layout || "auto") === v, T.gold)}>
            {label}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2, lineHeight: 1.5 }}>
        "Automática" usa escritorio en pantallas anchas y móvil en el teléfono. En escritorio, el menú pasa a la barra lateral.
      </div>

      {/* Exportar */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Exportar a Excel</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, marginLeft: 2 }}>
        Genera un archivo .xlsx con: Resumen (saldo inicial y final por cuenta),
        Movimientos del período, Cripto y Divisas (cada venta con sus compras y su rentabilidad).
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Desde</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={from} onChange={(e) => setFrom(e.target.value)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Hasta</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={to} onChange={(e) => setTo(e.target.value)} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <button onClick={thisMonth} style={preset}>Este mes</button>
        <button onClick={lastMonth} style={preset}>Mes pasado</button>
      </div>

      <PrimaryBtn color={T.gold} disabled={busy} onClick={exportExcel}>
        {busy ? "Generando…" : "Generar Excel"}
      </PrimaryBtn>
      {dl && (
        <a href={dl.url} download={dl.name} style={{ display: "block", textAlign: "center", background: T.green, color: "#0A0F1E", borderRadius: 12, padding: "13px", fontWeight: 600, textDecoration: "none", marginTop: 10 }}>
          Abrir / guardar el Excel
        </a>
      )}
      {msg && (
        <div style={{ fontSize: 13, color: T.mut, marginTop: 12, marginLeft: 2, lineHeight: 1.5 }}>{msg}</div>
      )}

      {/* Sincronización con Google Sheets */}
      <div style={{ ...sectionTitle, marginTop: 30, marginBottom: 10 }}>Sincronizar divisas (Google Sheets)</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, marginLeft: 2, lineHeight: 1.5 }}>
        Pegá el link CSV publicado de tu hoja. La app lee las operaciones que carga tu bot y las suma
        a Divisas (sin duplicar, usando la Referencia). También sincroniza sola al abrir.
      </div>
      <Field label="Link CSV del Google Sheet">
        <input
          style={{ ...inputStyle, fontSize: 13 }}
          value={settings.sheetUrl || ""}
          onChange={(e) => setSettings((s) => ({ ...s, sheetUrl: e.target.value }))}
          placeholder="https://docs.google.com/…/pub?...&output=csv"
          autoCapitalize="none"
          autoCorrect="off"
        />
      </Field>
      <PrimaryBtn color={T.blue} disabled={syncing || !(settings.sheetUrl || "").trim()} onClick={doSync}>
        {syncing ? "Sincronizando…" : "Sincronizar ahora"}
      </PrimaryBtn>
      {syncMsg && (
        <div style={{ fontSize: 13, color: T.mut, marginTop: 12, marginLeft: 2, lineHeight: 1.5 }}>{syncMsg}</div>
      )}
    </div>
  );
}

/* ─────────────────────────────  Tab: Divisas (USD / VES)  ───────────────────────────── */
function DivisasTab({ divisas, onAdd, onEdit, onDelete, onPatch }) {
  const [openId, setOpenId] = useState(null);
  const [busyId, setBusyId] = useState(null);
  const [receiptErr, setReceiptErr] = useState("");
  const [viewer, setViewer] = useState(null);
  const ventas = divisas.filter((d) => d.kind === "venta");
  const compras = divisas.filter((d) => d.kind === "compra");
  const vesDe = (d) => (d.usd || 0) * (d.tasa || 0);
  const comisionDe = (d) => comOp(d);

  const usdVendidos = ventas.reduce((s, d) => s + (d.usd || 0), 0);
  const usdComprados = compras.reduce((s, d) => s + (d.usd || 0), 0);
  const usdFaltan = usdVendidos - usdComprados;

  const bsRecibidos = ventas.reduce((s, d) => s + vesDe(d), 0);
  const bsPagados = compras.reduce((s, d) => s + vesDe(d) + comisionDe(d), 0);
  const bsDisponibles = bsRecibidos - bsPagados;

  // Rentabilidad por venta con asignación automática FIFO (con fraccionamiento)
  const alloc = allocateFIFO(ventas, compras);
  const statsDeVenta = (v) => {
    const s = alloc.ventaStats[v.id] || { usdRecomprado: 0, vesUsados: 0, allocs: [] };
    const vesGenerados = vesDe(v);
    const comVesV = comOp(v);
    const comUsdV = comUsdOf(v);
    const vesNeto = vesGenerados - comVesV;
    const vesRestantes = vesNeto - s.vesUsados;
    const usdEquiv = v.tasa > 0 ? s.vesUsados / v.tasa : 0;
    const gananciaUsd = s.usdRecomprado - usdEquiv - comUsdV;
    const rentab = usdEquiv > 0 ? (gananciaUsd / usdEquiv) * 100 : 0;
    return { allocs: s.allocs, usdRecomprado: s.usdRecomprado, vesUsados: s.vesUsados, vesGenerados, vesNeto, vesRestantes, comVesV, comUsdV, gananciaUsd, rentab };
  };
  const gananciaTotal = ventas.reduce((s, v) => s + statsDeVenta(v).gananciaUsd, 0);

  const ordenadas = divisas.slice().sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.createdAt || 0) - (a.createdAt || 0)));

  const chip = (label, val, color) => (
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11.5, color: T.mut, marginBottom: 3 }}>{label}</div>
      <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 13.5, fontWeight: 600, color: color || T.text }}>
        {val}
      </div>
    </div>
  );

  const seg = (active, color) => ({
    flex: 1, border: "none", borderRadius: 9, padding: "10px", fontSize: 14,
    fontWeight: 600, fontFamily: FONT, cursor: "pointer",
    background: active ? color : "transparent", color: active ? "#0A0F1E" : T.mut,
  });
  const miniBtn = { flex: 1, borderRadius: 11, padding: "11px", fontSize: 13.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer", textAlign: "center", boxSizing: "border-box" };
  const sortDesc = (a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : (b.createdAt || 0) - (a.createdAt || 0));
  const sortAsc = (a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : (a.createdAt || 0) - (b.createdAt || 0));
  const ventasOrden = ventas.slice().sort(sortDesc);
  const sueltas = compras.filter((c) => !c.ventaId).slice().sort(sortDesc);

  async function onReceiptFile(op, e) {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    setBusyId(op.id); setReceiptErr("");
    try { const stored = await fileToStored(f); await idbPut(op.id, stored); onPatch(op.id, { hasReceipt: true }); }
    catch (ex) { setReceiptErr((ex && ex.message) || "No se pudo guardar el comprobante."); }
    finally { setBusyId(null); }
  }
  async function openReceipt(op) {
    setReceiptErr("");
    try { const stored = await idbGet(op.id); if (stored) setViewer({ op, stored }); else setReceiptErr("No se encontró el comprobante."); }
    catch { setReceiptErr("No se pudo abrir el comprobante."); }
  }
  async function removeReceipt(op) { await idbDel(op.id); onPatch(op.id, { hasReceipt: false }); }

  const allocRow = (a, i) => {
    const c = a.compra;
    const parcial = a.usd < (c.usd || 0) - 1e-6;
    return (
      <button key={c.id + "-" + i} onClick={() => onEdit(c)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: T.text }}>
            {fmtUsd(a.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(c.tasa || 0).toLocaleString("es-VE")}</span>
            {parcial && <span style={{ color: T.gold, fontWeight: 400 }}> · parcial de {fmtUsd(c.usd)}</span>}
          </div>
          <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
            {fmtDate(c.date)} · {fmtBs(a.ves)}{comUsdOf(c) > 0 ? ` · com. ${fmtUsd(comUsdOf(c) * (a.usd / (c.usd || 1)))}` : ""}{c.persona ? ` · ${c.persona}` : ""}{c.referencia ? ` · ref ${c.referencia}` : ""}
          </div>
        </div>
        <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); }} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1, paddingLeft: 8 }} aria-label="Eliminar">×</button>
      </button>
    );
  };

  const compraRow = (c) => (
    <button key={c.id} onClick={() => onEdit(c)} style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: T.text }}>
          {fmtUsd(c.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(c.tasa || 0).toLocaleString("es-VE")}</span>
        </div>
        <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
          {fmtDate(c.date)} · {fmtBs(vesDe(c))} · com. {fmtBs(comisionDe(c))}{c.persona ? ` · ${c.persona}` : ""}{c.referencia ? ` · ref ${c.referencia}` : ""}
        </div>
      </div>
      <button onClick={(e) => { e.stopPropagation(); onDelete(c.id); }} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1, paddingLeft: 8 }} aria-label="Eliminar">×</button>
    </button>
  );

  return (
    <div style={{ paddingTop: 4 }}>
      {/* Recuadro: faltante por comprar */}
      <div
        style={{
          background: `linear-gradient(160deg, ${T.card2}, ${T.card})`,
          border: `1px solid ${T.line}`,
          borderRadius: 20,
          padding: "20px",
          marginBottom: 18,
        }}
      >
        <div style={{ fontSize: 13, color: T.mut, fontWeight: 500 }}>Por comprar (posición)</div>
        <div style={{ display: "flex", gap: 14, marginTop: 10, marginBottom: 16 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: T.mut, marginBottom: 4 }}>USD faltan por comprar</div>
            <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 26, fontWeight: 600, letterSpacing: -0.5, color: usdFaltan > 0 ? T.gold : T.green }}>
              {fmtUsd(usdFaltan)}
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 12, color: T.mut, marginBottom: 4 }}>Bs disponibles</div>
            <div style={{ fontFamily: MONO, fontVariantNumeric: "tabular-nums", fontSize: 26, fontWeight: 600, letterSpacing: -0.5, color: bsDisponibles >= 0 ? T.text : T.red }}>
              {fmtBs(bsDisponibles)}
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, paddingTop: 14, borderTop: `1px solid ${T.lineSoft}` }}>
          {chip("USD vendidos", fmtUsd(usdVendidos), T.green)}
          {chip("USD comprados", fmtUsd(usdComprados), T.blue)}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 12 }}>
          {chip("Bs recibidos", fmtBs(bsRecibidos), T.green)}
          {chip("Bs pagados", fmtBs(bsPagados), T.red)}
        </div>
        <div style={{ display: "flex", gap: 12, marginTop: 14, paddingTop: 14, borderTop: `1px solid ${T.lineSoft}` }}>
          {chip(
            "Ganancia total (diferencial)",
            `${gananciaTotal >= 0 ? "+" : ""}${fmtUsd(gananciaTotal)}`,
            gananciaTotal >= 0 ? T.green : T.red
          )}
        </div>
      </div>

      {/* Botones de alta */}
      <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
        <button
          onClick={() => onAdd("venta")}
          style={{ flex: 1, background: T.greenSoft, color: T.green, border: `1px solid ${T.green}`, borderRadius: 13, padding: "13px", fontSize: 14.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}
        >
          + Venta USD
        </button>
        <button
          onClick={() => onAdd("compra")}
          style={{ flex: 1, background: "rgba(91,141,239,0.14)", color: T.blue, border: `1px solid ${T.blue}`, borderRadius: 13, padding: "13px", fontSize: 14.5, fontWeight: 600, fontFamily: FONT, cursor: "pointer" }}
        >
          + Compra USD
        </button>
      </div>

      {/* Ventas (desplegables) */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Ventas</div>
      {ventasOrden.length === 0 ? (
        <div style={emptyRow}>Registrá tu primera venta de divisas</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {ventasOrden.map((v) => {
            const st = statsDeVenta(v);
            const open = openId === v.id;
            const pagado = !!v.pagado;
            return (
              <div key={v.id} style={{ ...rowCard, flexDirection: "column", alignItems: "stretch", padding: 0, overflow: "hidden" }}>
                <div onClick={() => setOpenId(open ? null : v.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, padding: "13px 15px", cursor: "pointer" }}>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: T.green, background: T.greenSoft, padding: "2px 8px", borderRadius: 6 }}>VENTA</span>
                      <span style={{ fontSize: 12, color: T.mut }}>{fmtDate(v.date)}</span>
                      <span style={{ fontSize: 10.5, fontWeight: 700, padding: "2px 8px", borderRadius: 6, color: pagado ? T.green : T.mut2, background: pagado ? T.greenSoft : T.bg2, border: `1px solid ${pagado ? T.green : T.line}` }}>
                        {pagado ? "PAGADO" : "NO PAGADO"}
                      </span>
                      {v.hasReceipt && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 6, color: T.blue, background: "rgba(91,141,239,0.14)" }}>ADJUNTO</span>}
                    </div>
                    <div style={{ fontSize: 14.5, fontWeight: 600, color: T.text }}>
                      {fmtUsd(v.usd)} <span style={{ color: T.mut, fontWeight: 400 }}>× {(v.tasa || 0).toLocaleString("es-VE")}</span>
                    </div>
                    <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO, marginTop: 2 }}>
                      {fmtBs(vesDe(v))}{v.persona ? ` · ${v.persona}` : ""}
                    </div>
                    <div style={{ fontSize: 12, marginTop: 4, color: st.gananciaUsd >= 0 ? T.green : T.red, fontWeight: 600 }}>
                      {st.allocs.length} compra(s) · {st.gananciaUsd >= 0 ? "+" : ""}{fmtUsd(st.gananciaUsd)} ({st.rentab.toFixed(2)}%)
                    </div>
                  </div>
                  <span style={{ color: T.mut2, fontSize: 12, paddingTop: 2 }}>{open ? "▲" : "▼"}</span>
                </div>

                {open && (
                  <div style={{ padding: "4px 15px 16px", borderTop: `1px solid ${T.lineSoft}` }}>
                    <div style={{ ...sectionTitle, margin: "14px 0 8px" }}>Estado de pago</div>
                    <div style={{ display: "flex", background: T.card2, borderRadius: 11, padding: 4, border: `1px solid ${T.lineSoft}` }}>
                      <button onClick={() => onPatch(v.id, { pagado: false })} style={seg(!pagado, T.mut2)}>No pagado</button>
                      <button onClick={() => onPatch(v.id, { pagado: true })} style={seg(pagado, T.green)}>Pagado</button>
                    </div>

                    <div style={{ ...sectionTitle, margin: "16px 0 8px" }}>Comprobante de pago</div>
                    {v.hasReceipt ? (
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={() => openReceipt(v)} style={{ ...miniBtn, background: T.blue, color: "#0A0F1E" }}>Ver comprobante</button>
                        <button onClick={() => removeReceipt(v)} style={{ ...miniBtn, background: "transparent", color: T.red, border: `1px solid ${T.red}` }}>Quitar</button>
                      </div>
                    ) : (
                      <label style={{ ...miniBtn, display: "block", background: T.goldSoft, color: T.gold, border: `1px solid ${T.gold}` }}>
                        {busyId === v.id ? "Guardando…" : "Cargar comprobante"}
                        <input type="file" accept="image/*,application/pdf" style={{ display: "none" }} onChange={(e) => onReceiptFile(v, e)} />
                      </label>
                    )}
                    {receiptErr && <div style={{ fontSize: 12.5, color: T.red, marginTop: 8 }}>{receiptErr}</div>}

                    <div style={{ ...sectionTitle, margin: "16px 0 8px" }}>Compras asignadas (FIFO) ({st.allocs.length})</div>
                    {st.allocs.length === 0 ? (
                      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 6 }}>Aún sin compras asignadas a esta venta.</div>
                    ) : (
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {st.allocs.map((a, i) => allocRow(a, i))}
                      </div>
                    )}

                    <div style={{ marginTop: 12, padding: "10px 12px", background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 10, fontSize: 12, color: T.mut }}>
                      VES generados {fmtBs(st.vesGenerados)} · usados {fmtBs(st.vesUsados)} · restante {fmtBs(st.vesRestantes)}
                      {st.comVesV > 0 ? ` · comisión ${fmtBs(st.comVesV)}` : ""}
                      {st.comUsdV > 0 ? ` · comisión ${fmtUsd(st.comUsdV)}` : ""}
                    </div>

          })}

      )}

      {alloc.unalloc.length > 0 && (

/* ─────────────────────────────  Sheet: Divisa (venta/compra)  ───────────────────────────── */
function DivisaSheet({ state, divisas, onClose, onSave, onDelete }) {
  const editing = state && state.id;
  const kind = state ? state.kind : "venta";
  const venta = kind === "venta";
  const [usd, setUsd] = useState("");
  const [tasa, setTasa] = useState("");

  const [comisionTipo, setComisionTipo] = useState("mismo");
  const [comMode, setComMode] = useState("pct");
  const [comVes, setComVes] = useState("");
  const [comUsd, setComUsd] = useState("");

  const [referencia, setReferencia] = useState("");

  useEffect(() => {
    if (state && state.id) {
      setUsd(String(state.usd ?? ""));
      setTasa(String(state.tasa ?? ""));

      setComisionTipo(state.comisionTipo || "mismo");
      setComMode(state.comMode || (state.kind === "venta" ? "none" : "pct"));
      setComVes(state.comisionVesInput != null ? String(state.comisionVesInput) : "");
      setComUsd(state.comisionUsdInput != null ? String(state.comisionUsdInput) : "");
      setVentaId(state.ventaId || "");
      setReferencia(state.referencia || "");
      setDate(state.date || todayISO());
    } else if (state) {
      setUsd(""); setTasa(""); setPersona(""); setComisionTipo("mismo"); setComMode(state.kind === "venta" ? "none" : "pct"); setComVes(""); setComUsd(""); setReferencia(""); setDate(todayISO());
      // Asignación automática: si es compra y hay una venta "abierta" (con Bs restantes),
      // elegir la más antigua para cerrarlas en orden.
      let auto = "";
      if (state.kind === "compra") {
        const abiertas = (divisas || [])
          .filter((d) => d.kind === "venta")
          .map((v) => {
            const generados = (v.usd || 0) * (v.tasa || 0);
            const usados = (divisas || [])
              .filter((c) => c.kind === "compra" && c.ventaId === v.id)
              .reduce((s, c) => s + (c.usd || 0) * (c.tasa || 0) + comOp(c), 0);
            return { v, restante: generados - usados };
          })
          .filter((x) => x.restante > 0.01)
          .sort((a, b) =>
            a.v.date < b.v.date ? -1 : a.v.date > b.v.date ? 1 : (a.v.createdAt || 0) - (b.v.createdAt || 0)
          );
        if (abiertas.length) auto = abiertas[0].v.id;
      }
      setVentaId(auto);
    }
  }, [state]);

  if (!state) return null;
  const nUsd = numVE(usd);
  const nTasa = numVE(tasa);
  const ves = (isNaN(nUsd) ? 0 : nUsd) * (isNaN(nTasa) ? 0 : nTasa);
  const comVesAmt =
    comMode === "ves" ? (numVE(comVes) || 0)
    : comMode === "usd" ? 0
    : comMode === "none" ? 0
    : ves * (COMISION[comisionTipo] || 0);
  const comUsdAmt = comMode === "usd" ? (numVE(comUsd) || 0) : 0;
  const valid = !isNaN(nUsd) && nUsd > 0 && !isNaN(nTasa) && nTasa > 0 && persona.trim();

  const readonly = { ...inputStyle, background: T.bg2, color: T.text, fontFamily: MONO };

  // Ventas disponibles como origen de los VES (con su saldo restante)
  const ventasList = (divisas || [])
    .filter((d) => d.kind === "venta")
    .map((v) => {
      const generados = (v.usd || 0) * (v.tasa || 0);
      const usados = (divisas || [])
        .filter((c) => c.kind === "compra" && c.ventaId === v.id && c.id !== state.id)
        .reduce((s, c) => s + (c.usd || 0) * (c.tasa || 0) + comOp(c), 0);
      return { v, restante: generados - usados };
    });

  return (
    <Sheet open={!!state} onClose={onClose} title={(editing ? "Editar " : "") + (venta ? "Venta de USD" : "Compra de USD")}>
      <Field label="Monto USD">
        <input style={{ ...inputStyle, fontFamily: MONO, fontSize: 22 }} value={usd} onChange={(e) => setUsd(e.target.value)} inputMode="decimal" placeholder="0.00" autoFocus />
      </Field>
      <Field label="Tasa (VES por USD)">
        <input style={{ ...inputStyle, fontFamily: MONO }} value={tasa} onChange={(e) => setTasa(e.target.value)} inputMode="decimal" placeholder="0.00" />
      </Field>
      <Field label="VES totales">
        <input style={readonly} value={fmtBs(ves)} readOnly />
      </Field>

      {venta ? (
        <>
          <Field label="Persona a quien le vendimos">
            <input style={inputStyle} value={persona} onChange={(e) => setPersona(e.target.value)} placeholder="Nombre" />
          </Field>
          <Field label="Comisión (opcional)">
            <select style={{ ...inputStyle, appearance: "none" }} value={comMode} onChange={(e) => setComMode(e.target.value)}>
              <option value="none">Sin comisión</option>
              <option value="ves">Monto en VES</option>
              <option value="usd">Monto en USD</option>
            </select>
          </Field>
          {comMode === "ves" && (
            <Field label="Comisión en VES">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comVes} onChange={(e) => setComVes(e.target.value)} inputMode="decimal" placeholder="0,00" />
            </Field>
          )}
          {comMode === "usd" && (
            <Field label="Comisión en USD">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comUsd} onChange={(e) => setComUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />
            </Field>
          )}
          {comMode !== "none" && (
            <div style={{ fontSize: 12.5, color: T.mut, margin: "-4px 2px 12px" }}>
              {comMode === "usd"
                ? <>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtUsd(comUsdAmt)}</span> (se descuenta de la ganancia)</>
                : <>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtBs(comVesAmt)}</span> (reduce los VES disponibles)</>}
            </div>
          )}
        </>
      ) : (
        <>
          <Field label="Cliente a quien le compramos">
            <input style={inputStyle} value={persona} onChange={(e) => setPersona(e.target.value)} placeholder="Nombre" />
          </Field>
          <Field label="Comisión">
            <select style={{ ...inputStyle, appearance: "none" }} value={comMode} onChange={(e) => setComMode(e.target.value)}>
              <option value="pct">Banco (0% / 0,3%)</option>
              <option value="ves">Monto en VES</option>
              <option value="usd">Monto en USD</option>
            </select>
          </Field>
          {comMode === "pct" && (
            <Field label="Banco">
              <select style={{ ...inputStyle, appearance: "none" }} value={comisionTipo} onChange={(e) => setComisionTipo(e.target.value)}>
                <option value="mismo">{COMISION_LABEL.mismo}</option>
                <option value="otros">{COMISION_LABEL.otros}</option>
              </select>
            </Field>
          )}
          {comMode === "ves" && (
            <Field label="Comisión en VES">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comVes} onChange={(e) => setComVes(e.target.value)} inputMode="decimal" placeholder="0,00" />
            </Field>
          )}
          {comMode === "usd" && (
            <Field label="Comisión en USD">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comUsd} onChange={(e) => setComUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />
            </Field>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: T.mut, margin: "-4px 2px 16px" }}>
            {comMode === "usd" ? (
              <>
                <span>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtUsd(comUsdAmt)}</span></span>
                <span>USDT neto: <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>{fmtUsd((isNaN(nUsd) ? 0 : nUsd) - comUsdAmt)}</span></span>
              </>
            ) : (
              <>
                <span>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtBs(comVesAmt)}</span></span>
                <span>Total VES: <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>{fmtBs(ves + comVesAmt)}</span></span>
              </>
            )}
          </div>
          <div style={{ fontSize: 12, color: T.mut, margin: "4px 2px 8px", lineHeight: 1.5 }}>
            Esta compra se asigna automáticamente a las ventas abiertas por orden de llegada (solo ventas con fecha igual o anterior a la compra). Si agota una venta, se fracciona hacia la siguiente.
          </div>
        </>
      )}

      <Field label="Referencia bancaria (opcional)">
        <input style={inputStyle} value={referencia} onChange={(e) => setReferencia(e.target.value)} placeholder="N° de operación / referencia" autoCapitalize="none" />
      </Field>

      <Field label="Fecha">
        <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={date} onChange={(e) => setDate(e.target.value)} />
      </Field>

      <PrimaryBtn
        color={venta ? T.green : T.blue}
        disabled={!valid}
        onClick={() =>
          onSave({
            id: state.id,
            kind,
            usd: nUsd,
            tasa: nTasa,
            date,
            persona: persona.trim(),
            referencia: referencia.trim() || undefined,
            comMode,
            comisionTipo,
            comisionVesInput: comMode === "ves" ? (numVE(comVes) || 0) : undefined,
            comisionUsdInput: comMode === "usd" ? (numVE(comUsd) || 0) : undefined,
          })
        }
      >
        {editing ? "Guardar cambios" : venta ? "Registrar venta" : "Registrar compra"}
      </PrimaryBtn>
      {editing && (
        <button onClick={() => onDelete(state.id)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
          Eliminar operación

    </Sheet>
  );

/* ── Conciliación bancaria: lectura de estado de cuenta + Excel con colores ── */
function ensureXLSXStyle() {
  if (window.XLSX && window.XLSX.__styled) return Promise.resolve(window.XLSX);
  return new Promise((res, rej) => {
    const urls = [
      "https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js",
      "https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js",
    ];
    let i = 0;
    (function next() {
      if (i >= urls.length) { rej(new Error("No se pudo cargar el generador de Excel.")); return; }
      const s = document.createElement("script");
      s.src = urls[i++];
      s.onload = () => { if (window.XLSX) { window.XLSX.__styled = true; res(window.XLSX); } else next(); };
      s.onerror = next;
      document.head.appendChild(s);
    })();
  });
}
function wbToBlobUrl(XLSX, wb, name) {
  const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([out], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  return { url: URL.createObjectURL(blob), name };
}
function normRef(s) {
  return String(s || "").replace(/\s+/g, "").replace(/[^0-9a-zA-Z]/g, "").replace(/^0+/, "").toLowerCase();
}
function parseBankRows(rows) {
  const norm = (s) => String(s || "").toLowerCase().trim();
  let hi = -1, cols = null;
  for (let i = 0; i < Math.min(rows.length, 30); i++) {
    const r = (rows[i] || []).map(norm);
    const fFecha = r.findIndex((c) => c.includes("fecha"));
    const fRef = r.findIndex((c) => c.includes("refer") || c.includes("comprob") || c.includes("operac") || c.includes("nro") || c.includes("número") || c.includes("numero"));
    const fMonto = r.findIndex((c) => c.includes("monto") || c.includes("importe") || c.includes("valor") || c.includes("crédito") || c.includes("credito") || c.includes("débito") || c.includes("debito") || c === "bs" || c.includes("monto bs"));
    if (fFecha >= 0 && (fRef >= 0 || fMonto >= 0)) {
      cols = {
        fFecha, fRef, fMonto,
        fCred: r.findIndex((c) => c.includes("crédito") || c.includes("credito") || c.includes("haber") || c.includes("abono")),
        fDeb: r.findIndex((c) => c.includes("débito") || c.includes("debito") || c.includes("debe") || c.includes("cargo")),
      };
      hi = i; break;
    }
  }
  if (hi < 0) return [];
  const out = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const row = rows[i]; if (!row) continue;
    const fecha = fechaISO(row[cols.fFecha]);
    const ref = cols.fRef >= 0 ? String(row[cols.fRef] || "").trim() : "";
    let monto = cols.fMonto >= 0 ? numVE(row[cols.fMonto]) : NaN;
    if (isNaN(monto) && cols.fCred >= 0) monto = numVE(row[cols.fCred]);
    if (isNaN(monto) && cols.fDeb >= 0) monto = numVE(row[cols.fDeb]);
    if (!ref && isNaN(monto)) continue;
    out.push({ fecha, ref, monto: isNaN(monto) ? null : Math.abs(monto), refKey: normRef(ref) });
  }
  return out;
}

/* ─────────────────────────────  Tab: Conciliación  ───────────────────────────── */
function ConciliacionTab({ divisas }) {
  const pad = (n) => String(n).padStart(2, "0");
  const monthStart = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`;
  const round2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;
  const [from, setFrom] = useState(monthStart());
  const [to, setTo] = useState(todayISO());
  const [bankRows, setBankRows] = useState(null);
  const [files, setFiles] = useState([]);
  const [bankMsg, setBankMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const [dl, setDl] = useState(null);

  const ops = (divisas || []).filter((d) => d.date >= from && d.date <= to);
  const result = useMemo(() => {
    if (!bankRows) return null;
    const byRef = {};
    bankRows.forEach((b) => { if (b.refKey) byRef[b.refKey] = b; });
    return ops.map((o) => {
      const monto = (o.usd || 0) * (o.tasa || 0);
      const tipo = o.kind === "venta" ? "Ingreso" : "Egreso";
      const rk = normRef(o.referencia || "");
      let estado = "No encontrado", banco = null;
      if (rk && byRef[rk]) { estado = "Validado"; banco = byRef[rk]; }
      else {
        const cand = bankRows.find((b) => b.fecha === o.date && b.monto != null && Math.abs(b.monto - monto) <= Math.max(1, monto * 0.01));
        if (cand) { estado = "Validado (monto/fecha)"; banco = cand; }
      }
      return { fecha: o.date, tipo, referencia: o.referencia || "", monto, estado, banco };
    });
  }, [bankRows, from, to, divisas]);

  const okCount = result ? result.filter((r) => r.estado.indexOf("Validado") === 0).length : 0;
  const noCount = result ? result.length - okCount : 0;
  const total = result ? result.length : 0;
  const completo = !!result && total > 0 && noCount === 0;

  async function onBankFiles(e) {
    const fs = Array.from(e.target.files || []);
    e.target.value = "";
    if (!fs.length) return;
    setBusy(true); setBankMsg("Leyendo estado(s) de cuenta…");
    try {
      const XLSX = await ensureXLSXStyle();
      let added = [];
      const newFiles = [];
      for (const f of fs) {
        try {
          const buf = await f.arrayBuffer();
          const wb = XLSX.read(buf, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
          const parsed = parseBankRows(rows);
          added = added.concat(parsed);
          newFiles.push({ name: f.name, count: parsed.length });
        } catch { newFiles.push({ name: f.name, count: 0 }); }
      }
      setBankRows((prev) => [...(prev || []), ...added]);
      setFiles((prev) => [...prev, ...newFiles]);
      setBankMsg(added.length ? `${added.length} movimientos agregados.` : "No se identificaron columnas en el/los archivo(s). Revisá los encabezados.");
    } catch (ex) { setBankMsg((ex && ex.message) || "No se pudo leer el archivo."); }
    finally { setBusy(false); }
  }
  function clearAll() { setBankRows(null); setFiles([]); setBankMsg(""); setDl(null); }

  async function download() {
    if (!result) return;
    setBusy(true);
    try {
      const XLSX = await ensureXLSXStyle();
      const header = ["Fecha", "Tipo (Ingreso/Egreso)", "Referencia", "Monto (Bs)", "Estado", "Banco fecha", "Banco monto (Bs)"];
      const aoa = [header, ...result.map((r) => [r.fecha, r.tipo, r.referencia, round2(r.monto), r.estado, r.banco ? r.banco.fecha : "", r.banco && r.banco.monto != null ? round2(r.banco.monto) : ""])];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 12 }, { wch: 20 }, { wch: 24 }, { wch: 16 }, { wch: 20 }, { wch: 12 }, { wch: 16 }];
      const green = { fill: { patternType: "solid", fgColor: { rgb: "C6EFCE" } } };
      const yellow = { fill: { patternType: "solid", fgColor: { rgb: "FFEB9C" } } };
      const head = { font: { bold: true }, fill: { patternType: "solid", fgColor: { rgb: "D9E1F2" } } };
      for (let c = 0; c < header.length; c++) {
        const ref = XLSX.utils.encode_cell({ r: 0, c });
        if (ws[ref]) ws[ref].s = head;
      }
      result.forEach((r, idx) => {
        const style = r.estado.indexOf("Validado") === 0 ? green : yellow;
        for (let c = 0; c < header.length; c++) {
          const ref = XLSX.utils.encode_cell({ r: idx + 1, c });
          if (!ws[ref]) ws[ref] = { t: "s", v: "" };
          ws[ref].s = style;
        }
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Conciliación");
      if (dl && dl.url) URL.revokeObjectURL(dl.url);
      setDl(wbToBlobUrl(XLSX, wb, `conciliacion_${from}_a_${to}.xlsx`));
    } catch (ex) { setBankMsg((ex && ex.message) || "No se pudo generar el Excel."); }
    finally { setBusy(false); }
  }

  return (
    <div style={{ paddingTop: 8 }}>
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Conciliación bancaria</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 16, marginLeft: 2, lineHeight: 1.5 }}>
        Subí el estado de cuenta del banco (Excel) y validá tus operaciones de divisas por fecha, monto y referencia.
        El Excel de salida marca en verde lo validado y en amarillo lo que no se encontró.
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Desde</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={from} onChange={(e) => setFrom(e.target.value)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Hasta</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={to} onChange={(e) => setTo(e.target.value)} />
        </div>
      </div>

      {files.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          {files.map((f, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: T.mut, padding: "4px 2px" }}>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
              <span style={{ color: f.count ? T.mut : T.red, flexShrink: 0, marginLeft: 8 }}>{f.count ? `${f.count} mov.` : "sin datos"}</span>
            </div>
          ))}
          <button onClick={clearAll} style={{ ...btnGhost, color: T.red, padding: "6px 2px" }}>Quitar todos</button>
        </div>
      )}

      <label style={{ display: "block", textAlign: "center", background: T.goldSoft, color: T.gold, border: `1px solid ${T.gold}`, borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 600, cursor: "pointer", marginBottom: 10 }}>
        {busy ? "Procesando…" : files.length ? "Agregar otro estado de cuenta" : "Subir estado(s) de cuenta (Excel)"}
        <input type="file" accept=".xlsx,.xls,.csv" multiple style={{ display: "none" }} onChange={onBankFiles} />
      </label>
      {bankMsg && <div style={{ fontSize: 13, color: T.mut, marginBottom: 14, marginLeft: 2, lineHeight: 1.5 }}>{bankMsg}</div>}

      {bankRows && (
        ops.length === 0 ? (
          <div style={{ ...emptyRow, marginTop: 6 }}>No hay operaciones de divisas en el rango elegido.</div>
        ) : (
          <>
            <div
              style={{
                marginTop: 6, marginBottom: 16, borderRadius: 16, padding: "24px 18px", textAlign: "center",
                background: completo ? T.greenSoft : "rgba(227,178,77,0.14)",
                border: `1px solid ${completo ? T.green : T.gold}`,
              }}
            >
              <div style={{ fontSize: 23, fontWeight: 700, color: completo ? T.green : T.gold, letterSpacing: -0.3 }}>
                {completo ? "Conciliado completo" : "Revisar"}
              </div>
              <div style={{ fontSize: 13, color: T.mut, marginTop: 6 }}>
                {completo
                  ? `Las ${total} operaciones coinciden con el estado de cuenta.`
                  : `${noCount} de ${total} operaciones sin confirmar.`}
              </div>
            </div>
            <PrimaryBtn color={T.blue} disabled={busy} onClick={download}>
              {busy ? "Generando…" : "Generar Excel de conciliación"}
            </PrimaryBtn>
            {dl && (
              <a href={dl.url} download={dl.name} style={{ display: "block", textAlign: "center", background: T.green, color: "#0A0F1E", borderRadius: 12, padding: "13px", fontWeight: 600, textDecoration: "none", marginTop: 10 }}>
                Abrir / guardar el archivo
              </a>
            )}
          </>
        )
      )}
    </div>
  );
}

<script>
(function () {
  var boot = document.getElementById("bootmsg");
  function setMsg(t) { if (boot) boot.textContent = t; }
  function showError(title, detail) {
    if (window.__mounted) return;
    document.getElementById("root").innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);">' +
      '<div style="max-width:340px;text-align:center;">' +
      '<div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;">' + title + '</div>' +
      '<div style="font-size:13px;color:#8A97BE;line-height:1.5;margin-bottom:18px;word-break:break-word;">' + (detail || "") + '</div>' +
      '<button onclick="location.reload()" style="background:#E6BE5A;color:#0A0F1E;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:600;">Reintentar</button>' +
      '</div></div>';
  }
  window.addEventListener("error", function (e) {
    showError("Se produjo un error", (e && e.message) ? e.message : "Error desconocido");
  });
  function loadScript(urls) {
    return new Promise(function (res, rej) {
      var i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar " + urls[0])); return; }
        var s = document.createElement("script");
        s.src = urls[i++]; s.crossOrigin = "anonymous";
        s.onload = function () { res(); };
        s.onerror = function () { next(); };
        document.head.appendChild(s);
      })();
    });
  }
  setMsg("cargando librerias (1/3)...");
  loadScript(["https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js", "https://unpkg.com/react@18/umd/react.production.min.js"])
    .then(function () { setMsg("cargando librerias (2/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js", "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"]); })
    .then(function () { setMsg("cargando compilador (3/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js", "https://unpkg.com/@babel/standalone@7/babel.min.js"]); })
    .then(function () {
      if (!window.React || !window.ReactDOM) { showError("No se cargo React", "Revisa tu conexion a internet y reintenta."); return; }
      if (!window.Babel) { showError("No se cargo el compilador", "Revisa tu conexion a internet y reintenta."); return; }
      setMsg("iniciando...");
      try {
        var code = document.getElementById("app-src").textContent;
        var out = Babel.transform(code, { presets: ["react"] }).code;
        new Function(out)();
      } catch (err) {
        showError("Error al iniciar la app", (err && err.message) ? err.message : String(err));
      }
    })
    .catch(function (err) {
      showError("No se pudieron cargar las librerias", ((err && err.message) ? err.message : "") + " - suele ser un problema de conexion. Reintenta.");
    });
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
