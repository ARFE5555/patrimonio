<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Patrimonio</title>
<meta name="theme-color" content="#0A0F1E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Patrimonio" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<style>
  :root { color-scheme: dark; --bg:#0A0F1E; --text:#EAF0FF; }
  :root[data-theme="light"] { color-scheme: light; --bg:#EEF3FC; --text:#16203A; }
  html, body { margin:0; padding:0; background:var(--bg); -webkit-text-size-adjust:100%; }
  #root { min-height:100vh; }
  .boot { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
          color:var(--text); font-family:-apple-system,system-ui,sans-serif; }
  .boot small { color:#8A97BE; font-size:12px; }
</style>
</head>
<body>
<script>
  try { var _t = (JSON.parse(localStorage.getItem("fin:settings") || "{}") || {}).theme; if (_t) document.documentElement.setAttribute("data-theme", _t); } catch (e) {}
</script>
<div id="root"><div class="boot">Cargando Patrimonio&hellip;<small id="bootmsg">iniciando&hellip;</small></div></div>

<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useMemo } = React;

/* ─────────────────────────────  Tokens de diseño  ───────────────────────────── */
const T = {
  bg: "var(--bg)",
  bg2: "var(--bg2)",
  card: "var(--card)",
  card2: "var(--card2)",
  line: "var(--line)",
  lineSoft: "var(--lineSoft)",
  text: "var(--text)",
  mut: "var(--mut)",
  mut2: "var(--mut2)",
  gold: "var(--gold)",
  goldSoft: "var(--goldSoft)",
  green: "var(--green)",
  greenSoft: "var(--greenSoft)",
  red: "var(--red)",
  redSoft: "var(--redSoft)",
  blue: "var(--blue)",
  violet: "var(--violet)",
};
const FONT =
  '-apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, Segoe UI, Roboto, sans-serif';
const MONO =
  'ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace';

/* ─────────────────────────────  Config  ───────────────────────────── */
const TICKER = [
  { id: "bitcoin", sym: "BTC" },
  { id: "solana", sym: "SOL" },
  { id: "ethereum", sym: "ETH" },
];
const CURRENCIES = [
  { code: "usd", label: "USD $" },
  { code: "eur", label: "EUR €" },
  { code: "ars", label: "ARS $" },
  { code: "mxn", label: "MXN $" },
  { code: "cop", label: "COP $" },
  { code: "clp", label: "CLP $" },
  { code: "brl", label: "BRL R$" },
  { code: "gbp", label: "GBP £" },
];
const ACCENT = { bank: T.blue, cash: T.green, crypto: T.gold };
const TYPE_LABEL = { bank: "Banco", cash: "Efectivo", crypto: "Cripto" };

// Respaldo: id de CoinGecko -> id de CoinPaprika (cubre las principales)
const PAPRIKA = {
  bitcoin: "btc-bitcoin",
  ethereum: "eth-ethereum",
  solana: "sol-solana",
  ripple: "xrp-xrp",
  cardano: "ada-cardano",
  dogecoin: "doge-dogecoin",
  binancecoin: "bnb-binance-coin",
  tron: "trx-tron",
  polkadot: "dot-polkadot",
  "matic-network": "matic-polygon",
  litecoin: "ltc-litecoin",
  chainlink: "link-chainlink",
  "avalanche-2": "avax-avalanche",
  "shiba-inu": "shib-shiba-inu",
  uniswap: "uni-uniswap",
  stellar: "xlm-stellar",
  "usd-coin": "usdc-usd-coin",
  tether: "usdt-tether",
};

// Para carga manual: símbolo -> id de CoinGecko (así las monedas comunes
// igual toman precio en vivo cuando hay conexión)
const SYMBOL_ID = {
  BTC: "bitcoin", ETH: "ethereum", SOL: "solana", XRP: "ripple",
  ADA: "cardano", DOGE: "dogecoin", BNB: "binancecoin", TRX: "tron",
  DOT: "polkadot", MATIC: "matic-network", LTC: "litecoin", LINK: "chainlink",
  AVAX: "avalanche-2", SHIB: "shiba-inu", UNI: "uniswap", XLM: "stellar",
  USDC: "usd-coin", USDT: "tether",
};

/* ─────────────────────────────  Almacenamiento persistente  ───────────────────────────── */
const store = {
  async get(k) { try { return localStorage.getItem(k); } catch { return null; } },
  async set(k, v) { try { localStorage.setItem(k, v); } catch (e) { console.error(e); } },
};
async function loadKey(k, fb) {
  const raw = await store.get(k);
  if (!raw) return fb;
  try {
    return JSON.parse(raw);
  } catch {
    return fb;
  }
}
const saveKey = (k, v) => store.set(k, JSON.stringify(v));

/* ─────────────────────────────  Helpers  ───────────────────────────── */
const uid = () =>
  Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

function money(n, cur, opts = {}) {
  const c = (cur || "usd").toUpperCase();
  try {
    return new Intl.NumberFormat("es-ES", {
      style: "currency",
      currency: c,
      minimumFractionDigits: opts.min ?? 2,
      maximumFractionDigits: opts.max ?? 2,
    }).format(Number.isFinite(n) ? n : 0);
  } catch {
    return `${(Number.isFinite(n) ? n : 0).toFixed(2)} ${c}`;
  }
}
function coinPrice(n, cur) {
  const abs = Math.abs(n || 0);
  const max = abs >= 100 ? 2 : abs >= 1 ? 2 : 6;
  return money(n, cur, { min: 2, max });
}
const pct = (n) => `${n >= 0 ? "+" : ""}${(n || 0).toFixed(2)}%`;
function relTime(ts) {
  if (!ts) return "—";
  const s = Math.round((Date.now() - ts) / 1000);
  if (s < 5) return "recién";
  if (s < 60) return `hace ${s}s`;
  const m = Math.round(s / 60);
  return `hace ${m}m`;
}
function todayISO() {
  const d = new Date();
  return new Date(d.getTime() - d.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 10);
}
function fmtDate(iso) {
  try {
    return new Date(iso + "T00:00:00").toLocaleDateString("es-ES", {
      day: "2-digit",
      month: "short",
    });
  } catch {
    return iso;
  }
}

/* ─────────────────────────────  Primitivos de UI  ───────────────────────────── */
function Sheet({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed",
        inset: 0,
        background: "rgba(0,0,0,0.55)",
        display: "flex",
        alignItems: "flex-end",
        justifyContent: "center",
        zIndex: 50,
        animation: "fade .18s ease",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%",
          maxWidth: 430,
          background: T.bg2,
          borderTopLeftRadius: 22,
          borderTopRightRadius: 22,
          borderTop: `1px solid ${T.line}`,
          padding: "10px 18px calc(22px + env(safe-area-inset-bottom))",
          maxHeight: "88vh",
          overflowY: "auto",
          animation: "slideUp .24s cubic-bezier(.22,1,.36,1)",
        }}
      >
        <div
          style={{
            width: 38,
            height: 4,
            borderRadius: 4,
            background: T.line,
            margin: "0 auto 14px",
          }}
        />
        <div
          style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            marginBottom: 16,
          }}
        >
          <h3 style={{ margin: 0, fontSize: 18, fontWeight: 650, color: T.text }}>
            {title}
          </h3>
          <button onClick={onClose} style={btnGhost}>
            Cerrar
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

const inputStyle = {
  width: "100%",
  boxSizing: "border-box",
  background: T.card,
  border: `1px solid ${T.line}`,
  borderRadius: 12,
  padding: "13px 14px",
  color: T.text,
  fontSize: 16,
  fontFamily: FONT,
  outline: "none",
};
const labelStyle = {
  display: "block",
  fontSize: 12.5,
  color: T.mut,
  margin: "0 0 7px 2px",
  fontWeight: 500,
};
const btnGhost = {
  background: "transparent",
  border: "none",
  color: T.mut,
  fontSize: 15,
  fontFamily: FONT,
  cursor: "pointer",
  padding: 4,
};
function PrimaryBtn({ children, color = T.gold, onClick, disabled }) {
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        width: "100%",
        background: disabled ? T.card2 : color,
        color: disabled ? T.mut2 : "#0B0E14",
        border: "none",
        borderRadius: 13,
        padding: "15px",
        fontSize: 16,
        fontWeight: 650,
        fontFamily: FONT,
        cursor: disabled ? "default" : "pointer",
        marginTop: 6,
      }}
    >
      {children}
    </button>
  );
}
function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 15 }}>
      <label style={labelStyle}>{label}</label>
      {children}
    </div>
  );
}

/* ─────────────────────────────  App  ───────────────────────────── */
function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("balance");
  const [accounts, setAccounts] = useState([]);
  const [txns, setTxns] = useState([]);
  const [settings, setSettings] = useState({ currency: "usd", theme: "dark" });

  const [prices, setPrices] = useState({});
  const [priceStatus, setPriceStatus] = useState("loading"); // loading | live | error
  const [lastUpdate, setLastUpdate] = useState(null);
  const [source, setSource] = useState(null); // "CoinGecko" | "CoinPaprika"

  // sheets
  const [acctSheet, setAcctSheet] = useState(null); // {mode,'bank'|'cash'} | account
  const [txnSheet, setTxnSheet] = useState(false);
  const [cryptoSheet, setCryptoSheet] = useState(false);

  /* Carga inicial */
  useEffect(() => {
    (async () => {
      setAccounts(await loadKey("fin:accounts", []));
      setTxns(await loadKey("fin:txns", []));
      setSettings(await loadKey("fin:settings", { currency: "usd", theme: "dark" }));
      setLoaded(true);
    })();
  }, []);
  /* Guardado */
  useEffect(() => {
    if (loaded) saveKey("fin:accounts", accounts);
  }, [accounts, loaded]);
  useEffect(() => {
    if (loaded) saveKey("fin:txns", txns);
  }, [txns, loaded]);
  useEffect(() => {
    if (loaded) saveKey("fin:settings", settings);
  }, [settings, loaded]);
  useEffect(() => {
    if (typeof document !== "undefined")
      document.documentElement.setAttribute("data-theme", settings.theme || "dark");
  }, [settings.theme]);

  /* Precios en vivo (24/7) */
  const trackedIds = useMemo(() => {
    const s = new Set(TICKER.map((t) => t.id));
    accounts.forEach((a) => a.type === "crypto" && a.coinId && s.add(a.coinId));
    return Array.from(s);
  }, [accounts]);

  useEffect(() => {
    if (!loaded) return;
    let alive = true;

    // Fuente 1: CoinGecko (soporta cualquier moneda y cualquier cripto)
    async function fromCoinGecko() {
      const url = `https://api.coingecko.com/api/v3/simple/price?ids=${trackedIds.join(
        ","
      )}&vs_currencies=${settings.currency}&include_24hr_change=true`;
      const r = await fetch(url);
      if (!r.ok) throw new Error("cg " + r.status);
      const d = await r.json();
      const next = {};
      trackedIds.forEach((id) => {
        if (d[id])
          next[id] = {
            price: d[id][settings.currency],
            change: d[id][settings.currency + "_24h_change"],
          };
      });
      if (!Object.keys(next).length) throw new Error("cg vacío");
      return next;
    }

    // Fuente 2: CoinPaprika (respaldo; solo USD en el plan gratuito)
    async function fromPaprika() {
      const next = {};
      await Promise.all(
        trackedIds.map(async (id) => {
          const pid = PAPRIKA[id];
          if (!pid) return;
          try {
            const r = await fetch(
              `https://api.coinpaprika.com/v1/tickers/${pid}?quotes=USD`
            );
            if (!r.ok) return;
            const d = await r.json();
            const q = d.quotes && d.quotes.USD;
            if (q) next[id] = { price: q.price, change: q.percent_change_24h };
          } catch {
            /* ignora la moneda que falle */
          }
        })
      );
      if (!Object.keys(next).length) throw new Error("paprika vacío");
      return next;
    }

    async function poll() {
      // Intento 1: CoinGecko
      try {
        const next = await fromCoinGecko();
        if (!alive) return;
        setPrices(next);
        setSource("CoinGecko");
        setPriceStatus("live");
        setLastUpdate(Date.now());
        return;
      } catch {
        /* pasa al respaldo */
      }
      // Intento 2: CoinPaprika (solo si la moneda base es USD, para no mostrar valores incorrectos)
      if (settings.currency === "usd") {
        try {
          const next = await fromPaprika();
          if (!alive) return;
          setPrices(next);
          setSource("CoinPaprika");
          setPriceStatus("live");
          setLastUpdate(Date.now());
          return;
        } catch {
          /* ambas fallaron */
        }
      }
      if (alive) setPriceStatus("error");
    }

    poll();
    const iv = setInterval(poll, 60000);
    return () => {
      alive = false;
      clearInterval(iv);
    };
  }, [loaded, trackedIds.join(","), settings.currency]);

  /* Totales */
  const totals = useMemo(() => {
    let bank = 0,
      cash = 0,
      crypto = 0;
    accounts.forEach((a) => {
      if (a.type === "bank") bank += a.balance || 0;
      else if (a.type === "cash") cash += a.balance || 0;
      else if (a.type === "crypto") {
        const p = prices[a.coinId]?.price ?? a.manualPrice;
        if (p != null) crypto += (a.amount || 0) * (p || 0);
      }
    });
    return { bank, cash, crypto, net: bank + cash + crypto };
  }, [accounts, prices]);

  const cur = settings.currency;

  /* Acciones cuentas */
  function saveAccount(data) {
    setAccounts((prev) => {
      if (data.id) return prev.map((a) => (a.id === data.id ? { ...a, ...data } : a));
      return [...prev, { ...data, id: uid() }];
    });
    setAcctSheet(null);
    setCryptoSheet(false);
  }
  function deleteAccount(id) {
    setAccounts((prev) => prev.filter((a) => a.id !== id));
    setTxns((prev) => prev.filter((t) => t.accountId !== id));
    setAcctSheet(null);
  }

  /* Acciones movimientos */
  function addTxn(data) {
    const delta = data.kind === "income" ? data.amount : -data.amount;
    setAccounts((prev) =>
      prev.map((a) =>
        a.id === data.accountId ? { ...a, balance: (a.balance || 0) + delta } : a
      )
    );
    setTxns((prev) => [{ ...data, id: uid(), createdAt: Date.now() }, ...prev]);
    setTxnSheet(false);
  }
  function deleteTxn(t) {
    const delta = t.kind === "income" ? -t.amount : t.amount;
    setAccounts((prev) =>
      prev.map((a) =>
        a.id === t.accountId ? { ...a, balance: (a.balance || 0) + delta } : a
      )
    );
    setTxns((prev) => prev.filter((x) => x.id !== t.id));
  }

  if (!loaded)
    return (
      <div style={{ ...shell, alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: T.mut, fontFamily: FONT }}>Cargando…</div>
      </div>
    );

  return (
    <div style={shell}>
      <style>{css}</style>

      {/* Header */}
      <header
        style={{
          padding: "18px 20px 12px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
        }}
      >
        <div>
          <div
            style={{
              fontSize: 20,
              fontWeight: 700,
              letterSpacing: -0.3,
              color: T.text,
            }}
          >
            Patrimonio
          </div>
          <StatusDot status={priceStatus} lastUpdate={lastUpdate} source={source} />
        </div>
        <select
          value={cur}
          onChange={(e) => setSettings((s) => ({ ...s, currency: e.target.value }))}
          style={{
            background: T.card,
            color: T.text,
            border: `1px solid ${T.line}`,
            borderRadius: 10,
            padding: "8px 10px",
            fontSize: 13,
            fontFamily: FONT,
            appearance: "none",
          }}
        >
          {CURRENCIES.map((c) => (
            <option key={c.code} value={c.code}>
              {c.label}
            </option>
          ))}
        </select>
      </header>

      <main style={{ flex: 1, overflowY: "auto", padding: "0 20px 90px" }}>
        {tab === "balance" && (
          <BalanceTab totals={totals} cur={cur} prices={prices} />
        )}
        {tab === "accounts" && (
          <AccountsTab
            accounts={accounts}
            prices={prices}
            cur={cur}
            onAdd={(type) =>
              type === "crypto"
                ? setCryptoSheet(true)
                : setAcctSheet({ type, mode: "new" })
            }
            onEdit={(a) => (a.type === "crypto" ? setCryptoSheet(a) : setAcctSheet(a))}
          />
        )}
        {tab === "txns" && (
          <TxnsTab
            txns={txns}
            accounts={accounts}
            cur={cur}
            onAdd={() => setTxnSheet(true)}
            onDelete={deleteTxn}
          />
        )}
        {tab === "crypto" && (
          <CryptoTab
            accounts={accounts}
            prices={prices}
            cur={cur}
            onAdd={() => setCryptoSheet(true)}
            onEdit={(a) => setCryptoSheet(a)}
          />
        )}
        {tab === "ajustes" && (
          <AjustesTab
            settings={settings}
            setSettings={setSettings}
            accounts={accounts}
            txns={txns}
            prices={prices}
            cur={cur}
          />
        )}
      </main>

      {/* Tab bar iOS */}
      <nav style={tabbar}>
        {[
          ["balance", "Balance", IconChart],
          ["accounts", "Cuentas", IconWallet],
          ["txns", "Movim.", IconSwap],
          ["crypto", "Cripto", IconCoin],
          ["ajustes", "Ajustes", IconGear],
        ].map(([id, label, Icon]) => (
          <button
            key={id}
            onClick={() => setTab(id)}
            style={{
              background: "none",
              border: "none",
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 3,
              cursor: "pointer",
              flex: 1,
              padding: "6px 0",
              color: tab === id ? T.gold : T.mut2,
            }}
          >
            <Icon color={tab === id ? T.gold : T.mut2} />
            <span style={{ fontSize: 10.5, fontFamily: FONT, fontWeight: 500 }}>
              {label}
            </span>
          </button>
        ))}
      </nav>

      {/* Sheets */}
      <AccountSheet
        state={acctSheet}
        cur={cur}
        onClose={() => setAcctSheet(null)}
        onSave={saveAccount}
        onDelete={deleteAccount}
      />
      <TxnSheet
        open={txnSheet}
        accounts={accounts}
        cur={cur}
        onClose={() => setTxnSheet(false)}
        onSave={addTxn}
      />
      <CryptoSheet
        state={cryptoSheet}
        cur={cur}
        onClose={() => setCryptoSheet(false)}
        onSave={saveAccount}
        onDelete={deleteAccount}
        prices={prices}
      />
    </div>
  );
}

/* ─────────────────────────────  Tab: Balance  ───────────────────────────── */
function BalanceTab({ totals, cur, prices }) {
  const parts = [
    { key: "bank", label: "Bancos", val: totals.bank, color: ACCENT.bank },
    { key: "cash", label: "Efectivo", val: totals.cash, color: ACCENT.cash },
    { key: "crypto", label: "Cripto", val: totals.crypto, color: ACCENT.crypto },
  ];
  const total = totals.net || 0;
  return (
    <div>
      {/* Hero */}
      <div
        style={{
          background: `linear-gradient(160deg, ${T.card2}, ${T.card})`,
          border: `1px solid ${T.line}`,
          borderRadius: 20,
          padding: "22px 20px",
          marginTop: 4,
        }}
      >
        <div style={{ fontSize: 13, color: T.mut, fontWeight: 500 }}>
          Balance general
        </div>
        <div
          style={{
            fontFamily: MONO,
            fontVariantNumeric: "tabular-nums",
            fontSize: 38,
            fontWeight: 600,
            letterSpacing: -1,
            color: T.text,
            margin: "6px 0 16px",
          }}
        >
          {money(total, cur)}
        </div>
        {/* Barra de reparto */}
        <div
          style={{
            display: "flex",
            height: 8,
            borderRadius: 6,
            overflow: "hidden",
            background: T.bg,
          }}
        >
          {total > 0 ? (
            parts.map(
              (p) =>
                p.val > 0 && (
                  <div
                    key={p.key}
                    style={{
                      width: `${(p.val / total) * 100}%`,
                      background: p.color,
                    }}
                  />
                )
            )
          ) : (
            <div style={{ width: "100%", background: T.line }} />
          )}
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 14 }}>
          {parts.map((p) => (
            <div key={p.key} style={{ flex: 1 }}>
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 6,
                  marginBottom: 3,
                }}
              >
                <span
                  style={{
                    width: 8,
                    height: 8,
                    borderRadius: 3,
                    background: p.color,
                  }}
                />
                <span style={{ fontSize: 12, color: T.mut }}>{p.label}</span>
              </div>
              <div
                style={{
                  fontFamily: MONO,
                  fontVariantNumeric: "tabular-nums",
                  fontSize: 14,
                  color: T.text,
                  fontWeight: 500,
                }}
              >
                {money(p.val, cur, { max: 0 })}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Ticker en vivo */}
      <div style={{ marginTop: 22, marginBottom: 8, ...sectionTitle }}>
        Mercado en vivo
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {TICKER.map((t) => {
          const p = prices[t.id];
          const up = (p?.change ?? 0) >= 0;
          return (
            <div key={t.id} style={rowCard}>

/* ─────────────────────────────  Sheet: Cripto (buscar cualquier moneda)  ───────────────────────────── */
function CryptoSheet({ state, cur, onClose, onSave, onDelete, prices }) {
  const editing = state && state.id;
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [picked, setPicked] = useState(null); // {coinId,symbol,name}
  const [amount, setAmount] = useState("");
  const [manual, setManual] = useState("");
  const [searching, setSearching] = useState(false);
  const [err, setErr] = useState("");
  const [manualEntry, setManualEntry] = useState(false);
  const [mSym, setMSym] = useState("");
  const [mName, setMName] = useState("");

  useEffect(() => {
    if (state && state.id) {
      setPicked({ coinId: state.coinId, symbol: state.symbol, name: state.name });
      setAmount(String(state.amount ?? ""));
      setManual(state.manualPrice != null ? String(state.manualPrice) : "");
    } else if (state) {
      setPicked(null);
      setAmount("");
      setManual("");
      setQuery("");
      setResults([]);
      setErr("");
      setManualEntry(false);
      setMSym("");
      setMName("");
    }
  }, [state]);

  // búsqueda con debounce
  useEffect(() => {
    if (!query.trim() || picked) {
      setResults([]);
      return;
    }
    setSearching(true);
    setErr("");
    const t = setTimeout(async () => {
      try {
        const r = await fetch(`https://api.coingecko.com/api/v3/search?query=${encodeURIComponent(query.trim())}`);
        const d = await r.json();
        setResults((d.coins || []).slice(0, 8));
      } catch {
        setErr("No hay acceso a internet en la vista previa. Cargala a mano abajo 👇");
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(t);
  }, [query, picked]);

  if (!state) return null;
  const valid = picked && amount !== "" && !isNaN(parseFloat(amount));
  const livePrice = picked && prices[picked.coinId]?.price;

  return (
    <Sheet open={!!state} onClose={onClose} title={editing ? `Editar ${state.symbol}` : "Agregar cripto"}>
      {!picked ? (
        <>
          <Field label="Buscar moneda">
            <input style={inputStyle} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Bitcoin, SOL, Ethereum, Cardano…" autoFocus />
          </Field>
          {searching && <div style={{ color: T.mut, fontSize: 13, padding: "4px 2px" }}>Buscando…</div>}
          {err && <div style={{ color: T.red, fontSize: 13, padding: "4px 2px" }}>{err}</div>}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
            {results.map((c) => (
              <button
                key={c.id}
                onClick={() => setPicked({ coinId: c.id, symbol: (c.symbol || "").toUpperCase(), name: c.name })}
                style={{ ...rowCard, cursor: "pointer", textAlign: "left" }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  {c.thumb ? (
                    <img src={c.thumb} alt="" style={{ width: 30, height: 30, borderRadius: 8 }} />
                  ) : (
                    <CoinBadge sym={(c.symbol || "").toUpperCase()} />
                  )}
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: T.mut }}>{(c.symbol || "").toUpperCase()}</div>
                  </div>
                </div>
                <span style={{ color: T.gold, fontSize: 20 }}>+</span>
              </button>
            ))}
          </div>

          {/* Carga manual (funciona sin internet) */}
          <div style={{ borderTop: `1px solid ${T.lineSoft}`, marginTop: 16, paddingTop: 14 }}>
            {!manualEntry ? (
              <button
                onClick={() => setManualEntry(true)}
                style={{ ...btnGhost, color: T.gold, padding: 4 }}
              >
                + Cargar una moneda a mano
              </button>
            ) : (
              <>
                <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12 }}>
                  Ingresá la moneda manualmente. Si es una de las principales (BTC,
                  ETH, SOL…), tomará el precio en vivo cuando haya conexión.
                </div>
                <Field label="Símbolo">
                  <input
                    style={{ ...inputStyle, textTransform: "uppercase" }}
                    value={mSym}
                    onChange={(e) => setMSym(e.target.value.toUpperCase())}
                    placeholder="BTC"
                  />
                </Field>
                <Field label="Nombre">
                  <input
                    style={inputStyle}
                    value={mName}
                    onChange={(e) => setMName(e.target.value)}
                    placeholder="Bitcoin"
                  />
                </Field>
                <PrimaryBtn
                  color={T.gold}
                  disabled={!mSym.trim()}
                  onClick={() => {
                    const sym = mSym.trim().toUpperCase();
                    setPicked({
                      coinId: SYMBOL_ID[sym] || sym.toLowerCase(),
                      symbol: sym,
                      name: mName.trim() || sym,
                    });
                  }}
                >
                  Continuar
                </PrimaryBtn>
              </>
            )}
          </div>
        </>
      ) : (
        <>
          <div style={{ ...rowCard, marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <CoinBadge sym={picked.symbol} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, color: T.text }}>{picked.name}</div>
                <div style={{ fontSize: 12, color: T.mut, fontFamily: MONO }}>
                  {livePrice ? coinPrice(livePrice, cur) : "precio al actualizar"}
                </div>
              </div>
            </div>
            {!editing && (
              <button onClick={() => setPicked(null)} style={btnGhost}>
                Cambiar
              </button>
            )}
          </div>
          <Field label={`Cantidad de ${picked.symbol}`}>
            <input style={{ ...inputStyle, fontFamily: MONO, fontSize: 22 }} value={amount} onChange={(e) => setAmount(e.target.value)} inputMode="decimal" placeholder="0.00" autoFocus />
          </Field>
          <Field label={`Precio manual en ${cur.toUpperCase()} (opcional)`}>
            <input style={{ ...inputStyle, fontFamily: MONO }} value={manual} onChange={(e) => setManual(e.target.value)} inputMode="decimal" placeholder="Se usa solo si no hay precio en vivo" />
          </Field>
          {(() => {
            const shown = livePrice ?? (manual !== "" && !isNaN(parseFloat(manual)) ? parseFloat(manual) : null);
            if (shown == null || !amount || isNaN(parseFloat(amount))) return null;
            return (
              <div style={{ fontSize: 13, color: T.mut, marginBottom: 14, marginLeft: 2 }}>
                Valor:{" "}
                <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>
                  {money(parseFloat(amount) * shown, cur)}
                </span>
                {livePrice == null ? " (precio manual)" : ""}
              </div>
            );
          })()}
          <PrimaryBtn
            color={T.gold}
            disabled={!valid}
            onClick={() =>
              onSave({
                id: state.id,
                type: "crypto",
                coinId: picked.coinId,
                symbol: picked.symbol,
                name: picked.name,
                amount: parseFloat(amount),
                manualPrice:
                  manual !== "" && !isNaN(parseFloat(manual))
                    ? parseFloat(manual)
                    : undefined,
              })
            }
          >
            {editing ? "Guardar cambios" : "Agregar a mi cartera"}
          </PrimaryBtn>
          {editing && (
            <button onClick={() => onDelete(state.id)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
              Eliminar
            </button>
          )}
        </>
      )}
    </Sheet>
  );
}

/* ─────────────────────────────  Tab: Ajustes  ───────────────────────────── */
function AjustesTab({ settings, setSettings, accounts, txns, prices, cur }) {
  const theme = settings.theme || "dark";
  const pad = (n) => String(n).padStart(2, "0");
  const monthStart = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`;
  const monthEnd = (y, m) => {
    const d = new Date(y, m + 1, 0);
    return `${y}-${pad(m + 1)}-${pad(d.getDate())}`;
  };

  const [from, setFrom] = useState(monthStart());
  const [to, setTo] = useState(todayISO());
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");

  function thisMonth() {
    setFrom(monthStart());
    setTo(todayISO());
  }
  function lastMonth() {
    const n = new Date();
    const y = n.getMonth() === 0 ? n.getFullYear() - 1 : n.getFullYear();
    const m = (n.getMonth() + 11) % 12;
    setFrom(`${y}-${pad(m + 1)}-01`);
    setTo(monthEnd(y, m));
  }

  function ensureXLSX() {
    if (window.XLSX) return Promise.resolve(window.XLSX);
    return new Promise((res, rej) => {
      const urls = [
        "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
        "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js",
      ];
      let i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar el generador de Excel")); return; }
        const s = document.createElement("script");
        s.src = urls[i++];
        s.onload = () => (window.XLSX ? res(window.XLSX) : next());
        s.onerror = next;
        document.head.appendChild(s);
      })();
    });
  }

  async function exportExcel() {
    if (from > to) { setMsg("La fecha 'Desde' no puede ser mayor que 'Hasta'."); return; }
    setBusy(true);
    setMsg("Generando el Excel…");
    try {
      const XLSX = await ensureXLSX();
      const CUR = cur.toUpperCase();
      const inRange = (t) => t.date >= from && t.date <= to;
      const delta = (t) => (t.kind === "income" ? t.amount : -t.amount);
      const round2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;

      const fiat = accounts.filter((a) => a.type === "bank" || a.type === "cash");
      const nameOf = (id) => (accounts.find((a) => a.id === id) || {}).name || "—";

      // Resumen por cuenta (saldo inicial/final reconstruido desde los movimientos)
      let tIni = 0, tFin = 0, tIng = 0, tEgr = 0;
      const resumen = fiat.map((a) => {
        const bal = a.balance || 0;
        const after = txns.filter((t) => t.accountId === a.id && t.date > to).reduce((s, t) => s + delta(t), 0);
        const fromOn = txns.filter((t) => t.accountId === a.id && t.date >= from).reduce((s, t) => s + delta(t), 0);
        const fin = bal - after;
        const ini = bal - fromOn;
        const ing = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "income").reduce((s, t) => s + t.amount, 0);
        const egr = txns.filter((t) => t.accountId === a.id && inRange(t) && t.kind === "expense").reduce((s, t) => s + t.amount, 0);
        tIni += ini; tFin += fin; tIng += ing; tEgr += egr;
        return [a.name, TYPE_LABEL[a.type], round2(ini), round2(fin), round2(ing), round2(egr), round2(fin - ini)];
      });

      const resumenAoa = [
        ["Reporte de patrimonio"],
        ["Período", `${from}  a  ${to}`],
        ["Moneda", CUR],
        [],
        ["Cuenta", "Tipo", `Saldo inicial (${CUR})`, `Saldo final (${CUR})`, `Ingresos (${CUR})`, `Egresos (${CUR})`, `Neto (${CUR})`],
        ...resumen,
        ["TOTAL", "", round2(tIni), round2(tFin), round2(tIng), round2(tEgr), round2(tFin - tIni)],
      ];
      const wsR = XLSX.utils.aoa_to_sheet(resumenAoa);
      wsR["!cols"] = [{ wch: 22 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];

      // Movimientos del período
      const movs = txns.filter(inRange).slice().sort((a, b) => (a.date < b.date ? -1 : 1));
      const movAoa = [
        ["Fecha", "Tipo", "Motivo", "Cuenta / método", `Monto (${CUR})`],
        ...movs.map((t) => [
          t.date,
          t.kind === "income" ? "Ingreso" : "Egreso",
          t.motivo || "",
          nameOf(t.accountId),
          round2(t.kind === "income" ? t.amount : -t.amount),
        ]),
      ];
      const wsM = XLSX.utils.aoa_to_sheet(movAoa);
      wsM["!cols"] = [{ wch: 12 }, { wch: 10 }, { wch: 28 }, { wch: 22 }, { wch: 14 }];

      // Cripto (instantánea al momento de exportar)
      const cripto = accounts.filter((a) => a.type === "crypto");
      const criptoAoa = [
        ["Moneda", "Símbolo", "Cantidad", `Precio (${CUR})`, `Valor (${CUR})`],
        ...cripto.map((a) => {
          const p = (prices[a.coinId] || {}).price;
          const price = p != null ? p : a.manualPrice;
          return [a.name, a.symbol, a.amount || 0, price != null ? round2(price) : "", price != null ? round2((a.amount || 0) * price) : ""];
        }),
      ];
      const wsC = XLSX.utils.aoa_to_sheet(criptoAoa);
      wsC["!cols"] = [{ wch: 18 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, wsR, "Resumen");
      XLSX.utils.book_append_sheet(wb, wsM, "Movimientos");
      XLSX.utils.book_append_sheet(wb, wsC, "Cripto");
      XLSX.writeFile(wb, `patrimonio_${from}_a_${to}.xlsx`);
      setMsg("¡Listo! Revisá tus Descargas o el visor que se abrió.");
    } catch (e) {
      setMsg((e && e.message) || "No se pudo generar el Excel. Probá con conexión a internet.");
    } finally {
      setBusy(false);
    }
  }

  const seg = (active, color) => ({
    flex: 1, border: "none", borderRadius: 9, padding: "11px", fontSize: 15,
    fontWeight: 600, fontFamily: FONT, cursor: "pointer",
    background: active ? color : "transparent",
    color: active ? "#0A0F1E" : T.mut,
  });
  const preset = {
    background: T.card, border: `1px solid ${T.line}`, borderRadius: 10,
    padding: "9px 12px", color: T.text, fontSize: 13, fontFamily: FONT, cursor: "pointer",
  };

  return (
    <div style={{ paddingTop: 8 }}>
      {/* Apariencia */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Apariencia</div>
      <div style={{ display: "flex", background: T.card, borderRadius: 12, padding: 4, marginBottom: 8, border: `1px solid ${T.lineSoft}` }}>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "dark" }))} style={seg(theme === "dark", T.gold)}>
          Oscuro
        </button>
        <button onClick={() => setSettings((s) => ({ ...s, theme: "light" }))} style={seg(theme === "light", T.gold)}>
          Claro
        </button>
      </div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 26, marginLeft: 2 }}>
        Tema en azules con acentos dorados. Se guarda automáticamente.
      </div>

      {/* Exportar */}
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Exportar a Excel</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 14, marginLeft: 2 }}>
        Genera un archivo .xlsx con tres hojas: Resumen (saldo inicial y final por cuenta),
        Movimientos del período y Cripto.
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Desde</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={from} onChange={(e) => setFrom(e.target.value)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Hasta</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={to} onChange={(e) => setTo(e.target.value)} />
        </div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
        <button onClick={thisMonth} style={preset}>Este mes</button>
        <button onClick={lastMonth} style={preset}>Mes pasado</button>
      </div>

      <PrimaryBtn color={T.gold} disabled={busy} onClick={exportExcel}>
        {busy ? "Generando…" : "Exportar a Excel"}
      </PrimaryBtn>
      {msg && (
        <div style={{ fontSize: 13, color: T.mut, marginTop: 12, marginLeft: 2, lineHeight: 1.5 }}>{msg}</div>
      )}
    </div>
  );
}

<script>
(function () {
  var boot = document.getElementById("bootmsg");
  function setMsg(t) { if (boot) boot.textContent = t; }
  function showError(title, detail) {
    if (window.__mounted) return;
    document.getElementById("root").innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);">' +
      '<div style="max-width:340px;text-align:center;">' +
      '<div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;">' + title + '</div>' +
      '<div style="font-size:13px;color:#8A97BE;line-height:1.5;margin-bottom:18px;word-break:break-word;">' + (detail || "") + '</div>' +
      '<button onclick="location.reload()" style="background:#E6BE5A;color:#0A0F1E;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:600;">Reintentar</button>' +
      '</div></div>';
  }
  window.addEventListener("error", function (e) {
    showError("Se produjo un error", (e && e.message) ? e.message : "Error desconocido");
  });
  function loadScript(urls) {
    return new Promise(function (res, rej) {
      var i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar " + urls[0])); return; }
        var s = document.createElement("script");
        s.src = urls[i++]; s.crossOrigin = "anonymous";
        s.onload = function () { res(); };
        s.onerror = function () { next(); };
        document.head.appendChild(s);
      })();
    });
  }
  setMsg("cargando librerias (1/3)...");
  loadScript(["https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js", "https://unpkg.com/react@18/umd/react.production.min.js"])
    .then(function () { setMsg("cargando librerias (2/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js", "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"]); })
    .then(function () { setMsg("cargando compilador (3/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js", "https://unpkg.com/@babel/standalone@7/babel.min.js"]); })
    .then(function () {
      if (!window.React || !window.ReactDOM) { showError("No se cargo React", "Revisa tu conexion a internet y reintenta."); return; }
      if (!window.Babel) { showError("No se cargo el compilador", "Revisa tu conexion a internet y reintenta."); return; }
      setMsg("iniciando...");
      try {
        var code = document.getElementById("app-src").textContent;
        var out = Babel.transform(code, { presets: ["react"] }).code;
        new Function(out)();
      } catch (err) {
        showError("Error al iniciar la app", (err && err.message) ? err.message : String(err));
      }
    })
    .catch(function (err) {
      showError("No se pudieron cargar las librerias", ((err && err.message) ? err.message : "") + " - suele ser un problema de conexion. Reintenta.");
    });
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
