            </div>
          )
        ))}
      </Sheet>
    </div>
  );
}

/* ─────────────────────────────  Sheet: Divisa (venta/compra)  ───────────────────────────── */
function DivisaSheet({ state, divisas, onClose, onSave, onDelete }) {
  const editing = state && state.id;
  const kind = state ? state.kind : "venta";
  const venta = kind === "venta";
  const [usd, setUsd] = useState("");
  const [tasa, setTasa] = useState("");
  const [persona, setPersona] = useState("");
  const [comisionTipo, setComisionTipo] = useState("mismo");
  const [comMode, setComMode] = useState("pct");
  const [comVes, setComVes] = useState("");
  const [comUsd, setComUsd] = useState("");
  const [manualAllocs, setManualAllocs] = useState([]);
  const [referencia, setReferencia] = useState("");
  const [date, setDate] = useState(todayISO());

  useEffect(() => {
    if (state && state.id) {
      setUsd(String(state.usd ?? ""));
      setTasa(String(state.tasa ?? ""));
      setPersona(state.persona || "");
      setComisionTipo(state.comisionTipo || "mismo");
      setComMode(state.comMode || (state.kind === "venta" ? "none" : "pct"));
      setComVes(state.comisionVesInput != null ? String(state.comisionVesInput) : "");
      setComUsd(state.comisionUsdInput != null ? String(state.comisionUsdInput) : "");
      setManualAllocs(state.manualAllocs || (state.ventaId ? [state.ventaId] : []));
      setReferencia(state.referencia || "");
      setDate(state.date || todayISO());
    } else if (state) {
      setUsd(""); setTasa(""); setPersona(""); setComisionTipo("mismo"); setComMode(state.kind === "venta" ? "none" : "pct"); setComVes(""); setComUsd(""); setReferencia(""); setDate(todayISO());
      setManualAllocs([]);
    }
  }, [state]);

  if (!state) return null;
  const nUsd = numVE(usd);
  const nTasa = numVE(tasa);
  const ves = (isNaN(nUsd) ? 0 : nUsd) * (isNaN(nTasa) ? 0 : nTasa);
  const comVesAmt =
    comMode === "ves" ? (numVE(comVes) || 0)
    : comMode === "usd" ? 0
    : comMode === "none" ? 0
    : ves * (COMISION[comisionTipo] || 0);
  const comUsdAmt = comMode === "usd" ? (numVE(comUsd) || 0) : 0;
  const valid = !isNaN(nUsd) && nUsd > 0 && !isNaN(nTasa) && nTasa > 0 && persona.trim();

  const readonly = { ...inputStyle, background: T.bg2, color: T.text, fontFamily: MONO };

  // Ventas PENDIENTES (con VES por usar) y con fecha <= la de esta compra.
  // Se excluye esta misma compra del cálculo para no ocultar su propia capacidad.
  const ventasList = (() => {
    if (venta) return [];
    const vs = (divisas || []).filter((d) => d.kind === "venta");
    const cs = (divisas || []).filter((d) => d.kind === "compra" && d.id !== state.id);
    const a = allocateFIFO(vs, cs);
    return vs
      .map((v) => {
        const s = a.ventaStats[v.id] || { vesUsados: 0 };
        return { v, restante: capOf(v) - s.vesUsados };
      })
      .filter((x) => x.restante > 0.01)
      .sort((x, y) => (x.v.date < y.v.date ? -1 : 1));
  })();

  const split = (() => {
    const gross = isNaN(nUsd) ? 0 : nUsd;
    const W = gross * (isNaN(nTasa) ? 0 : nTasa) + comVesAmt;
    const vs = (divisas || []).filter((d) => d.kind === "venta");
    const others = (divisas || []).filter((d) => d.kind === "compra" && d.id !== state.id);
    const a = allocateFIFO(vs, others);
    let remaining = W;
    const rows = [];
    for (const vid of manualAllocs) {
      const v = vs.find((x) => x.id === vid);
      if (!v) continue;
      const restante = Math.max(0, capOf(v) - ((a.ventaStats[v.id] || {}).vesUsados || 0));
      const take = W > 0 ? Math.min(restante, remaining) : 0;
      rows.push({ v, ves: take, usd: W > 0 ? gross * (take / W) : 0 });
      remaining -= take;
    }
    return { rows, autoUsd: W > 0 ? gross * (Math.max(0, remaining) / W) : 0 };
  })();

  return (
    <Sheet open={!!state} onClose={onClose} title={(editing ? "Editar " : "") + (venta ? "Venta de USD" : "Compra de USD")}>
      <Field label="Monto USD">
        <input style={{ ...inputStyle, fontFamily: MONO, fontSize: 22 }} value={usd} onChange={(e) => setUsd(e.target.value)} inputMode="decimal" placeholder="0.00" autoFocus />
      </Field>
      <Field label="Tasa (VES por USD)">
        <input style={{ ...inputStyle, fontFamily: MONO }} value={tasa} onChange={(e) => setTasa(e.target.value)} inputMode="decimal" placeholder="0.00" />
      </Field>
      <Field label="VES totales">
        <input style={readonly} value={fmtBs(ves)} readOnly />
      </Field>

      {venta ? (
        <>
          <Field label="Persona a quien le vendimos">
            <input style={inputStyle} value={persona} onChange={(e) => setPersona(e.target.value)} placeholder="Nombre" />
          </Field>
          <Field label="Comisión (opcional)">
            <select style={{ ...inputStyle, appearance: "none" }} value={comMode} onChange={(e) => setComMode(e.target.value)}>
              <option value="none">Sin comisión</option>
              <option value="ves">Monto en VES</option>
              <option value="usd">Monto en USD</option>
            </select>
          </Field>
          {comMode === "ves" && (
            <Field label="Comisión en VES">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comVes} onChange={(e) => setComVes(e.target.value)} inputMode="decimal" placeholder="0,00" />
            </Field>
          )}
          {comMode === "usd" && (
            <Field label="Comisión en USD">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comUsd} onChange={(e) => setComUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />
            </Field>
          )}
          {comMode !== "none" && (
            <div style={{ fontSize: 12.5, color: T.mut, margin: "-4px 2px 12px" }}>
              {comMode === "usd"
                ? <>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtUsd(comUsdAmt)}</span> (se descuenta de la ganancia)</>
                : <>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtBs(comVesAmt)}</span> (reduce los VES disponibles)</>}
            </div>
          )}
        </>
      ) : (
        <>
          <Field label="Cliente a quien le compramos">
            <input style={inputStyle} value={persona} onChange={(e) => setPersona(e.target.value)} placeholder="Nombre" />
          </Field>
          <Field label="Comisión">
            <select style={{ ...inputStyle, appearance: "none" }} value={comMode} onChange={(e) => setComMode(e.target.value)}>
              <option value="pct">Banco (0% / 0,3%)</option>
              <option value="ves">Monto en VES</option>
              <option value="usd">Monto en USD</option>
            </select>
          </Field>
          {comMode === "pct" && (
            <Field label="Banco">
              <select style={{ ...inputStyle, appearance: "none" }} value={comisionTipo} onChange={(e) => setComisionTipo(e.target.value)}>
                <option value="mismo">{COMISION_LABEL.mismo}</option>
                <option value="otros">{COMISION_LABEL.otros}</option>
              </select>
            </Field>
          )}
          {comMode === "ves" && (
            <Field label="Comisión en VES">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comVes} onChange={(e) => setComVes(e.target.value)} inputMode="decimal" placeholder="0,00" />
            </Field>
          )}
          {comMode === "usd" && (
            <Field label="Comisión en USD">
              <input style={{ ...inputStyle, fontFamily: MONO }} value={comUsd} onChange={(e) => setComUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />
            </Field>
          )}
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: T.mut, margin: "-4px 2px 16px" }}>
            {comMode === "usd" ? (
              <>
                <span>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtUsd(comUsdAmt)}</span></span>
                <span>USDT neto: <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>{fmtUsd((isNaN(nUsd) ? 0 : nUsd) - comUsdAmt)}</span></span>
              </>
            ) : (
              <>
                <span>Comisión: <span style={{ color: T.text, fontFamily: MONO }}>{fmtBs(comVesAmt)}</span></span>
                <span>Total VES: <span style={{ color: T.text, fontFamily: MONO, fontWeight: 600 }}>{fmtBs(ves + comVesAmt)}</span></span>
              </>
            )}
          </div>
          <Field label="Asignación de los VES">
            <select
              style={{ ...inputStyle, appearance: "none" }}
              value=""
              onChange={(e) => { if (e.target.value) setManualAllocs((m) => [...m, e.target.value]); }}
            >
              <option value="">{manualAllocs.length ? "+ Agregar otra venta al reparto…" : "Automática — o elegí una venta…"}</option>
              {ventasList.filter(({ v }) => !manualAllocs.includes(v.id)).map(({ v, restante }) => (
                <option key={v.id} value={v.id}>
                  {fmtDate(v.date)} · {v.persona || "—"} · queda {fmtBs(restante)}
                </option>
              ))}
            </select>
          </Field>
          {manualAllocs.length > 0 && (
            <div style={{ marginBottom: 12 }}>
              {split.rows.map((r, i) => (
                <div key={r.v.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: T.bg2, border: `1px solid ${T.lineSoft}`, borderRadius: 10, padding: "9px 11px", marginBottom: 6 }}>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{i + 1}. {r.v.persona || fmtDate(r.v.date)}</div>
                    <div style={{ fontSize: 11.5, color: T.mut, fontFamily: MONO }}>{fmtDate(r.v.date)} · asigna {fmtUsd(r.usd)}</div>
                  </div>
                  <button onClick={() => setManualAllocs((m) => m.filter((x) => x !== r.v.id))} style={{ ...btnGhost, color: T.mut2, fontSize: 18, lineHeight: 1 }} aria-label="Quitar">×</button>
                </div>
              ))}
              <div style={{ fontSize: 12, color: split.autoUsd > 0.01 ? T.gold : T.mut, marginLeft: 2 }}>
                {split.autoUsd > 0.01 ? `Resto ≈ ${fmtUsd(split.autoUsd)} → se asigna automáticamente` : "Estas ventas cubren toda la compra."}
              </div>
            </div>
          )}
          <div style={{ fontSize: 12, color: T.mut, margin: "0 2px 8px", lineHeight: 1.5 }}>
            Sin elegir nada, se asigna sola a las ventas pendientes por orden de llegada (sin importar la fecha). Podés elegir varias ventas en orden: la compra llena la primera y el excedente pasa a la siguiente.
          </div>
        </>
      )}

      <Field label="Referencia bancaria (opcional)">
        <input style={inputStyle} value={referencia} onChange={(e) => setReferencia(e.target.value)} placeholder="N° de operación / referencia" autoCapitalize="none" />
      </Field>

      <Field label="Fecha">
        <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={date} onChange={(e) => setDate(e.target.value)} />
      </Field>

      <PrimaryBtn
        color={venta ? T.green : T.blue}
        disabled={!valid}
        onClick={() =>
          onSave({
            id: state.id,
            kind,
            usd: nUsd,
            tasa: nTasa,
            date,
            persona: persona.trim(),
            referencia: referencia.trim() || undefined,
            manualAllocs: venta ? undefined : (manualAllocs.length ? manualAllocs : undefined),
            ventaId: undefined,
            comMode,
            comisionTipo,
            comisionVesInput: comMode === "ves" ? (numVE(comVes) || 0) : undefined,
            comisionUsdInput: comMode === "usd" ? (numVE(comUsd) || 0) : undefined,
          })
        }
      >
        {editing ? "Guardar cambios" : venta ? "Registrar venta" : "Registrar compra"}
      </PrimaryBtn>
      {editing && (
        <button onClick={() => onDelete(state.id)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
          Eliminar operación
        </button>
      )}
    </Sheet>
  );
}

/* ── Conciliación bancaria: lectura de estado de cuenta + Excel con colores ── */
function ensureXLSXStyle() {
  if (window.XLSX && window.XLSX.__styled) return Promise.resolve(window.XLSX);
  return new Promise((res, rej) => {
    const urls = [
      "https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js",
      "https://unpkg.com/xlsx-js-style@1.2.0/dist/xlsx.bundle.js",
    ];
    let i = 0;
    (function next() {
      if (i >= urls.length) { rej(new Error("No se pudo cargar el generador de Excel.")); return; }
      const s = document.createElement("script");
      s.src = urls[i++];
      s.onload = () => { if (window.XLSX) { window.XLSX.__styled = true; res(window.XLSX); } else next(); };
      s.onerror = next;
      document.head.appendChild(s);
    })();
  });
}
function wbToBlobUrl(XLSX, wb, name) {
  const out = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([out], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
  return { url: URL.createObjectURL(blob), name };
}
function normRef(s) {
  return String(s || "").replace(/\s+/g, "").replace(/[^0-9a-zA-Z]/g, "").replace(/^0+/, "").toLowerCase();
}
function parseBankRows(rows) {
  const norm = (s) => String(s || "").toLowerCase().trim();
  let hi = -1, cols = null;
  for (let i = 0; i < Math.min(rows.length, 30); i++) {
    const r = (rows[i] || []).map(norm);
    const fFecha = r.findIndex((c) => c.includes("fecha"));
    const fRef = r.findIndex((c) => c.includes("refer") || c.includes("comprob") || c.includes("operac") || c.includes("nro") || c.includes("número") || c.includes("numero"));
    const fMonto = r.findIndex((c) => c.includes("monto") || c.includes("importe") || c.includes("valor") || c.includes("crédito") || c.includes("credito") || c.includes("débito") || c.includes("debito") || c === "bs" || c.includes("monto bs"));
    if (fFecha >= 0 && (fRef >= 0 || fMonto >= 0)) {
      cols = {
        fFecha, fRef, fMonto,
        fCred: r.findIndex((c) => c.includes("crédito") || c.includes("credito") || c.includes("haber") || c.includes("abono")),
        fDeb: r.findIndex((c) => c.includes("débito") || c.includes("debito") || c.includes("debe") || c.includes("cargo")),
      };
      hi = i; break;
    }
  }
  if (hi < 0) return [];
  const out = [];
  for (let i = hi + 1; i < rows.length; i++) {
    const row = rows[i]; if (!row) continue;
    const fecha = fechaISO(row[cols.fFecha]);
    const ref = cols.fRef >= 0 ? String(row[cols.fRef] || "").trim() : "";
    let monto = cols.fMonto >= 0 ? numVE(row[cols.fMonto]) : NaN;
    if (isNaN(monto) && cols.fCred >= 0) monto = numVE(row[cols.fCred]);
    if (isNaN(monto) && cols.fDeb >= 0) monto = numVE(row[cols.fDeb]);
    if (!ref && isNaN(monto)) continue;
    out.push({ fecha, ref, monto: isNaN(monto) ? null : Math.abs(monto), refKey: normRef(ref) });
  }
  return out;
}

/* ─────────────────────────────  Tab: Conciliación  ───────────────────────────── */
function ConciliacionTab({ divisas }) {
  const pad = (n) => String(n).padStart(2, "0");
  const monthStart = (d = new Date()) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-01`;
  const round2 = (x) => Math.round((x + Number.EPSILON) * 100) / 100;
  const [from, setFrom] = useState(monthStart());
  const [to, setTo] = useState(todayISO());
  const [bankRows, setBankRows] = useState(null);
  const [files, setFiles] = useState([]);
  const [bankMsg, setBankMsg] = useState("");
  const [busy, setBusy] = useState(false);
  const [dl, setDl] = useState(null);

  const ops = (divisas || []).filter((d) => (d.kind === "venta" || d.kind === "compra") && d.date >= from && d.date <= to);
  const result = useMemo(() => {
    if (!bankRows) return null;
    const byRef = {};
    bankRows.forEach((b) => { if (b.refKey) byRef[b.refKey] = b; });
    return ops.map((o) => {
      const monto = (o.usd || 0) * (o.tasa || 0);
      const tipo = o.kind === "venta" ? "Ingreso" : "Egreso";
      const rk = normRef(o.referencia || "");
      let estado = "No encontrado", banco = null;
      if (rk && byRef[rk]) { estado = "Validado"; banco = byRef[rk]; }
      else {
        const cand = bankRows.find((b) => b.fecha === o.date && b.monto != null && Math.abs(b.monto - monto) <= Math.max(1, monto * 0.01));
        if (cand) { estado = "Validado (monto/fecha)"; banco = cand; }
      }
      return { fecha: o.date, tipo, referencia: o.referencia || "", monto, estado, banco };
    });
  }, [bankRows, from, to, divisas]);

  const okCount = result ? result.filter((r) => r.estado.indexOf("Validado") === 0).length : 0;
  const noCount = result ? result.length - okCount : 0;
  const total = result ? result.length : 0;
  const completo = !!result && total > 0 && noCount === 0;

  async function onBankFiles(e) {
    const fs = Array.from(e.target.files || []);
    e.target.value = "";
    if (!fs.length) return;
    setBusy(true); setBankMsg("Leyendo estado(s) de cuenta…");
    try {
      const XLSX = await ensureXLSXStyle();
      let added = [];
      const newFiles = [];
      for (const f of fs) {
        try {
          const buf = await f.arrayBuffer();
          const wb = XLSX.read(buf, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: "" });
          const parsed = parseBankRows(rows);
          added = added.concat(parsed);
          newFiles.push({ name: f.name, count: parsed.length });
        } catch { newFiles.push({ name: f.name, count: 0 }); }
      }
      setBankRows((prev) => [...(prev || []), ...added]);
      setFiles((prev) => [...prev, ...newFiles]);
      setBankMsg(added.length ? `${added.length} movimientos agregados.` : "No se identificaron columnas en el/los archivo(s). Revisá los encabezados.");
    } catch (ex) { setBankMsg((ex && ex.message) || "No se pudo leer el archivo."); }
    finally { setBusy(false); }
  }
  function clearAll() { setBankRows(null); setFiles([]); setBankMsg(""); setDl(null); }

  async function download() {
    if (!result) return;
    setBusy(true);
    try {
      const XLSX = await ensureXLSXStyle();
      const header = ["Fecha", "Tipo (Ingreso/Egreso)", "Referencia", "Monto (Bs)", "Estado", "Banco fecha", "Banco monto (Bs)"];
      const aoa = [header, ...result.map((r) => [r.fecha, r.tipo, r.referencia, round2(r.monto), r.estado, r.banco ? r.banco.fecha : "", r.banco && r.banco.monto != null ? round2(r.banco.monto) : ""])];
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 12 }, { wch: 20 }, { wch: 24 }, { wch: 16 }, { wch: 20 }, { wch: 12 }, { wch: 16 }];
      const green = { fill: { patternType: "solid", fgColor: { rgb: "C6EFCE" } } };
      const yellow = { fill: { patternType: "solid", fgColor: { rgb: "FFEB9C" } } };
      const head = { font: { bold: true }, fill: { patternType: "solid", fgColor: { rgb: "D9E1F2" } } };
      for (let c = 0; c < header.length; c++) {
        const ref = XLSX.utils.encode_cell({ r: 0, c });
        if (ws[ref]) ws[ref].s = head;
      }
      result.forEach((r, idx) => {
        const style = r.estado.indexOf("Validado") === 0 ? green : yellow;
        for (let c = 0; c < header.length; c++) {
          const ref = XLSX.utils.encode_cell({ r: idx + 1, c });
          if (!ws[ref]) ws[ref] = { t: "s", v: "" };
          ws[ref].s = style;
        }
      });
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Conciliación");
      if (dl && dl.url) URL.revokeObjectURL(dl.url);
      setDl(wbToBlobUrl(XLSX, wb, `conciliacion_${from}_a_${to}.xlsx`));
    } catch (ex) { setBankMsg((ex && ex.message) || "No se pudo generar el Excel."); }
    finally { setBusy(false); }
  }

  return (
    <div style={{ paddingTop: 8 }}>
      <div style={{ ...sectionTitle, marginBottom: 10 }}>Conciliación bancaria</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 16, marginLeft: 2, lineHeight: 1.5 }}>
        Subí el estado de cuenta del banco (Excel) y validá tus operaciones de divisas por fecha, monto y referencia.
        El Excel de salida marca en verde lo validado y en amarillo lo que no se encontró.
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Desde</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={from} onChange={(e) => setFrom(e.target.value)} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>Hasta</label>
          <input type="date" style={{ ...inputStyle, fontFamily: MONO }} value={to} onChange={(e) => setTo(e.target.value)} />
        </div>
      </div>

      {files.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          {files.map((f, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: T.mut, padding: "4px 2px" }}>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.name}</span>
              <span style={{ color: f.count ? T.mut : T.red, flexShrink: 0, marginLeft: 8 }}>{f.count ? `${f.count} mov.` : "sin datos"}</span>
            </div>
          ))}
          <button onClick={clearAll} style={{ ...btnGhost, color: T.red, padding: "6px 2px" }}>Quitar todos</button>
        </div>
      )}

      <label style={{ display: "block", textAlign: "center", background: T.goldSoft, color: T.gold, border: `1px solid ${T.gold}`, borderRadius: 12, padding: "13px", fontSize: 15, fontWeight: 600, cursor: "pointer", marginBottom: 10 }}>
        {busy ? "Procesando…" : files.length ? "Agregar otro estado de cuenta" : "Subir estado(s) de cuenta (Excel)"}
        <input type="file" accept=".xlsx,.xls,.csv" multiple style={{ display: "none" }} onChange={onBankFiles} />
      </label>
      {bankMsg && <div style={{ fontSize: 13, color: T.mut, marginBottom: 14, marginLeft: 2, lineHeight: 1.5 }}>{bankMsg}</div>}

      {bankRows && (
        ops.length === 0 ? (
          <div style={{ ...emptyRow, marginTop: 6 }}>No hay operaciones de divisas en el rango elegido.</div>
        ) : (
          <>
            <div
              style={{
                marginTop: 6, marginBottom: 16, borderRadius: 16, padding: "24px 18px", textAlign: "center",
                background: completo ? T.greenSoft : "rgba(227,178,77,0.14)",
                border: `1px solid ${completo ? T.green : T.gold}`,
              }}
            >
              <div style={{ fontSize: 23, fontWeight: 700, color: completo ? T.green : T.gold, letterSpacing: -0.3 }}>
                {completo ? "Conciliado completo" : "Revisar"}
              </div>
              <div style={{ fontSize: 13, color: T.mut, marginTop: 6 }}>
                {completo
                  ? `Las ${total} operaciones coinciden con el estado de cuenta.`
                  : `${noCount} de ${total} operaciones sin confirmar.`}
              </div>
            </div>
            <PrimaryBtn color={T.blue} disabled={busy} onClick={download}>
              {busy ? "Generando…" : "Generar Excel de conciliación"}
            </PrimaryBtn>
            {dl && (
              <a href={dl.url} download={dl.name} style={{ display: "block", textAlign: "center", background: T.green, color: "#0A0F1E", borderRadius: 12, padding: "13px", fontWeight: 600, textDecoration: "none", marginTop: 10 }}>
                Abrir / guardar el archivo
              </a>
            )}
          </>
        )
      )}
    </div>
  );
}

/* ─────────────────────────────  Tab: Proyectos  ───────────────────────────── */
const PROJECT_COLORS = ["#E3B24D", "#5B8DEF", "#3FCB8B", "#F0645F", "#9B7BEA", "#4DB6AC", "#EC87C0", "#8A93A7"];
const PROJECT_EMOJIS = ["📁", "🏠", "🏢", "🚗", "🛒", "💼", "🍽️", "✈️", "🏗️", "💡", "📦", "🎯"];

function ProjectsTab({ txns, projectsMeta, cur, onAdd, onEdit, canEdit = true }) {
  const metaFor = (name) => projectsMeta.find((m) => m.name === name) || { name, color: "#8A93A7", emoji: "📁" };
  const names = Array.from(new Set([...projectsMeta.map((m) => m.name), ...txns.map((t) => t.project).filter(Boolean)])).sort();

  const summary = (name) => {
    const m = {};
    const meta = metaFor(name);
    const opening = meta.opening || {};
    // Semilla con los saldos iniciales cargados en el proyecto
    Object.entries(opening).forEach(([c, v]) => {
      if (v != null && !isNaN(v)) m[c] = { inc: 0, exp: 0, com: 0, open: v };
    });
    txns.filter((t) => (t.project || "") === name).forEach((t) => {
      const c = t.currency || cur;
      const com = t.commission || 0;
      if (!m[c]) m[c] = { inc: 0, exp: 0, com: 0, open: 0 };
      // Mismo criterio que el saldo de la cuenta:
      // ingreso neto = monto - comisión ; egreso total = monto + comisión
      if (t.kind === "income") m[c].inc += (t.amount || 0) - com;
      else m[c].exp += (t.amount || 0) + com;
      m[c].com += com;
    });
    return Object.entries(m);
  };

  return (
    <div style={{ paddingTop: 8 }}>
      {canEdit && (
        <button onClick={onAdd} style={{ ...rowCard, cursor: "pointer", justifyContent: "center", gap: 8, color: T.gold, fontWeight: 600, fontSize: 15, marginBottom: 16 }}>
          <IconPlus color={T.gold} /> Nuevo proyecto
        </button>
      )}

      {names.length === 0 ? (
        <div style={emptyRow}>Todavía no tenés proyectos. Creá uno y asigná movimientos.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {names.map((name) => {
            const meta = metaFor(name);
            const rows = summary(name);
            return (
              <div key={name} style={{ ...rowCard, flexDirection: "column", alignItems: "stretch", padding: 0, overflow: "hidden", borderLeft: `4px solid ${meta.color}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 15px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
                    <span style={{ width: 40, height: 40, borderRadius: 12, background: meta.color + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>
                      {meta.emoji || "📁"}
                    </span>
                    <div style={{ fontSize: 16, fontWeight: 700, color: T.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{name}</div>
                  </div>
                  {canEdit && <button onClick={() => onEdit(name)} style={{ ...btnGhost, color: T.mut, fontSize: 13 }}>Editar</button>}
                </div>
                <div style={{ padding: "0 15px 14px" }}>
                  {rows.length === 0 ? (
                    <div style={{ fontSize: 12.5, color: T.mut }}>Sin movimientos asignados.</div>
                  ) : (
                    rows.map(([c, v]) => (
                      <div key={c} style={{ borderTop: `1px solid ${T.lineSoft}`, paddingTop: 10, marginTop: 10 }}>
                        <div style={{ fontSize: 11.5, color: T.mut2, fontWeight: 600, marginBottom: 6 }}>{c.toUpperCase()}</div>
                        {(v.open || 0) !== 0 && (
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: T.mut, marginBottom: 8 }}>
                            <span>Saldo inicial</span>
                            <span style={{ fontFamily: MONO, color: T.text }}>{money(v.open || 0, c)}</span>
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 10 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 11, color: T.mut }}>Ingresos</div>
                            <div style={{ fontFamily: MONO, fontSize: 13.5, fontWeight: 600, color: T.green }}>{money(v.inc, c)}</div>
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 11, color: T.mut }}>Egresos</div>
                            <div style={{ fontFamily: MONO, fontSize: 13.5, fontWeight: 600, color: T.red }}>{money(v.exp, c)}</div>
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 11, color: T.mut }}>Balance</div>
                            <div style={{ fontFamily: MONO, fontSize: 13.5, fontWeight: 700, color: (v.open || 0) + v.inc - v.exp >= 0 ? T.text : T.red }}>
                              {money((v.open || 0) + v.inc - v.exp, c)}
                            </div>
                          </div>
                        </div>
                        {v.com > 0 && (
                          <div style={{ fontSize: 11, color: T.mut2, marginTop: 6 }}>
                            Comisiones incluidas: <span style={{ fontFamily: MONO }}>{money(v.com, c)}</span>
                          </div>
                        )}
                      </div>
                    ))
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─────────────────────────────  Sheet: Proyecto  ───────────────────────────── */
function ProjectSheet({ state, projectsMeta, onClose, onSave, onDelete }) {
  const editing = state && state.name;
  const [name, setName] = useState("");
  const [emoji, setEmoji] = useState("📁");
  const [color, setColor] = useState(PROJECT_COLORS[0]);
  const [openUsd, setOpenUsd] = useState("");
  const [openVes, setOpenVes] = useState("");
  useEffect(() => {
    if (state && state.name) {
      const m = projectsMeta.find((x) => x.name === state.name) || {};
      setName(state.name);
      setEmoji(m.emoji || "📁");
      setColor(m.color || PROJECT_COLORS[0]);
      const ob = m.opening || {};
      setOpenUsd(ob.usd != null ? String(ob.usd) : "");
      setOpenVes(ob.ves != null ? String(ob.ves) : "");
    } else if (state) {
      setName(""); setEmoji("📁"); setColor(PROJECT_COLORS[0]); setOpenUsd(""); setOpenVes("");
    }
  }, [state]);
  if (!state) return null;
  const valid = name.trim();
  const opening = {};
  if (openUsd !== "" && !isNaN(numVE(openUsd))) opening.usd = numVE(openUsd);
  if (openVes !== "" && !isNaN(numVE(openVes))) opening.ves = numVE(openVes);
  return (
    <Sheet open={!!state} onClose={onClose} title={editing ? "Editar proyecto" : "Nuevo proyecto"}>
      <Field label="Nombre">
        <input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="Ej. Local Centro" />
      </Field>
      <Field label="Logo (emoji)">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
          {PROJECT_EMOJIS.map((e) => (
            <button key={e} onClick={() => setEmoji(e)} style={{ width: 42, height: 42, borderRadius: 10, fontSize: 20, cursor: "pointer", background: emoji === e ? T.goldSoft : T.card, border: `1px solid ${emoji === e ? T.gold : T.line}` }}>{e}</button>
          ))}
        </div>
        <input style={{ ...inputStyle, width: 80, textAlign: "center", fontSize: 20 }} value={emoji} onChange={(e) => setEmoji(e.target.value.slice(0, 2))} maxLength={2} />
      </Field>
      <Field label="Color">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {PROJECT_COLORS.map((c) => (
            <button key={c} onClick={() => setColor(c)} style={{ width: 34, height: 34, borderRadius: 17, background: c, cursor: "pointer", border: color === c ? `3px solid ${T.text}` : `3px solid transparent` }} aria-label={c} />
          ))}
        </div>
      </Field>

      <div style={{ ...sectionTitle, margin: "20px 0 8px" }}>Saldo inicial del proyecto</div>
      <div style={{ fontSize: 12.5, color: T.mut, marginBottom: 12, lineHeight: 1.5 }}>
        Fondos con los que arranca el proyecto, antes de sus movimientos. Se suma al balance.
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>USD</label>
          <input style={{ ...inputStyle, fontFamily: MONO }} value={openUsd} onChange={(e) => setOpenUsd(e.target.value)} inputMode="decimal" placeholder="0.00" />
        </div>
        <div style={{ flex: 1 }}>
          <label style={labelStyle}>VES (Bs)</label>
          <input style={{ ...inputStyle, fontFamily: MONO }} value={openVes} onChange={(e) => setOpenVes(e.target.value)} inputMode="decimal" placeholder="0,00" />
        </div>
      </div>

      <div style={{ marginTop: 16 }}>
        <PrimaryBtn color={color} disabled={!valid} onClick={() => onSave(editing ? state.name : null, { name: name.trim(), emoji, color, opening })}>
          {editing ? "Guardar cambios" : "Crear proyecto"}
        </PrimaryBtn>
      </div>
      {editing && (
        <button onClick={() => onDelete(state.name)} style={{ ...btnGhost, color: T.red, width: "100%", marginTop: 14, padding: 10 }}>
          Eliminar proyecto (los movimientos quedan sin proyecto)
        </button>
      )}
    </Sheet>
  );
}

<script>
(function () {
  var boot = document.getElementById("bootmsg");
  function setMsg(t) { if (boot) boot.textContent = t; }
  function showError(title, detail) {
    if (window.__mounted) return;
    document.getElementById("root").innerHTML =
      '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;font-family:-apple-system,system-ui,sans-serif;background:var(--bg);">' +
      '<div style="max-width:340px;text-align:center;">' +
      '<div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;">' + title + '</div>' +
      '<div style="font-size:13px;color:#8A97BE;line-height:1.5;margin-bottom:18px;word-break:break-word;">' + (detail || "") + '</div>' +
      '<button onclick="location.reload()" style="background:#E6BE5A;color:#0A0F1E;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:600;">Reintentar</button>' +
      '</div></div>';
  }
  window.addEventListener("error", function (e) {
    showError("Se produjo un error", (e && e.message) ? e.message : "Error desconocido");
  });
  function loadScript(urls) {
    return new Promise(function (res, rej) {
      var i = 0;
      (function next() {
        if (i >= urls.length) { rej(new Error("No se pudo cargar " + urls[0])); return; }
        var s = document.createElement("script");
        s.src = urls[i++]; s.crossOrigin = "anonymous";
        s.onload = function () { res(); };
        s.onerror = function () { next(); };
        document.head.appendChild(s);
      })();
    });
  }
  setMsg("cargando librerias (1/3)...");
  loadScript(["https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js", "https://unpkg.com/react@18/umd/react.production.min.js"])
    .then(function () { setMsg("cargando librerias (2/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js", "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"]); })
    .then(function () { setMsg("cargando compilador (3/3)..."); return loadScript(["https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js", "https://unpkg.com/@babel/standalone@7/babel.min.js"]); })
    .then(function () {
      if (!window.React || !window.ReactDOM) { showError("No se cargo React", "Revisa tu conexion a internet y reintenta."); return; }
      if (!window.Babel) { showError("No se cargo el compilador", "Revisa tu conexion a internet y reintenta."); return; }
      setMsg("iniciando...");
      try {
        var code = document.getElementById("app-src").textContent;
        var out = Babel.transform(code, { presets: ["react"] }).code;
        new Function(out)();
      } catch (err) {
        showError("Error al iniciar la app", (err && err.message) ? err.message : String(err));
      }
    })
    .catch(function (err) {
      showError("No se pudieron cargar las librerias", ((err && err.message) ? err.message : "") + " - suele ser un problema de conexion. Reintenta.");
    });
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
